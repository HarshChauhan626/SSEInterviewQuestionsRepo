<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DSA Markdown Library</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #090b10;
      --panel: rgba(19, 25, 34, 0.76);
      --panel-strong: rgba(26, 34, 48, 0.92);
      --text: #eef4ff;
      --muted: #91a0b8;
      --line: rgba(255, 255, 255, 0.12);
      --blue: #64d2ff;
      --green: #60e6a8;
      --pink: #ff7ab6;
      --shadow: 0 22px 70px rgba(0, 0, 0, 0.42);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 12%, rgba(100, 210, 255, 0.22), transparent 30rem),
        radial-gradient(circle at 82% 8%, rgba(255, 122, 182, 0.16), transparent 28rem),
        linear-gradient(135deg, #090b10 0%, #111827 48%, #08131b 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, black, transparent 78%);
    }

    main {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0 64px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: end;
      margin-bottom: 28px;
    }

    h1 {
      margin: 0;
      max-width: 760px;
      font-size: clamp(2.2rem, 7vw, 5.8rem);
      line-height: 0.9;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 18px 0 0;
      max-width: 680px;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.7;
    }

    .stat {
      min-width: 168px;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .stat strong {
      display: block;
      font-size: 2.35rem;
      line-height: 1;
    }

    .stat span {
      color: var(--muted);
      font-size: 0.88rem;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      margin: 30px 0 18px;
    }

    .search {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(16px);
    }

    .search svg {
      width: 18px;
      height: 18px;
      color: var(--blue);
      flex: 0 0 auto;
    }

    input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font: inherit;
    }

    input::placeholder { color: #73819a; }

    .hint {
      color: var(--muted);
      font-size: 0.92rem;
      white-space: nowrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(235px, 1fr));
      gap: 14px;
    }

    .card {
      min-height: 132px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: inherit;
      text-decoration: none;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.11), rgba(255, 255, 255, 0.045));
      box-shadow: 0 16px 44px rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(18px);
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .card:hover,
    .card:focus-visible {
      transform: translateY(-4px);
      border-color: rgba(100, 210, 255, 0.7);
      background: var(--panel-strong);
      outline: none;
    }

    .card-title {
      font-size: 1.12rem;
      font-weight: 800;
      line-height: 1.25;
    }

    .card-meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .tag {
      color: var(--green);
      font-weight: 700;
    }

    @media (max-width: 720px) {
      main { width: min(100% - 24px, 1180px); padding-top: 30px; }
      header, .toolbar { grid-template-columns: 1fr; }
      .stat { width: 100%; }
      .hint { white-space: normal; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <section>
        <h1>DSA Markdown Library</h1>
        <p class="subtitle">A focused shelf for algorithms, systems, backend, AI, and interview notes. Open any file in the full reader with syntax highlighting and Mermaid diagrams.</p>
      </section>
      <aside class="stat" aria-label="Library size">
        <strong id="count">0</strong>
        <span>Notes & Quizzes</span>
      </aside>
    </header>

    <section class="toolbar" aria-label="Filters">
      <label class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="11" cy="11" r="7"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
        <input id="filter" type="search" placeholder="Search notes..." autocomplete="off">
      </label>
      <div class="hint" id="visibleCount"></div>
    </section>

    <section class="grid" id="fileGrid" aria-label="Markdown files"></section>
  </main>

  <script>
    const fallbackFiles = [
      "a2arag.md",
      "agenticai.md",
      "agenticaimcq.html",
      "awssolutionarchitectmcq.html",
      "backtracking.md",
      "binarysearch.md",
      "bitmanipulation.md",
      "databases.html",
      "databases.md",
      "disjoinset.md",
      "distributedsystems.md",
      "dotnet.md",
      "dp.md",
      "dsaeasytomedium.md",
      "dsaeasytomedium_pseudocode.md",
      "golang.md",
      "graph.md",
      "greedy.md",
      "heap.md",
      "intervals.md",
      "kubernetes.md",
      "linkedlist.md",
      "monotonicstack.md",
      "nodejs.md",
      "nodejsmcq.html",
      "observability.md",
      "prefixsum.md",
      "puzzles.md",
      "queue.md",
      "react.md",
      "recursion.md",
      "slidingwindow.md",
      "strings.md",
      "systemdesigneventdrivenetc.md",
      "systemdesignterminology.md",
      "systemdesignmcq.html",
      "trees.md",
      "trie.md",
      "twopointer.md",
      "websocket.md"
    ];

    const titleMap = {
      "a2arag.md": "A2A RAG",
      "agenticai.md": "Agentic AI",
      "agenticaimcq.html": "Agentic AI MCQ",
      "awssolutionarchitectmcq.html": "AWS Solution Architect MCQ",
      "backtracking.md": "Backtracking",
      "binarysearch.md": "Binary Search",
      "bitmanipulation.md": "Bit Manipulation",
      "databases.html": "Databases MCQ",
      "databases.md": "Databases",
      "disjoinset.md": "Disjoint Set",
      "distributedsystems.md": "Distributed Systems",
      "dotnet.md": ".NET",
      "dp.md": "Dynamic Programming",
      "dsaeasytomedium.md": "DSA Easy To Medium",
      "dsaeasytomedium_pseudocode.md": "DSA Easy To Medium — Pseudo Code",
      "golang.md": "Golang",
      "graph.md": "Graph",
      "greedy.md": "Greedy",
      "heap.md": "Heap",
      "intervals.md": "Intervals",
      "kubernetes.md": "Kubernetes",
      "linkedlist.md": "Linked List",
      "monotonicstack.md": "Monotonic Stack",
      "nodejs.md": "Node.js",
      "nodejsmcq.html": "Node.js MCQ",
      "observability.md": "Observability",
      "prefixsum.md": "Prefix Sum",
      "puzzles.md": "Puzzles",
      "queue.md": "Queue",
      "react.md": "React",
      "recursion.md": "Recursion",
      "slidingwindow.md": "Sliding Window",
      "strings.md": "Strings",
      "systemdesigneventdrivenetc.md": "System Design: Event Driven Etc",
      "systemdesignterminology.md": "System Design Terminology",
      "systemdesignmcq.html": "System Design MCQ",
      "trees.md": "Trees",
      "trie.md": "Trie",
      "twopointer.md": "Two Pointer",
      "websocket.md": "WebSocket"
    };

    let libraryFiles = [...fallbackFiles];

    const grid = document.querySelector("#fileGrid");
    const filter = document.querySelector("#filter");
    const count = document.querySelector("#count");
    const visibleCount = document.querySelector("#visibleCount");

    function titleFromFile(file) {
      if (titleMap[file]) return titleMap[file];
      return file
        .replace(/\.(md|html)$/i, "")
        .replace(/([a-z])([A-Z])/g, "$1 $2")
        .replace(/dsa/i, "DSA")
        .replace(/ai/i, "AI")
        .replace(/a2a/i, "A2A")
        .replace(/rag/i, "RAG")
        .replace(/dotnet/i, ".NET")
        .replace(/\b\w/g, char => char.toUpperCase());
    }

    function renderList() {
      const term = filter.value.trim().toLowerCase();
      const files = libraryFiles.filter(file => {
        return file.toLowerCase().includes(term) || titleFromFile(file).toLowerCase().includes(term);
      });

      grid.innerHTML = files.map((file, index) => {
        const isHtml = file.endsWith('.html');
        const href = isHtml ? file : `markdownreader.html?file=${encodeURIComponent(file)}`;
        return `
        <a class="card" href="${href}">
          <span class="card-title">${titleFromFile(file)}</span>
          <span class="card-meta">
            <span>${file}</span>
            <span class="tag">#${String(index + 1).padStart(2, "0")}</span>
          </span>
        </a>
      `}).join("");

      visibleCount.textContent = `${files.length} of ${libraryFiles.length} shown`;
      count.textContent = libraryFiles.length;
    }

    async function loadManifest() {
      try {
        const response = await fetch("md-files.json", { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const manifest = await response.json();
        const files = Array.isArray(manifest) ? manifest : manifest.files;
        if (Array.isArray(files) && files.length) {
          const mdFiles = files.filter(file => file.endsWith(".md"));
          const quizFiles = [
            "agenticaimcq.html",
            "awssolutionarchitectmcq.html",
            "databases.html",
            "nodejsmcq.html",
            "systemdesignmcq.html"
          ];
          libraryFiles = [...mdFiles, ...quizFiles].sort((a, b) => a.localeCompare(b));
        }
      } catch (error) {
        libraryFiles = [...fallbackFiles];
      }
    }

    filter.addEventListener("input", renderList);
    loadManifest().then(renderList);
  </script>
</body>
</html>
