  {db:'mg',topic:'Basics',q:'What is MongoDB?',o:['A relational database','A document-oriented NoSQL database','A key-value store','A graph database'],a:1,sol:'MongoDB is a document-oriented NoSQL database that stores data as BSON (Binary JSON) documents. It offers flexible schemas, horizontal scaling, and rich query capabilities.'},
  {db:'mg',topic:'Documents',q:'What format are MongoDB documents stored in?',o:['XML','CSV','BSON (Binary JSON)','JSON Text'],a:2,sol:'MongoDB stores data as BSON (Binary JSON), an extension of JSON that includes additional data types like Date, BinData, ObjectId, etc. BSON is more efficient to parse than JSON text.'},
  {db:'mg',topic:'_id',q:'What is the default type of the _id field in MongoDB?',o:['UUID','Integer','ObjectId','String'],a:2,sol:'By default, MongoDB uses ObjectId as the _id field. An ObjectId is a 12-byte identifier: 4-byte timestamp, 5-byte random value, 3-byte incrementing counter. It\'s unique within a collection.'},
  {db:'mg',topic:'CRUD',q:'Which MongoDB method inserts a single document into a collection?',o:['db.collection.add()','db.collection.insertOne()','db.collection.create()','db.collection.push()'],a:1,sol:'insertOne() inserts a single document and returns an insertedId. insertMany() inserts multiple. The legacy insert() method is deprecated. Returns an InsertOneResult object.'},
  {db:'mg',topic:'CRUD',q:'Which method updates a single document matching a filter in MongoDB?',o:['db.collection.change()','db.collection.modify()','db.collection.updateOne()','db.collection.set()'],a:2,sol:'updateOne(filter, update) modifies the first matching document. Use $set, $inc, etc. in the update document. updateMany() modifies all matching documents. replaceOne() replaces the entire document.'},
  {db:'mg',topic:'Query',q:'How do you query MongoDB for documents where age is greater than 25?',o:["db.users.find({age: {$gt: 25}})",'db.users.find({age > 25})','db.users.where("age > 25")','db.users.query({age: [">", 25]})'],a:0,sol:'MongoDB query operators use $gt (greater than), $lt (less than), $gte, $lte, $eq, $ne, $in, $nin. Example: db.users.find({age: {$gt: 25}}) finds all users older than 25.'},
  {db:'mg',topic:'Indexes',q:'What command creates an index on the "email" field of the users collection in MongoDB?',o:["db.users.createIndex({email: 1})",'db.users.addIndex("email")','db.users.index({email: true})','db.users.ensureIndex({email: "asc"})'],a:0,sol:'createIndex({field: 1}) creates an ascending index. Use -1 for descending. For text search use {field: "text"}. Indexes significantly improve query performance on indexed fields.'},
  {db:'mg',topic:'Aggregation',q:'What does the $match stage do in a MongoDB aggregation pipeline?',o:['Joins two collections','Filters documents similar to a find() query','Groups documents by a field','Projects specific fields'],a:1,sol:'$match filters documents in the pipeline based on specified conditions. Placing $match early in the pipeline reduces the number of documents processed by subsequent stages, improving performance.'},
  {db:'mg',topic:'Aggregation',q:'Which aggregation stage groups documents and computes aggregate values?',o:['$project','$match','$group','$sort'],a:2,sol:'$group groups documents by a specified key and computes aggregate values like $sum, $avg, $min, $max, $count, $push, $addToSet. The _id field specifies the grouping key.'},
  {db:'mg',topic:'Replication',q:'What is a MongoDB Replica Set?',o:['A set of indexes for a collection','A group of MongoDB instances maintaining the same data set','A collection of related documents','A sharded cluster configuration'],a:1,sol:'A Replica Set is a group of MongoDB instances hosting the same data. It provides redundancy and high availability. One member is the primary (handles writes); others are secondaries that replicate the primary\'s data.'},
  {db:'mg',topic:'Replication',q:'What happens if the primary in a MongoDB Replica Set becomes unavailable?',o:['The entire cluster goes offline','The secondaries automatically elect a new primary','Writes are buffered until the primary returns','The oldest secondary becomes primary without election'],a:1,sol:'MongoDB uses a Raft-based election algorithm. Secondaries holding a majority vote elect a new primary. The process typically takes 10-30 seconds. Write concern majority ensures data survives a failover.'},
  {db:'mg',topic:'Sharding',q:'What is sharding in MongoDB?',o:['Horizontal scaling by distributing data across multiple servers','Vertical scaling by adding more RAM','Partitioning a collection by time','Compressing old documents'],a:0,sol:'Sharding distributes data across multiple servers (shards) for horizontal scaling. Each shard holds a subset of data. The mongos router directs queries to the appropriate shard(s) using the shard key.'},
  {db:'mg',topic:'Sharding',q:'What is a shard key in MongoDB?',o:['The primary key of the collection','The field(s) used to distribute documents across shards','A key used for encryption','A key for inter-shard communication'],a:1,sol:'The shard key determines how documents are distributed across shards. Good shard key choice is critical—it should have high cardinality, low frequency, and non-monotonically increasing values to avoid hotspots.'},
  {db:'mg',topic:'Operators',q:'What does the $lookup aggregation stage do in MongoDB?',o:['Looks up a document by _id','Performs a left outer join with another collection','Searches text indexes','Validates document schema'],a:1,sol:'$lookup performs a left outer join from one collection to another. Syntax: {$lookup: {from: "other_collection", localField: "field", foreignField: "other_field", as: "result"}}'},
  {db:'mg',topic:'Update',q:'What does the $set operator do in a MongoDB update?',o:['Replaces the entire document','Sets the value of a field, creating it if it doesn\'t exist','Converts a field to a set type','Removes a field'],a:1,sol:'$set modifies or adds the specified field(s) to the document without affecting other fields. Example: {$set: {status: "active"}} only modifies the status field, leaving all others intact.'},
  {db:'mg',topic:'Update',q:'What does the $unset operator do in MongoDB?',o:['Decrements a field value','Removes a field from a document','Sets a field to undefined','Clears an array'],a:1,sol:'$unset removes the specified field(s) from a document. Example: {$unset: {temporaryField: ""}} removes temporaryField. The value in the $unset expression doesn\'t matter (conventionally "").'},
  {db:'mg',topic:'Text Search',q:'How do you enable full-text search on a field in MongoDB?',o:['Create a regular index','Create a text index with {field: "text"}','Enable the text search module','Use the $search operator directly'],a:1,sol:'Create a text index: db.collection.createIndex({field: "text"}). Then use $text: {$search: "keyword"} in queries. Text indexes support stemming, stop words, and multi-field search.'},
  {db:'mg',topic:'Schema',q:'What is a schemaless database and how does MongoDB apply it?',o:['A database with no data','A database where documents in a collection can have different fields','A database without indexes','A database with a fixed schema defined externally'],a:1,sol:'MongoDB is schemaless—documents in a collection don\'t need identical fields. This allows flexible data models. Schema validation can be added via $jsonSchema in collection validators for data integrity.'},
  {db:'mg',topic:'Transactions',q:'When were multi-document ACID transactions introduced in MongoDB?',o:['MongoDB 3.0','MongoDB 3.6','MongoDB 4.0','MongoDB 4.4'],a:2,sol:'Multi-document ACID transactions were introduced in MongoDB 4.0 for replica sets and extended to sharded clusters in MongoDB 4.2. Sessions are used to associate operations with a transaction.'},
  {db:'mg',topic:'GridFS',q:'What is MongoDB GridFS used for?',o:['Storing graph data','Storing and retrieving files larger than the 16MB BSON document limit','A distributed file system','A caching layer for query results'],a:1,sol:'GridFS is MongoDB\'s specification for storing and retrieving large files. It splits files into chunks (default 255KB each) stored as separate documents in fs.chunks, with metadata in fs.files.'},
  {db:'mg',topic:'Write Concern',q:'What does write concern "majority" mean in MongoDB?',o:['Writes are acknowledged only by the primary','Writes are acknowledged after being applied to majority of replica set members','Writes go to more than 50% of shards','Majority of documents match the write'],a:1,sol:'Write concern "majority" means MongoDB waits until a majority of voting members of the replica set have acknowledged the write. This ensures writes survive a primary failover.'},
  {db:'mg',topic:'Read Preference',q:'What read preference directs all reads to the primary in MongoDB?',o:['secondary','primaryPreferred','primary','nearest'],a:2,sol:'"primary" (default) routes all reads to the primary, ensuring always-consistent data. Other options: primaryPreferred, secondary, secondaryPreferred, nearest. Non-primary reads may return stale data.'},
  {db:'mg',topic:'Capped Collections',q:'What is a capped collection in MongoDB?',o:['A collection with a maximum number of indexes','A fixed-size collection that overwrites oldest documents when full','A collection with a schema limit','A read-only collection'],a:1,sol:'Capped collections are fixed-size circular buffers. When the size limit is reached, oldest documents are automatically overwritten. Useful for logs and caching recent events. Insertion order is preserved.'},
  {db:'mg',topic:'Projection',q:'How do you exclude a field from MongoDB query results?',o:["{field: false}",'{"field": "exclude"}','{field: 0}','EXCLUDE field'],a:2,sol:'In a projection, 0 excludes a field and 1 includes it. Example: db.collection.find({}, {field: 0}) returns all fields except "field". You cannot mix inclusions and exclusions (except for _id).'},
  {db:'mg',topic:'Array Operators',q:'What does $elemMatch do in a MongoDB query?',o:['Matches any document containing the element','Matches documents where at least one array element satisfies all specified criteria','Finds an element by index','Counts matching elements'],a:1,sol:'$elemMatch matches documents where at least one array element satisfies ALL the specified query criteria simultaneously. Without it, each criterion could match different array elements.'},
  {db:'mg',topic:'Indexes',q:'What is a compound index in MongoDB?',o:['An index spanning multiple collections','An index on multiple fields within a single collection','An index compressed for storage','An index with multiple types'],a:1,sol:'A compound index covers multiple fields: db.collection.createIndex({field1: 1, field2: -1}). It supports queries on the prefix fields. Field order matters—match the most selective field first.'},
  {db:'mg',topic:'Explain',q:'What does db.collection.find().explain("executionStats") show?',o:['Query syntax errors','Execution statistics including index usage, documents examined, and time','A simplified query plan','Index recommendations'],a:1,sol:'explain("executionStats") shows detailed execution information: winning plan, rejected plans, index used, nReturned, totalDocsExamined, totalKeysExamined, and execution time in milliseconds.'},
  {db:'mg',topic:'Atlas',q:'What is MongoDB Atlas?',o:['A MongoDB query language','MongoDB\'s fully managed cloud database service','A local MongoDB GUI tool','A MongoDB schema validator'],a:1,sol:'MongoDB Atlas is MongoDB\'s fully managed cloud database service running on AWS, Azure, and GCP. It provides automated backups, scaling, monitoring, and access to advanced features like Atlas Search and Data Lake.'},
  {db:'mg',topic:'Change Streams',q:'What are MongoDB Change Streams?',o:['Schema migration scripts','Real-time notification of data changes using the oplog','A backup mechanism','Event triggers for application layer'],a:1,sol:'Change Streams allow applications to subscribe to real-time data changes in a collection, database, or deployment. Built on the oplog, they provide ordered, resumable streams of change events.'},
  {db:'mg',topic:'Validation',q:'How do you add schema validation to a MongoDB collection?',o:['Using CREATE TABLE syntax','Using JSON Schema validators with validator option','Using a separate validation collection','MongoDB doesn\'t support schema validation'],a:1,sol:'Add validators when creating collections or via collMod command: {validator: {$jsonSchema: {bsonType: "object", required: ["name"], properties: {name: {bsonType: "string"}}}}}'},
  {db:'mg',topic:'Operators',q:'What does $push do in a MongoDB update?',o:['Pushes the document to a stack','Appends a value to an array field','Pushes changes to replica set','Creates a new document'],a:1,sol:'$push appends a value to an array field. Combined with $each, you can push multiple values. Use $sort within $push to maintain sorted order. $addToSet prevents duplicates.'},
  {db:'mg',topic:'Aggregation',q:'What does the $unwind aggregation stage do?',o:['Removes duplicate documents','Deconstructs an array field into separate documents for each element','Sorts documents','Limits the result set'],a:1,sol:'$unwind deconstructs an array field, creating one output document per array element. Useful before $group to work with individual array elements. preserveNullAndEmptyArrays option handles edge cases.'},
  {db:'mg',topic:'Indexing',q:'What is a sparse index in MongoDB?',o:['An index with fewer keys','An index that only includes documents where the indexed field exists','A partial index based on a filter','A compressed index'],a:1,sol:'A sparse index only contains entries for documents that have the indexed field, skipping documents where the field is missing. Saves space when many documents lack the field.'},
  {db:'mg',topic:'TTL',q:'What is a TTL index in MongoDB used for?',o:['Measuring query execution time','Automatically deleting documents after a specified time period','Setting timeout for write operations','Index expiry for maintenance'],a:1,sol:'TTL (Time-To-Live) indexes automatically remove documents from a collection after a specified number of seconds or at a specific clock time. Created with expireAfterSeconds: db.collection.createIndex({date: 1}, {expireAfterSeconds: 3600})'},
  {db:'mg',topic:'Profiler',q:'What does the MongoDB profiler do?',o:['Profiles CPU and memory usage','Logs slow queries and database operations for performance analysis','Profiles network traffic','Analyzes index fragmentation'],a:1,sol:'The MongoDB profiler logs operations that take longer than a threshold (slowOpThresholdMs). Set profiling level with db.setProfilingLevel(). Results stored in system.profile capped collection.'},
  {db:'mg',topic:'Operators',q:'What does the $inc operator do in MongoDB?',o:['Checks if a value is included in a set','Increments or decrements a numeric field by a given amount','Creates an incrementing sequence','Inserts a new counter document'],a:1,sol:'$inc atomically increments (positive value) or decrements (negative value) a numeric field. Example: {$inc: {count: 1, score: -5}} increments count by 1 and decrements score by 5.'},
  {db:'mg',topic:'Aggregation',q:'What is the purpose of $facet in MongoDB aggregation?',o:['A stage for joining collections','Runs multiple aggregation pipelines simultaneously on the same input and returns results in a single document','Filters documents by multiple conditions','Creates sub-pipelines for each document'],a:1,sol:'$facet allows running multiple aggregation pipelines in parallel on the same set of input documents. Results from each sub-pipeline are returned under named keys in a single document. Great for analytics dashboards.'},
  {db:'mg',topic:'Storage',q:'What is the default storage engine in MongoDB 4.x+?',o:['MMAPv1','TokuMX','WiredTiger','RocksDB'],a:2,sol:'WiredTiger has been the default storage engine since MongoDB 3.2. It provides document-level concurrency control, compression (snappy by default), and better multi-core performance than the legacy MMAPv1.'},
  {db:'mg',topic:'Connection',q:'What does a MongoDB connection string look like?',o:['jdbc:mongodb://host:port/db','mongodb://[user:password@]host:port/database','http://host:port/db','mongo://host/database'],a:1,sol:'MongoDB connection strings follow the URI format: mongodb://[username:password@]host1[:port1]/database[?options]. For Atlas: mongodb+srv://... For replica sets, list multiple hosts.'},
  {db:'mg',topic:'Collation',q:'What does collation in MongoDB allow?',o:['Multi-collection joins','Language-specific string comparison rules for queries and indexes','Converting between data types','Ordering shards'],a:1,sol:'Collation specifies language-specific rules for string comparison, including rules for lettercase and accent marks. Enables case-insensitive searches and locale-aware sorting. Example: {locale: "en", strength: 2}'},
  {db:'mg',topic:'Utilities',q:'What does mongodump do?',o:['Imports JSON/CSV data','Creates a binary export (BSON dump) of a MongoDB database','Analyzes query performance','Validates collection integrity'],a:1,sol:'mongodump creates a binary BSON export of a MongoDB database or collection. mongorestore imports it back. For human-readable exports, use mongoexport (JSON/CSV) and mongoimport.'},
  {db:'mg',topic:'Aggregation',q:'What is the $bucket aggregation stage used for?',o:['Grouping data into size-limited buckets','Categorizing documents into groups (buckets) based on a specified expression and boundaries','Joining collections','Limiting result set size'],a:1,sol:'$bucket categorizes documents into user-defined groups based on an expression value and specified boundaries. Example: grouping ages into 0-18, 18-35, 35-60, 60+ buckets for distribution analysis.'},
  {db:'mg',topic:'Views',q:'What are MongoDB Views?',o:['Stored query results on disk','Read-only views of collections defined by aggregation pipelines','Snapshots of collection state','Materialized query caches'],a:1,sol:'MongoDB Views are read-only queryable objects defined by aggregation pipelines. They don\'t store data but compute results dynamically on query. Created with db.createView() or using the viewOn option.'},
  {db:'mg',topic:'Transactions',q:'What is a multi-document transaction scope in MongoDB 4.0+?',o:['A transaction can span multiple databases','A transaction can span multiple collections within a replica set','A transaction automatically spans all shards','A transaction is limited to a single document'],a:1,sol:'In MongoDB 4.0, multi-document transactions work within a single replica set across multiple collections and databases. MongoDB 4.2 extended this to sharded clusters.'},
  {db:'mg',topic:'Oplog',q:'What is the oplog in MongoDB?',o:['Operation log for admin commands','A capped collection that records all write operations for replication','Error and warning log','Audit log for user actions'],a:1,sol:'The oplog (operations log) is a special capped collection (local.oplog.rs) that records all write operations in an idempotent form. Secondaries replicate by reading and applying the primary\'s oplog.'},
  {db:'mg',topic:'Compass',q:'What is MongoDB Compass?',o:['A CLI for MongoDB','A GUI tool for visualizing and exploring MongoDB data','A cloud monitoring service','A schema migration tool'],a:1,sol:'MongoDB Compass is the official GUI for MongoDB. It allows visual exploration of data, query building, index management, performance analysis, and schema visualization without writing queries.'},
  {db:'mg',topic:'Data Types',q:'Which BSON type stores a date and time value in MongoDB?',o:['String','Timestamp','Date','DateTime'],a:2,sol:'The BSON Date type stores a 64-bit integer representing milliseconds since the Unix epoch (January 1, 1970). In the shell: new Date() or ISODate(). Use Date type (not strings) for date range queries.'},
  {db:'mg',topic:'Aggregation',q:'What does $addFields do in a MongoDB aggregation pipeline?',o:['Adds new fields to documents','Adds new collections','Inserts documents into a collection','Adds indexes during aggregation'],a:0,sol:'$addFields (alias $set) adds new computed fields to documents passing through the pipeline without removing existing fields. Perfect for enriching documents with derived values before further processing.'},
  {db:'mg',topic:'Cursors',q:'What does the cursor.limit() method do in MongoDB?',o:['Sets timeout for cursor','Restricts the number of documents returned from the query','Limits query execution plans','Sets maximum document size'],a:1,sol:'cursor.limit(n) specifies the maximum number of documents to return. Combined with skip() for pagination. For large collections, prefer range-based pagination using indexed fields for better performance.'},
  {db:'mg',topic:'Hashed Sharding',q:'What is hashed sharding in MongoDB?',o:['Encrypting the shard key','Using the hash of a field value to distribute documents across shards','A backup sharding strategy','Sharding using range-based hash values'],a:1,sol:'Hashed sharding computes an MD5 hash of the shard key value and uses it for distribution. This ensures even data distribution even for monotonically increasing keys (like timestamps), preventing hot shards.'},
  {db:'mg',topic:'Operators',q:'What does $exists do in a MongoDB query?',o:['Checks if a collection exists','Matches documents based on whether a field exists or not','Checks if an index exists','Validates document existence before insert'],a:1,sol:'{field: {$exists: true}} matches documents that have the field. {field: {$exists: false}} matches documents missing the field. Unlike {field: null}, $exists: false also matches truly absent fields.'},
  {db:'mg',topic:'Atlas Search',q:'What is MongoDB Atlas Search?',o:['A replacement for regular MongoDB queries','Full-text search capability powered by Apache Lucene integrated with MongoDB Atlas','A separate search cluster','A keyword-based search on _id fields'],a:1,sol:'Atlas Search integrates Apache Lucene for full-text search within MongoDB Atlas. It supports fuzzy matching, autocomplete, faceting, relevance scoring, and complex text analysis without a separate search service.'},
  {db:'mg',topic:'Performance',q:'What does the hint() method do in MongoDB queries?',o:['Adds a query comment','Forces MongoDB to use a specific index','Gives performance optimization hints to the planner','Suggests a query rewrite'],a:1,sol:'hint({indexName}) or hint({field: 1}) forces MongoDB to use a specific index rather than relying on the query planner. Useful when the planner selects a suboptimal index for specific queries.'},
  {db:'mg',topic:'Backup',q:'What is MongoDB Atlas Continuous Backup?',o:['Full daily backups','Continuous incremental backups with point-in-time restore capability','Periodic snapshots only','Real-time replication to a backup cluster'],a:1,sol:'Atlas Continuous Backup (Cloud Backup) takes incremental backups and allows point-in-time restore to any second within the retention period. Snapshots are stored in cloud object storage.'},
  {db:'mg',topic:'Aggregation',q:'Which aggregation operator counts the number of documents in a $group?',o:['$count','$sum: 1','$tally','$numDocs'],a:1,sol:'In a $group stage, {count: {$sum: 1}} counts documents per group. $sum accumulates values, so summing 1 per document yields the count. $count as a standalone aggregation stage counts total pipeline documents.'},
  {db:'mg',topic:'Indexing',q:'What is a wildcard index in MongoDB?',o:['An index that matches any query','An index that indexes all fields or all fields matching a pattern in documents','A case-insensitive index','An index with wildcards in the collection name'],a:1,sol:'Wildcard indexes ($**) automatically index all fields or a subset of fields matching a pattern. Useful for workloads with unpredictable query patterns on documents with varying schemas.'},
];

let currentFilter = 'all';
let filteredQuestions = [...ALL_QUESTIONS];
let currentIndex = 0;
let answers = new Array(ALL_QUESTIONS.length).fill(null);
let correctCount = 0;
let wrongCount = 0;
let splashFilter = 'all';

function setFilter(f) {
  splashFilter = f;
  document.querySelectorAll('.db-pill').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
}

function startQuiz() {
  document.getElementById('splash').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  filterQuestions(splashFilter);
}

function filterQuestions(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.className = 'filter-btn';
  });
  document.getElementById('fb-all').className = 'filter-btn' + (filter === 'all' ? ' active-all' : '');
  document.getElementById('fb-pg').className = 'filter-btn' + (filter === 'pg' ? ' active-pg' : '');
  document.getElementById('fb-dy').className = 'filter-btn' + (filter === 'dy' ? ' active-dy' : '');
  document.getElementById('fb-mg').className = 'filter-btn' + (filter === 'mg' ? ' active-mg' : '');

  filteredQuestions = filter === 'all' ? ALL_QUESTIONS : ALL_QUESTIONS.filter(q => q.db === filter);
  document.getElementById('qTotal').textContent = filteredQuestions.length;
  currentIndex = 0;
  updateScoreCounts();
  renderQuestion();
}

function renderQuestion() {
  if (!filteredQuestions.length) return;
  const q = filteredQuestions[currentIndex];
  const globalIdx = ALL_QUESTIONS.indexOf(q);
  const answered = answers[globalIdx] !== null;
  const userAns = answers[globalIdx];

  document.getElementById('qCurrent').textContent = currentIndex + 1;
  document.getElementById('qTotal').textContent = filteredQuestions.length;
  document.getElementById('progressFill').style.width = ((currentIndex + 1) / filteredQuestions.length * 100) + '%';

  const dbColors = {pg:'pg', dy:'dy', mg:'mg'};
  const dbNames = {pg:'PostgreSQL', dy:'DynamoDB', mg:'MongoDB'};
  const letters = ['A','B','C','D'];

  let optionsHtml = q.o.map((opt, i) => {
    let cls = 'option';
    if (answered) {
      cls += ' disabled';
      if (i === q.a) cls += ' correct';
      else if (i === userAns) cls += ' wrong';
    }
    return `<button class="${cls}" onclick="selectAnswer(${i})"">
      <span class="opt-letter">${letters[i]}</span>
      <span>${opt}</span>
    </button>`;
  }).join('');

  const solShow = answered ? 'show' : '';
  const solClass = q.db;

  document.getElementById('questionContainer').innerHTML = `
    <div class="question-card ${dbColors[q.db]}">
      <div class="q-meta">
        <span class="db-tag ${q.db}">${dbNames[q.db]}</span>
        <span class="q-topic">${q.topic}</span>
        <span class="q-num">Q${globalIdx + 1}</span>
      </div>
      <div class="question-text">${q.q}</div>
      <div class="options-grid">${optionsHtml}</div>
      <div class="solution-box ${solShow} ${solClass}">
        <div class="solution-label">✓ Explanation</div>
        <div class="solution-text">${q.sol}</div>
      </div>
    </div>
  `;

  document.getElementById('jumpInput').value = '';
}

function selectAnswer(optIdx) {
  const q = filteredQuestions[currentIndex];
  const globalIdx = ALL_QUESTIONS.indexOf(q);
  if (answers[globalIdx] !== null) return;

  answers[globalIdx] = optIdx;
  if (optIdx === q.a) correctCount++;
  else wrongCount++;

  updateScoreCounts();
  renderQuestion();
}

function updateScoreCounts() {
  correctCount = 0; wrongCount = 0;
  ALL_QUESTIONS.forEach((q, i) => {
    if (answers[i] !== null) {
      if (answers[i] === q.a) correctCount++;
      else wrongCount++;
    }
  });
  document.getElementById('correctCount').textContent = correctCount;
  document.getElementById('wrongCount').textContent = wrongCount;
}

function nextQ() {
  if (currentIndex < filteredQuestions.length - 1) {
    currentIndex++;
    renderQuestion();
    window.scrollTo(0, 0);
  }
}

function prevQ() {
  if (currentIndex > 0) {
    currentIndex--;
    renderQuestion();
    window.scrollTo(0, 0);
  }
}

function jumpTo() {
  const val = parseInt(document.getElementById('jumpInput').value);
  if (val >= 1 && val <= filteredQuestions.length) {
    currentIndex = val - 1;
    renderQuestion();
    window.scrollTo(0, 0);
  }
}

function showResults() {
  const answered = answers.filter(a => a !== null).length;
  const total = ALL_QUESTIONS.length;
  const pct = total > 0 ? Math.round((correctCount / Math.max(answered, 1)) * 100) : 0;

  // Per-DB scores
  const pgQs = ALL_QUESTIONS.filter(q => q.db === 'pg');
  const dyQs = ALL_QUESTIONS.filter(q => q.db === 'dy');
  const mgQs = ALL_QUESTIONS.filter(q => q.db === 'mg');

  function dbScore(qs) {
    const ans = qs.filter((q, i) => answers[ALL_QUESTIONS.indexOf(q)] !== null);
    const cor = qs.filter(q => answers[ALL_QUESTIONS.indexOf(q)] === q.a);
    return ans.length ? `${cor.length}/${ans.length}` : '--';
  }

  document.getElementById('scorePercent').textContent = pct + '%';
  document.getElementById('scoreLabel').textContent = `${correctCount} / ${answered} CORRECT`;
  document.getElementById('pgScore').textContent = dbScore(pgQs);
  document.getElementById('dyScore').textContent = dbScore(dyQs);
  document.getElementById('mgScore').textContent = dbScore(mgQs);

  const titles = ['Quiz Complete!', answered === total ? '🏆 All Done!' : `${answered}/${total} Answered`];
  document.getElementById('resultsTitle').textContent = answered === total ? '🏆 All Done!' : `Quiz Summary`;
  document.getElementById('resultsSub').textContent = `${answered} of ${total} questions answered · ${pct}% accuracy`;

  document.getElementById('results').style.display = 'block';
  document.getElementById('results').scrollTop = 0;
}

function retryQuiz() {
  answers = new Array(ALL_QUESTIONS.length).fill(null);
  correctCount = 0; wrongCount = 0;
  currentIndex = 0;
  document.getElementById('results').style.display = 'none';
  updateScoreCounts();
  renderQuestion();
  window.scrollTo(0, 0);
}

function goBack() {
  document.getElementById('results').style.display = 'none';
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (document.getElementById('splash').style.display !== 'none') return;
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextQ();
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevQ();
  if (e.key === '1') selectAnswer(0);
  if (e.key === '2') selectAnswer(1);
  if (e.key === '3') selectAnswer(2);
  if (e.key === '4') selectAnswer(3);
});
</script>
</body>
</html>
