      ${t}<span class="t-count">${count} Q</span>
    </button>`;
  }).join('');
}
buildTopicGrid();

// Start quiz filtered to one topic
function startTopic(t) {
  ACTIVE_QUESTIONS = ALL_QUESTIONS.filter(q => q.cat === t);
  quizTotal = ACTIVE_QUESTIONS.length;
  current = 0; score = 0;
  answered = new Array(quizTotal).fill(null);
  document.getElementById('modeLabel').textContent = t;
  document.getElementById('splash').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  buildMinimap();
  renderQuestion();
}

// Start quiz with all questions
function startAll() {
  ACTIVE_QUESTIONS = ALL_QUESTIONS.slice();
  quizTotal = ACTIVE_QUESTIONS.length;
  current = 0; score = 0;
  answered = new Array(quizTotal).fill(null);
  document.getElementById('modeLabel').textContent = 'All Topics';
  document.getElementById('splash').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  buildMinimap();
  renderQuestion();
}

function goHome() {
  document.getElementById('splash').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('quizArea').style.display = 'block';
  document.getElementById('minimap').style.display = 'flex';
}

function buildMinimap() {
  const mm = document.getElementById('minimap');
  mm.innerHTML = '';
  for(let i=0;i<quizTotal;i++){
    const d = document.createElement('div');
    d.className='dot'; d.title=`Q${i+1}`;
    d.onclick=()=>jumpTo(i);
    mm.appendChild(d);
  }
}

function updateMinimap() {
  const dots = document.querySelectorAll('.dot');
  dots.forEach((d,i)=>{
    d.className='dot';
    if(i===current) d.classList.add('current');
    else if(answered[i]!==null){
      const correct = ACTIVE_QUESTIONS[i].ans === answered[i];
      d.classList.add(correct?'correct-dot':'wrong-dot');
    } else if(i<current) d.classList.add('answered');
  });
}

function jumpTo(i) {
  current = i;
  renderQuestion();
}

function renderQuestion() {
  const q = ACTIVE_QUESTIONS[current];
  const pct = Math.round((current/quizTotal)*100);
  document.getElementById('progLabel').textContent = `Q ${current+1} / ${quizTotal}`;
  document.getElementById('progPct').textContent = pct+'%';
  document.getElementById('progFill').style.width = pct+'%';
  document.getElementById('scoreDisplay').textContent = score;
  updateMinimap();

  const isAnswered = answered[current] !== null;

  document.getElementById('quizArea').innerHTML = `
    <div class="card-anim">
      <div class="q-meta">
        <span class="q-num">Question ${current+1} of ${quizTotal}</span>
        <span class="q-category">${q.cat}</span>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="options">
        ${q.opts.map((o,i)=>{
          let cls='option';
          if(isAnswered){
            cls+=' disabled';
            if(i===q.ans) cls+=' correct';
            else if(i===answered[current]) cls+=' wrong';
          }
          return `<div class="${cls}" onclick="selectAnswer(${i})">
            <div class="opt-key">${String.fromCharCode(65+i)}</div>
            <div class="opt-text">${o}</div>
          </div>`;
        }).join('')}
      </div>
      <div class="explanation${isAnswered?' show':''}" id="exp">
        <div class="exp-label">// Explanation</div>
        <div class="exp-text">${q.exp}</div>
      </div>
      <div class="nav">
        <button class="nav-btn" onclick="prevQ()" ${current===0?'disabled':''}>← Prev</button>
        <span style="font-size:0.7rem;color:var(--muted)">${isAnswered?(answered[current]===q.ans?'✓ Correct':'✗ Incorrect'):'Not answered'}</span>
        ${current===quizTotal-1
          ? `<button class="nav-btn primary" onclick="showResult()">Finish Quiz →</button>`
          : `<button class="nav-btn primary" onclick="nextQ()">Next →</button>`}
      </div>
    </div>
  `;
}

function selectAnswer(i) {
  if(answered[current]!==null) return;
  answered[current]=i;
  if(i===ACTIVE_QUESTIONS[current].ans) score++;
  renderQuestion();
}

function nextQ() {
  if(current<quizTotal-1){ current++; renderQuestion(); }
}
function prevQ() {
  if(current>0){ current--; renderQuestion(); }
}

function showResult() {
  document.getElementById('quizArea').style.display='none';
  document.getElementById('minimap').style.display='none';
  const correct = answered.filter((a,i)=>a===ACTIVE_QUESTIONS[i].ans).length;
  const wrong   = answered.filter((a,i)=>a!==null&&a!==ACTIVE_QUESTIONS[i].ans).length;
  const skipped = answered.filter(a=>a===null).length;
  const pct = Math.round((correct/quizTotal)*100);
  let grade='Needs Work 📚';
  if(pct>=90) grade='Expert Level 🏆';
  else if(pct>=75) grade='Advanced 🌟';
  else if(pct>=60) grade='Intermediate 👍';
  else if(pct>=40) grade='Developing 📖';
  document.getElementById('finalScore').textContent = pct+'%';
  document.getElementById('finalGrade').textContent = grade;
  document.getElementById('rCorrect').textContent = correct;
  document.getElementById('rWrong').textContent = wrong;
  document.getElementById('rSkipped').textContent = skipped;
  document.getElementById('result').style.display='block';
}

function restartQuiz() {
  current=0; score=0; answered=new Array(quizTotal).fill(null);
  document.getElementById('quizArea').style.display='block';
  document.getElementById('minimap').style.display='flex';
  document.getElementById('result').style.display='none';
  buildMinimap();
  renderQuestion();
}
</script>
</body>
</html>
