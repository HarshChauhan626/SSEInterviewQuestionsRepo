<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Design Quiz — 300 Questions</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #181c24;
    --border: #1e2433;
    --accent: #00e5ff;
    --accent2: #7c3aed;
    --accent3: #f59e0b;
    --correct: #10b981;
    --wrong: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --mono: 'JetBrains Mono', monospace;
    --display: 'Syne', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── SPLASH ── */
  #splash {
    position: fixed; inset: 0; z-index: 100;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
    gap: 1.5rem;
    padding: 3rem 1.5rem 4rem;
    overflow-y: auto;
  }
  .splash-badge {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-transform: uppercase;
    border: 1px solid var(--accent);
    padding: 0.35em 1em;
    opacity: 0;
    animation: fadeUp 0.6s 0.2s forwards;
  }
  .splash-title {
    font-family: var(--display);
    font-size: clamp(2.4rem, 7vw, 5rem);
    font-weight: 800;
    line-height: 1;
    text-align: center;
    opacity: 0;
    animation: fadeUp 0.6s 0.4s forwards;
  }
  .splash-title span { color: var(--accent); }
  .splash-sub {
    font-size: 0.85rem;
    color: var(--muted);
    text-align: center;
    max-width: 480px;
    line-height: 1.7;
    opacity: 0;
    animation: fadeUp 0.6s 0.6s forwards;
  }
  .topics-grid {
    display: flex; flex-wrap: wrap; gap: 0.5rem;
    justify-content: center; max-width: 600px;
    opacity: 0;
    animation: fadeUp 0.6s 0.8s forwards;
  }
  .topic-tag {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    padding: 0.3em 0.8em;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 2px;
  }
  .start-btn {
    margin-top: 0.5rem;
    padding: 0.9rem 3rem;
    background: var(--accent);
    color: #000;
    font-family: var(--mono);
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border: none; cursor: pointer;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    transition: transform 0.15s, box-shadow 0.15s;
    opacity: 0;
    animation: fadeUp 0.6s 1s forwards;
  }
  .start-btn:hover { transform: scale(1.04); box-shadow: 0 0 30px rgba(0,229,255,0.4); }

  /* ── MAIN APP ── */
  #app { display: none; position: relative; z-index: 1; max-width: 820px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 0 1.5rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2rem;
    flex-wrap: wrap; gap: 1rem;
  }
  .header-logo {
    font-family: var(--display);
    font-weight: 800; font-size: 1.1rem;
    color: var(--accent);
    letter-spacing: -0.02em;
  }
  .header-logo span { color: var(--text); }
  .progress-wrap { flex: 1; max-width: 300px; }
  .progress-label {
    display: flex; justify-content: space-between;
    font-size: 0.65rem; color: var(--muted); margin-bottom: 0.4rem;
    letter-spacing: 0.1em;
  }
  .progress-bar {
    height: 3px; background: var(--border); border-radius: 2px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--accent);
    transition: width 0.4s ease;
    box-shadow: 0 0 8px var(--accent);
  }
  .score-badge {
    font-size: 0.75rem;
    color: var(--accent3);
    border: 1px solid var(--accent3);
    padding: 0.3em 0.8em;
    letter-spacing: 0.1em;
  }

  /* Question card */
  .q-meta {
    display: flex; align-items: center; gap: 1rem;
    margin-bottom: 1.2rem; flex-wrap: wrap;
  }
  .q-num {
    font-size: 0.65rem; letter-spacing: 0.2em; color: var(--accent);
    text-transform: uppercase;
  }
  .q-category {
    font-size: 0.62rem; letter-spacing: 0.15em;
    color: var(--muted); text-transform: uppercase;
    border: 1px solid var(--border);
    padding: 0.2em 0.6em;
  }
  .q-text {
    font-family: var(--display);
    font-size: clamp(1rem, 2.5vw, 1.25rem);
    font-weight: 600;
    line-height: 1.5;
    margin-bottom: 2rem;
    color: var(--text);
  }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 0.75rem; }
  .option {
    position: relative;
    display: flex; align-items: flex-start; gap: 1rem;
    padding: 1rem 1.2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.1s;
    border-radius: 2px;
    text-align: left;
  }
  .option:hover:not(.disabled) {
    border-color: var(--accent);
    background: var(--surface2);
    transform: translateX(4px);
  }
  .option.correct { border-color: var(--correct); background: rgba(16,185,129,0.08); }
  .option.wrong   { border-color: var(--wrong);   background: rgba(239,68,68,0.08); }
  .option.disabled { cursor: default; }
  .opt-key {
    min-width: 26px; height: 26px;
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; font-weight: 700; color: var(--muted);
    flex-shrink: 0;
    transition: border-color 0.2s, color 0.2s;
  }
  .option.correct .opt-key { border-color: var(--correct); color: var(--correct); }
  .option.wrong   .opt-key { border-color: var(--wrong);   color: var(--wrong); }
  .option:hover:not(.disabled) .opt-key { border-color: var(--accent); color: var(--accent); }
  .opt-text { font-size: 0.88rem; line-height: 1.5; padding-top: 0.15rem; }

  /* Explanation */
  .explanation {
    margin-top: 1.5rem;
    padding: 1.2rem 1.4rem;
    background: var(--surface2);
    border-left: 3px solid var(--accent);
    display: none;
    animation: fadeUp 0.3s forwards;
  }
  .explanation.show { display: block; }
  .exp-label {
    font-size: 0.62rem; letter-spacing: 0.2em; color: var(--accent);
    text-transform: uppercase; margin-bottom: 0.6rem;
  }
  .exp-text { font-size: 0.84rem; line-height: 1.7; color: #94a3b8; }

  /* Nav */
  .nav {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 2rem; gap: 1rem; flex-wrap: wrap;
  }
  .nav-btn {
    padding: 0.75rem 2rem;
    font-family: var(--mono);
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    transition: 0.2s;
    clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .nav-btn.primary {
    background: var(--accent); color: #000;
    border-color: var(--accent);
  }
  .nav-btn.primary:hover { box-shadow: 0 0 20px rgba(0,229,255,0.35); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Result screen */
  #result {
    display: none; text-align: center;
    padding: 4rem 2rem;
    animation: fadeUp 0.5s forwards;
  }
  .result-title {
    font-family: var(--display);
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 800; margin-bottom: 0.5rem;
  }
  .result-score {
    font-size: clamp(3rem, 10vw, 6rem);
    font-family: var(--display);
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
    margin: 1rem 0;
    text-shadow: 0 0 60px rgba(0,229,255,0.4);
  }
  .result-grade {
    font-size: 1.1rem; color: var(--muted); margin-bottom: 2rem;
  }
  .result-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 1rem; max-width: 400px; margin: 0 auto 2.5rem;
  }
  .result-stat {
    background: var(--surface); border: 1px solid var(--border);
    padding: 1rem; border-radius: 2px;
  }
  .stat-val { font-size: 1.5rem; font-weight: 700; font-family: var(--display); }
  .stat-val.c { color: var(--correct); }
  .stat-val.w { color: var(--wrong); }
  .stat-val.s { color: var(--accent3); }
  .stat-lab { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.1em; margin-top: 0.2rem; }
  .restart-btn {
    padding: 0.9rem 3rem;
    background: var(--accent); color: #000;
    font-family: var(--mono); font-weight: 700;
    font-size: 0.9rem; letter-spacing: 0.15em;
    text-transform: uppercase; border: none; cursor: pointer;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .restart-btn:hover { transform: scale(1.04); box-shadow: 0 0 30px rgba(0,229,255,0.4); }

  /* Question dots minimap */
  .minimap {
    display: flex; flex-wrap: wrap; gap: 4px;
    margin-bottom: 1.5rem;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--border);
    transition: background 0.3s;
    cursor: pointer;
  }
  .dot.answered { background: var(--accent); }
  .dot.current  { background: var(--accent3); box-shadow: 0 0 6px var(--accent3); }
  .dot.correct-dot { background: var(--correct); }
  .dot.wrong-dot   { background: var(--wrong); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-anim { animation: fadeUp 0.3s forwards; }

  /* ── TOPIC SELECTION ── */
  .mode-tabs {
    display: flex; gap: 0.5rem;
    opacity: 0; animation: fadeUp 0.6s 0.7s forwards;
  }
  .mode-tab {
    padding: 0.45rem 1.2rem;
    font-family: var(--mono); font-size: 0.7rem;
    letter-spacing: 0.12em; text-transform: uppercase;
    border: 1px solid var(--border);
    background: transparent; color: var(--muted);
    cursor: pointer; transition: 0.2s;
    clip-path: polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%);
  }
  .mode-tab.active {
    background: var(--accent); color: #000;
    border-color: var(--accent);
  }
  .mode-tab:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

  #topicSelect {
    width: 100%; max-width: 640px;
    opacity: 0; animation: fadeUp 0.6s 0.85s forwards;
  }
  .topic-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 0.5rem;
  }
  .topic-btn {
    padding: 0.6rem 0.8rem;
    font-family: var(--mono); font-size: 0.68rem;
    letter-spacing: 0.08em; text-align: left;
    border: 1px solid var(--border);
    background: var(--surface); color: var(--muted);
    cursor: pointer; transition: 0.2s;
    border-radius: 2px; position: relative;
  }
  .topic-btn .t-count {
    display: block; font-size: 0.6rem;
    color: var(--accent); margin-top: 0.2rem;
  }
  .topic-btn:hover { border-color: var(--accent2); color: var(--text); background: var(--surface2); }
  .topic-btn.selected { border-color: var(--accent); color: var(--accent); background: rgba(0,229,255,0.07); }
  .topic-btn.selected::after {
    content: '✓';
    position: absolute; top: 0.4rem; right: 0.6rem;
    font-size: 0.65rem; color: var(--accent);
  }
  .sel-info {
    font-size: 0.7rem; color: var(--muted);
    text-align: center; margin-top: 0.5rem;
    letter-spacing: 0.05em;
  }
  .sel-info span { color: var(--accent3); }

  .quiz-mode-label {
    font-size: 0.62rem; letter-spacing: 0.18em;
    color: var(--accent2); text-transform: uppercase;
    border: 1px solid var(--accent2);
    padding: 0.2em 0.6em;
  }
</style>
</head>
<body>

<!-- ── SPLASH ── -->
<div id="splash">
  <div class="splash-badge">Interview Prep Series</div>
  <div class="splash-title">System<br><span>Design</span> Quiz</div>
  <div class="splash-sub" id="splashSub">300 curated MCQs across 29 topics. Pick a topic below or start all questions.</div>

  <!-- All Topics button -->
  <button class="start-btn" id="startBtn" onclick="startAll()">Start Full Quiz (All Topics) →</button>

  <!-- Topic grid — always visible -->
  <div style="width:100%;max-width:680px;">
    <div style="font-size:0.62rem;letter-spacing:0.2em;color:var(--accent);text-transform:uppercase;margin-bottom:0.75rem;opacity:0;animation:fadeUp 0.5s 1.1s forwards;">Or choose a topic:</div>
    <div class="topic-grid" id="topicGrid"></div>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">
  <div class="header">
    <div class="header-logo">SD<span>Quiz</span></div>
    <div class="progress-wrap">
      <div class="progress-label">
        <span id="progLabel">Q 1 / 300</span>
        <span id="progPct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
    </div>
    <div class="score-badge">Score: <span id="scoreDisplay">0</span></div>
  </div>

  <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.5rem;">
    <div class="quiz-mode-label" id="modeLabel">All Topics</div>
    <button style="font-family:var(--mono);font-size:0.65rem;letter-spacing:0.1em;padding:0.25em 0.8em;background:transparent;border:1px solid var(--border);color:var(--muted);cursor:pointer;text-transform:uppercase;" onclick="goHome()">← Change Mode</button>
  </div>
  <div class="minimap" id="minimap"></div>

  <div id="quizArea"></div>

  <div id="result">
    <div class="result-title">Quiz Complete 🎯</div>
    <div class="result-score" id="finalScore"></div>
    <div class="result-grade" id="finalGrade"></div>
    <div class="result-grid">
      <div class="result-stat"><div class="stat-val c" id="rCorrect">0</div><div class="stat-lab">CORRECT</div></div>
      <div class="result-stat"><div class="stat-val w" id="rWrong">0</div><div class="stat-lab">WRONG</div></div>
      <div class="result-stat"><div class="stat-val s" id="rSkipped">0</div><div class="stat-lab">SKIPPED</div></div>
    </div>
    <button class="restart-btn" onclick="restartQuiz()">Try Again →</button>
  </div>
</div>

<script>
const TOPICS = ["Scalability","Load Balancing","Caching","Databases","CAP Theorem","Consistency","Replication","Sharding","Microservices","Message Queues","CDN","API Design","Rate Limiting","SQL vs NoSQL","Hashing","Distributed Systems","Consensus Algorithms","Storage","Networking","Security","Observability","Service Discovery","Event-Driven","Data Pipelines","System Design Patterns","Kubernetes","Cloud","Database Internals","Design Problems"];

const ALL_QUESTIONS = [
  // ── SCALABILITY ──
  {cat:"Scalability",q:"What does horizontal scaling (scaling out) mean?",opts:["Increasing CPU and RAM of a single server","Adding more machines to distribute the load","Optimizing application code for performance","Partitioning data across databases"],ans:1,exp:"Horizontal scaling (scale-out) means adding more servers/nodes to handle increased load, distributing it across machines. Vertical scaling (scale-up) means upgrading hardware on a single machine."},
  {cat:"Scalability",q:"Which of the following is a key challenge when scaling stateful services horizontally?",opts:["More hardware costs","Session/state management across nodes","DNS resolution latency","Increased CPU usage"],ans:1,exp:"Stateful services store session data per server. When scaling horizontally, you need strategies like sticky sessions, distributed caches (Redis), or JWT tokens to share state across nodes."},
  {cat:"Scalability",q:"What is the primary purpose of a load balancer in a scalable system?",opts:["Encrypting traffic between services","Distributing incoming requests across multiple servers","Compressing HTTP responses","Caching frequently accessed data"],ans:1,exp:"A load balancer distributes incoming network traffic across multiple backend servers to ensure no single server is overwhelmed, improving availability and responsiveness."},
  {cat:"Scalability",q:"Which metric best indicates whether a system needs to scale?",opts:["Lines of code","CPU utilization consistently above 80%","Number of developers","Database schema complexity"],ans:1,exp:"Consistently high CPU utilization (above ~70-80%) indicates the system is struggling with load and may need to scale horizontally or vertically."},
  {cat:"Scalability",q:"What is 'elasticity' in cloud systems?",opts:["The ability to encrypt data at rest","Automatically adding/removing resources based on demand","Running applications in multiple regions","Replicating databases across data centers"],ans:1,exp:"Elasticity refers to the ability to automatically provision and de-provision resources dynamically in response to demand, typically associated with cloud auto-scaling."},

  // ── LOAD BALANCING ──
  {cat:"Load Balancing",q:"Which load balancing algorithm distributes requests one-by-one in order across servers?",opts:["Least Connections","IP Hash","Round Robin","Weighted Response Time"],ans:2,exp:"Round Robin cycles through servers in order, sending each new request to the next server. It's simple but doesn't account for server capacity or current load."},
  {cat:"Load Balancing",q:"What is the benefit of 'sticky sessions' (session affinity)?",opts:["Encrypts user sessions","Routes the same user to the same server","Reduces database calls","Improves DNS resolution speed"],ans:1,exp:"Sticky sessions ensure requests from a specific client are routed to the same server, which is useful for stateful applications that store session data locally."},
  {cat:"Load Balancing",q:"Layer 7 load balancing operates at which OSI layer?",opts:["Transport Layer","Network Layer","Application Layer","Data Link Layer"],ans:2,exp:"Layer 7 (Application Layer) load balancers can inspect HTTP headers, cookies, and URLs to make intelligent routing decisions, unlike L4 which only sees TCP/UDP."},
  {cat:"Load Balancing",q:"Which algorithm routes requests to the server with the fewest active connections?",opts:["Round Robin","Random","Least Connections","IP Hash"],ans:2,exp:"The Least Connections algorithm sends new requests to the server with the fewest active connections, suitable for sessions with variable duration."},
  {cat:"Load Balancing",q:"What is a 'health check' in the context of load balancers?",opts:["Monitoring CPU temperature of servers","Periodic probes to detect and remove unhealthy backend servers","Encrypting health data","Checking database query performance"],ans:1,exp:"Load balancers perform health checks (e.g., HTTP pings) on backend servers. Unhealthy servers are removed from the pool to prevent requests from being routed to them."},

  // ── CACHING ──
  {cat:"Caching",q:"What does a cache-aside (lazy loading) strategy do?",opts:["Pre-loads all data into cache on startup","Application loads data into cache only on cache miss","Writes to cache and database simultaneously","Evicts data after a fixed time"],ans:1,exp:"In cache-aside, the application first checks the cache. On a miss, it reads from the DB, stores the result in cache, and returns it. Cache is populated lazily, only when needed."},
  {cat:"Caching",q:"Which cache eviction policy removes the least recently used item?",opts:["FIFO","LFU","LRU","MRU"],ans:2,exp:"LRU (Least Recently Used) evicts the item that hasn't been accessed for the longest time. It's one of the most widely used eviction policies in practice."},
  {cat:"Caching",q:"What is a 'cache stampede' (thundering herd) problem?",opts:["Cache running out of memory","Multiple requests simultaneously hitting the DB when a cached item expires","Slow network causing cache misses","Cache nodes failing one by one"],ans:1,exp:"A cache stampede occurs when a popular cached key expires and many concurrent requests all miss the cache simultaneously, flooding the database. Mitigations include mutex locking and probabilistic early expiration."},
  {cat:"Caching",q:"In a write-through cache strategy, data is:",opts:["Written only to cache and DB is updated later","Written to cache and database simultaneously","Written only to the database","Written to multiple cache layers"],ans:1,exp:"Write-through ensures data is written to both the cache and the database at the same time, keeping them consistent. The tradeoff is higher write latency."},
  {cat:"Caching",q:"Which distributed caching system is known for supporting data structures like lists, sets, and hashes?",opts:["Memcached","Varnish","Redis","Squid"],ans:2,exp:"Redis supports rich data structures (strings, lists, sets, sorted sets, hashes, etc.) making it very versatile for caching, session storage, pub/sub, and more."},
  {cat:"Caching",q:"What is a CDN cache used for?",opts:["Caching database queries","Storing static assets closer to end users globally","Managing application session state","Accelerating microservice communication"],ans:1,exp:"A CDN (Content Delivery Network) caches static assets (images, CSS, JS, videos) at edge servers distributed globally, reducing latency for end users."},

  // ── DATABASES ──
  {cat:"Databases",q:"What is database sharding?",opts:["Creating read replicas for performance","Partitioning data horizontally across multiple databases","Encrypting database columns","Indexing all columns for faster queries"],ans:1,exp:"Sharding splits a large database into smaller pieces (shards) stored on different servers based on a shard key, allowing the system to scale horizontally."},
  {cat:"Databases",q:"What does ACID stand for in database transactions?",opts:["Availability, Consistency, Integrity, Durability","Atomicity, Consistency, Isolation, Durability","Atomicity, Concurrency, Integrity, Distribution","Availability, Concurrency, Isolation, Distribution"],ans:1,exp:"ACID: Atomicity (all or nothing), Consistency (valid state transitions), Isolation (concurrent transactions don't interfere), Durability (committed data persists). Fundamental for relational databases."},
  {cat:"Databases",q:"Which SQL isolation level prevents dirty reads but allows non-repeatable reads?",opts:["Read Uncommitted","Read Committed","Repeatable Read","Serializable"],ans:1,exp:"Read Committed prevents reading uncommitted data (dirty reads) but allows a row to change between two reads in the same transaction (non-repeatable read)."},
  {cat:"Databases",q:"What is a covering index?",opts:["An index that covers all rows in a table","An index that contains all columns needed by a query, avoiding table lookup","An index on encrypted columns","A partial index on a subset of rows"],ans:1,exp:"A covering index includes all the columns a query needs, so the DB engine can satisfy the query using only the index without accessing the actual table rows, greatly improving performance."},
  {cat:"Databases",q:"What problem does the N+1 query problem describe?",opts:["A query that returns N+1 rows unexpectedly","Executing 1 query to fetch a list, then N additional queries for each item","Running the same query N+1 times due to cache miss","Inserting N+1 duplicate records"],ans:1,exp:"The N+1 problem occurs when code fetches a list (1 query) then loops through fetching related data individually (N queries), causing poor performance. Solved with JOIN or eager loading."},
  {cat:"Databases",q:"Which type of database is best suited for storing highly connected data with complex relationships?",opts:["Columnar database","Key-Value store","Graph database","Time-series database"],ans:2,exp:"Graph databases (Neo4j, Amazon Neptune) store data as nodes and edges, making them ideal for highly connected data like social networks, recommendation engines, and fraud detection."},
  {cat:"Databases",q:"What is the purpose of a WAL (Write-Ahead Log) in databases?",opts:["Caching write operations in memory","Ensuring durability and recovery by logging changes before applying them","Replicating data to secondary nodes","Compressing database files"],ans:1,exp:"WAL logs every change to disk before applying it to the actual data pages. This ensures crash recovery: if the DB crashes mid-transaction, it can replay or roll back using the log."},

  // ── CAP THEOREM ──
  {cat:"CAP Theorem",q:"What does the CAP theorem state?",opts:["Any system can achieve Consistency, Availability, and Partition Tolerance simultaneously","A distributed system can guarantee at most two of: Consistency, Availability, Partition Tolerance","Distributed systems must sacrifice consistency for availability","Network partitions never occur in well-designed systems"],ans:1,exp:"CAP theorem (Brewer's theorem) states that in the presence of a network partition, a distributed system must choose between Consistency and Availability. You can't have all three simultaneously."},
  {cat:"CAP Theorem",q:"Which type of system prioritizes Consistency and Partition Tolerance (CP)?",opts:["Amazon DynamoDB (eventual consistency mode)","Apache Cassandra","HBase and Zookeeper","CouchDB"],ans:2,exp:"CP systems (e.g., HBase, Zookeeper, MongoDB in strong consistency mode) sacrifice availability during partitions to maintain consistent data across nodes."},
  {cat:"CAP Theorem",q:"In CAP theorem, what does 'Availability' mean?",opts:["Data is always accurate and never stale","Every request receives a non-error response (though not necessarily the latest data)","All nodes have the same data at all times","The system never goes down"],ans:1,exp:"Availability in CAP means every request receives a response (not necessarily the most recent data). An AP system stays responsive during a partition but may return stale data."},
  {cat:"CAP Theorem",q:"PACELC extends the CAP theorem by adding which consideration?",opts:["Performance and Consistency","Latency and Consistency trade-offs even when there's no partition","Partition tolerance and eventual consistency","Physical and logical replication"],ans:1,exp:"PACELC (Patterson et al.) says: if there's a Partition, choose between A and C; Else (when no partition), choose between Latency and Consistency. It captures the everyday tradeoff, not just failure scenarios."},

  // ── CONSISTENCY ──
  {cat:"Consistency",q:"What is eventual consistency?",opts:["Data is always consistent across all nodes at query time","Given enough time without new updates, all replicas will converge to the same value","All writes are rejected unless all nodes agree","Transactions are serialized globally"],ans:1,exp:"Eventual consistency guarantees that if no new updates are made to an object, eventually all reads will return the last updated value. Used in AP systems like DynamoDB, Cassandra."},
  {cat:"Consistency",q:"What is strong (linearizable) consistency?",opts:["All nodes eventually agree","Every read reflects the most recent write, as if operations execute instantaneously","Reads may return stale data under load","Only the primary node handles writes"],ans:1,exp:"Linearizability (strong consistency) means all operations appear to execute atomically in real-time order. Any read after a write must return that write's value."},
  {cat:"Consistency",q:"What is 'read-your-writes' consistency?",opts:["All users see each other's writes immediately","A user always sees their own most recent writes when reading","Writes are echoed back to the client immediately","Read operations are batched for consistency"],ans:1,exp:"Read-your-writes (read-your-own-writes) guarantees that after a client performs a write, subsequent reads by that same client will reflect that write, even before it propagates everywhere."},

  // ── REPLICATION ──
  {cat:"Replication",q:"What is the difference between synchronous and asynchronous replication?",opts:["Sync uses TCP, async uses UDP","In sync replication, the primary waits for replicas to acknowledge before confirming write; async doesn't wait","Sync replicates schema only; async replicates data","Async replication is used only for caching"],ans:1,exp:"Synchronous replication ensures durability (replica confirms before write returns) but adds latency. Asynchronous replication is faster but risks data loss if primary fails before replica syncs."},
  {cat:"Replication",q:"What is a leader-follower (master-slave) replication pattern?",opts:["All nodes accept reads and writes equally","One node (leader) accepts writes; followers replicate and serve reads","Multiple leaders each handle a geographic region","Each node replicates only a subset of data"],ans:1,exp:"In leader-follower replication, the primary/leader handles all writes. Followers replicate data from the leader and can serve reads, reducing read load on the leader."},
  {cat:"Replication",q:"What is multi-leader (multi-master) replication's main challenge?",opts:["Higher storage costs","Write conflicts when the same data is modified on different leaders concurrently","Slower read performance","Incompatibility with relational databases"],ans:1,exp:"Multi-leader replication allows writes on multiple nodes, improving availability and geo-distribution. The challenge is resolving write conflicts when the same data is updated on different leaders simultaneously."},
  {cat:"Replication",q:"What is the purpose of a replication lag?",opts:["The delay in encrypting replicated data","The time lag between a write on the primary and its appearance on replicas","The latency added by load balancers","The wait time before a failed node recovers"],ans:1,exp:"Replication lag is the delay between a write on the primary and its propagation to replicas. High replication lag can cause stale reads and is a concern in asynchronous replication."},

  // ── SHARDING ──
  {cat:"Sharding",q:"What is consistent hashing used for in distributed systems?",opts:["Encrypting data before storage","Distributing keys across nodes so that adding/removing nodes minimizes remapping","Ensuring all queries hit the same database node","Compressing data for efficient storage"],ans:1,exp:"Consistent hashing maps keys to nodes on a ring. When a node is added or removed, only a fraction of keys (1/n) need remapping, unlike modular hashing where almost all keys change."},
  {cat:"Sharding",q:"What is a 'hot shard' problem?",opts:["A shard running at high temperature","One shard receiving disproportionately more traffic than others","Too many shards for the cluster size","Shards that replicate too frequently"],ans:1,exp:"A hot shard (hot spot) occurs when a shard key causes uneven distribution—e.g., all celebrity user data going to one shard. This overwhelms one node while others are underutilized."},
  {cat:"Sharding",q:"What is the main drawback of range-based sharding?",opts:["High storage requirements per shard","Susceptible to hot spots if data is not evenly distributed across ranges","Requires consistent hashing","Cannot support secondary indexes"],ans:1,exp:"Range-based sharding splits data by key ranges (e.g., A-M, N-Z). If access patterns are skewed (e.g., recent dates get more traffic), some shards become hot spots while others sit idle."},

  // ── MICROSERVICES ──
  {cat:"Microservices",q:"What is the 'strangler fig' pattern for microservices migration?",opts:["Immediately replacing the monolith with microservices","Gradually routing features to new microservices while the monolith shrinks over time","Running microservices alongside a monolith without interaction","Breaking apart databases before services"],ans:1,exp:"The strangler fig pattern incrementally replaces a monolith by routing specific functionality to new microservices over time. The monolith 'strangles' as more routes are redirected, reducing risk."},
  {cat:"Microservices",q:"What is a service mesh in microservices architecture?",opts:["A UI layer connecting multiple front-end services","An infrastructure layer managing service-to-service communication with features like load balancing, observability, and mTLS","A database replication topology","A caching strategy for microservices"],ans:1,exp:"A service mesh (e.g., Istio, Linkerd) provides a dedicated infrastructure layer for service-to-service communication, handling traffic management, security (mTLS), and observability transparently."},
  {cat:"Microservices",q:"What is the saga pattern used for in microservices?",opts:["Service discovery between microservices","Managing distributed transactions across multiple services without 2PC","Scaling microservices automatically","Aggregating logs from multiple services"],ans:1,exp:"The Saga pattern manages distributed transactions through a sequence of local transactions, each publishing events. If one fails, compensating transactions roll back previous steps—avoiding distributed ACID transactions."},
  {cat:"Microservices",q:"Which communication pattern uses a message broker and is asynchronous?",opts:["REST over HTTP","gRPC","Event-driven / message queue (e.g., Kafka, RabbitMQ)","GraphQL subscriptions over WebSocket"],ans:2,exp:"Event-driven communication uses a message broker (Kafka, RabbitMQ, SQS) where producers publish events and consumers subscribe. This decouples services and improves resilience."},
  {cat:"Microservices",q:"What is the API gateway pattern?",opts:["A database abstraction layer for microservices","A single entry point for all client requests that routes to appropriate backend services","A caching proxy for microservice responses","A service registry for microservice discovery"],ans:1,exp:"An API gateway is a reverse proxy that sits in front of microservices, handling routing, authentication, rate limiting, SSL termination, and response aggregation—simplifying the client interface."},

  // ── MESSAGE QUEUES ──
  {cat:"Message Queues",q:"What is the main benefit of using a message queue?",opts:["Increases query speed","Decouples producers from consumers and enables async processing","Replaces the need for a database","Encrypts all inter-service communication"],ans:1,exp:"Message queues decouple services so producers don't wait for consumers. This enables async processing, load leveling, retry logic, and system resilience when downstream services are slow or down."},
  {cat:"Message Queues",q:"What is a 'dead letter queue' (DLQ)?",opts:["A queue for deleted messages","A queue for messages that failed processing after max retries","A queue with zero consumers","A queue used in read-heavy systems"],ans:1,exp:"A DLQ holds messages that couldn't be successfully processed after a configured number of retries. It allows debugging failed messages without blocking the main queue."},
  {cat:"Message Queues",q:"Apache Kafka stores messages in what structure?",opts:["Hash tables","Circular buffers","Append-only log partitions","Binary trees"],ans:2,exp:"Kafka stores messages as append-only log segments per partition. This allows sequential disk I/O (very fast), message replay, and horizontal scaling via partition distribution across brokers."},
  {cat:"Message Queues",q:"What is the difference between a queue and a topic in messaging?",opts:["Queues are for files, topics for text","In a queue, each message is consumed once by one consumer; in a topic, multiple consumers can receive the same message (pub/sub)","Topics support ordering, queues do not","Queues are asynchronous, topics are synchronous"],ans:1,exp:"Queues deliver each message to exactly one consumer (point-to-point). Topics (pub/sub) broadcast messages to all subscribed consumers. Kafka uses topics with consumer groups for both patterns."},
  {cat:"Message Queues",q:"What does 'exactly-once delivery' mean in messaging systems?",opts:["Messages are retried until acknowledged","Each message is delivered and processed exactly one time, with no duplicates","Messages are sent once and never retried","Consumers only receive messages while online"],ans:1,exp:"Exactly-once semantics ensures each message is processed exactly once—not lost (at-least-once) nor processed multiple times. It's complex to achieve, requiring idempotent consumers or transactional producers."},

  // ── CDN ──
  {cat:"CDN",q:"What is a CDN's primary function?",opts:["Routing packets between data centers","Delivering content from servers geographically closer to the user","Encrypting all web traffic","Load balancing application servers"],ans:1,exp:"A CDN (Content Delivery Network) caches and serves content from edge servers distributed globally, reducing latency by serving users from nearby nodes instead of origin servers."},
  {cat:"CDN",q:"What is 'cache invalidation' in a CDN?",opts:["Removing expired SSL certificates","Forcing edge nodes to fetch fresh content before the TTL expires","Adding new cache nodes to the CDN","Preventing bots from caching content"],ans:1,exp:"Cache invalidation is the process of forcing CDN edge servers to remove or refresh cached content before its TTL expires, typically done after deploying updates to avoid serving stale assets."},
  {cat:"CDN",q:"What is an 'origin server' in CDN terminology?",opts:["The CDN edge node closest to the user","The primary server hosting the original content that CDN caches from","The DNS server for the CDN","A backup server in the CDN network"],ans:1,exp:"The origin server is the main server that hosts the actual content. CDN edge servers pull content from the origin on cache miss and cache it locally for future requests."},

  // ── API DESIGN ──
  {cat:"API Design",q:"What does REST stand for?",opts:["Remote Execution State Transfer","Representational State Transfer","Request Exchange Standard Technology","Reliable Event Stream Transfer"],ans:1,exp:"REST (Representational State Transfer) is an architectural style for distributed hypermedia systems. RESTful APIs use HTTP methods (GET, POST, PUT, DELETE) and stateless communication."},
  {cat:"API Design",q:"What is idempotency in API design?",opts:["The API returns the same schema for all requests","Making the same request multiple times has the same effect as making it once","Requests are encrypted end-to-end","The API is backwards compatible with all versions"],ans:1,exp:"An idempotent operation produces the same result no matter how many times it's called. GET, PUT, DELETE are idempotent; POST is not by default. Critical for safe retries in distributed systems."},
  {cat:"API Design",q:"What is the main advantage of gRPC over REST?",opts:["gRPC uses JSON which is easier to debug","gRPC uses HTTP/2 with Protocol Buffers for binary serialization, offering lower latency and better performance","gRPC supports browser clients natively","gRPC doesn't require schema definitions"],ans:1,exp:"gRPC uses HTTP/2 (multiplexing, server push) and Protocol Buffers (compact binary format) for fast, efficient communication—ideal for internal microservice communication with strict performance needs."},
  {cat:"API Design",q:"What is GraphQL and its key benefit?",opts:["A graph database query language","A query language for APIs that lets clients request exactly the data they need, reducing over-fetching","A REST alternative that uses websockets","A caching protocol for APIs"],ans:1,exp:"GraphQL allows clients to specify exactly what data they need in a single request, eliminating over-fetching and under-fetching problems common in REST. The server returns precisely the requested fields."},
  {cat:"API Design",q:"What is API versioning and why is it needed?",opts:["Counting API requests per second","Managing different versions of an API to ensure backward compatibility when introducing breaking changes","Encrypting API keys per version","Caching API responses by version"],ans:1,exp:"API versioning (via URI path /v1/, headers, or query params) allows APIs to evolve by introducing breaking changes in new versions without disrupting existing clients still using older versions."},
  {cat:"API Design",q:"What is a webhook?",opts:["A type of API key","An HTTP callback triggered by an event, where the server pushes data to a registered URL","A polling mechanism for APIs","A REST endpoint that accepts only XML"],ans:1,exp:"Webhooks are reverse APIs—instead of polling, the server sends an HTTP POST to a registered URL when an event occurs. Used for real-time notifications (Stripe payment events, GitHub push events)."},

  // ── RATE LIMITING ──
  {cat:"Rate Limiting",q:"What algorithm tracks a sliding window of request timestamps for rate limiting?",opts:["Token bucket","Fixed window counter","Sliding window log","Leaky bucket"],ans:2,exp:"The sliding window log algorithm stores timestamps of each request. It counts requests in the rolling window [now - window_size, now], providing accurate rate limiting without the boundary issues of fixed windows."},
  {cat:"Rate Limiting",q:"What is the token bucket algorithm?",opts:["Limits requests by counting in fixed time windows","Tokens are added to a bucket at a fixed rate; each request consumes a token; requests are rejected when bucket is empty","Queues excess requests in a bucket","Maps client IPs to request buckets"],ans:1,exp:"Token bucket allows bursting: tokens accumulate up to bucket capacity, and each request consumes one. It smooths traffic while allowing short bursts, used by AWS API Gateway and others."},
  {cat:"Rate Limiting",q:"Where is rate limiting best implemented in a large system?",opts:["Inside each microservice independently","At the API gateway or a dedicated rate limiting service","On the database","Inside the client application"],ans:1,exp:"Implementing rate limiting at the API gateway centralizes enforcement, prevents it needing to be duplicated per service, and protects the entire backend. A dedicated service can share state across gateway instances."},
  {cat:"Rate Limiting",q:"What is the difference between rate limiting and throttling?",opts:["They are the same thing","Rate limiting sets a maximum request count; throttling reduces the speed/rate of processing requests","Throttling rejects requests; rate limiting queues them","Rate limiting is per user; throttling is per service"],ans:1,exp:"Rate limiting caps the number of requests allowed in a period (reject over limit). Throttling reduces the processing rate of requests (slow down or queue instead of reject). Often used together."},

  // ── SQL vs NoSQL ──
  {cat:"SQL vs NoSQL",q:"Which type of NoSQL database is best for storing user sessions or shopping carts?",opts:["Document store","Columnar database","Key-Value store","Graph database"],ans:2,exp:"Key-Value stores (Redis, DynamoDB in simple mode) offer O(1) lookups by key, making them ideal for sessions, caches, shopping carts—where you access data by a known identifier."},
  {cat:"SQL vs NoSQL",q:"What is a columnar database optimized for?",opts:["OLTP workloads with frequent row inserts","Analytical queries (OLAP) reading many rows but few columns","Storing JSON documents","Graph traversal queries"],ans:1,exp:"Columnar databases (Redshift, BigQuery, Cassandra) store data by column rather than row, enabling efficient compression and reading only relevant columns—ideal for analytics and aggregations."},
  {cat:"SQL vs NoSQL",q:"What does 'schema-less' mean in NoSQL databases?",opts:["The database has no access control","Documents in the same collection can have different fields and structures","No indexes are maintained","All data must be stored as strings"],ans:1,exp:"Schema-less (flexible schema) means documents/records can have different structures. In MongoDB, one document might have 3 fields and another 10. Good for evolving data models but requires careful application-level handling."},
  {cat:"SQL vs NoSQL",q:"Which SQL feature is hardest to replicate in most NoSQL databases?",opts:["Simple CRUD operations","Multi-document/cross-collection ACID transactions with complex joins","Storing large text fields","Sorting results"],ans:1,exp:"Complex multi-table JOINs and multi-document ACID transactions are difficult in most NoSQL databases, which are designed for denormalized data and don't natively support relational joins."},
  {cat:"SQL vs NoSQL",q:"When is a time-series database the right choice?",opts:["Storing user profiles","Storing and querying data that is primarily indexed by time (metrics, logs, sensor data)","Managing e-commerce inventory","Handling graph relationships"],ans:1,exp:"Time-series databases (InfluxDB, TimescaleDB, Prometheus) are optimized for time-stamped data—IoT sensors, application metrics, financial ticks. They offer efficient storage and fast time-range queries."},

  // ── HASHING ──
  {cat:"Hashing",q:"What is a hash function's key property for use in hash tables?",opts:["It must be reversible (decryptable)","It maps input to a fixed-size output deterministically and uniformly","It always produces unique outputs","It requires a secret key"],ans:1,exp:"A good hash function maps inputs to a fixed-size output (deterministic), distributes values uniformly to minimize collisions, and is fast to compute. Reversibility is NOT required (and for cryptographic hashing, undesirable)."},
  {cat:"Hashing",q:"What is consistent hashing's main advantage over modular hashing?",opts:["Lower computational complexity","When nodes are added/removed, only K/n keys need to be remapped instead of almost all keys","It prevents hash collisions entirely","It works only with prime number of nodes"],ans:1,exp:"With modular hashing (key % n), changing n remaps almost all keys. Consistent hashing minimizes remapping: adding/removing one node only affects ~1/n of the total keys."},
  {cat:"Hashing",q:"What is a 'virtual node' in consistent hashing?",opts:["A simulated server for testing","Each physical node is represented multiple times on the ring to improve load distribution","A node with no data","A CDN edge node"],ans:1,exp:"Virtual nodes (vnodes) assign each physical server multiple points on the consistent hash ring. This improves load balance and allows for proportional distribution when nodes have different capacities."},

  // ── DISTRIBUTED SYSTEMS ──
  {cat:"Distributed Systems",q:"What is the 'two generals problem'?",opts:["How two databases reach consensus on writes","Demonstrates that 100% reliable agreement between two parties over an unreliable channel is impossible","How to split traffic between two data centers","Managing two leader nodes in a cluster"],ans:1,exp:"The Two Generals Problem shows it's impossible for two nodes communicating over an unreliable network to achieve guaranteed consensus. It illustrates the fundamental challenge of distributed agreement."},
  {cat:"Distributed Systems",q:"What is the purpose of a heartbeat mechanism in distributed systems?",opts:["Monitoring CPU usage of servers","Detecting node failures by checking if a node regularly sends periodic signals","Replicating data between nodes","Load balancing traffic across nodes"],ans:1,exp:"Heartbeats are periodic signals sent between nodes to indicate liveness. If a node stops sending heartbeats, it's presumed failed, allowing the cluster to trigger failover or rebalancing."},
  {cat:"Distributed Systems",q:"What is 'split brain' in distributed systems?",opts:["A bug causing a single node to run multiple processes","When a network partition causes multiple nodes to independently assume they are the leader","A database consistency error","When cache and database get out of sync"],ans:1,exp:"Split brain occurs when a network partition isolates nodes into groups, and each group independently elects a leader. This can cause conflicting writes. Quorum-based consensus prevents split brain."},
  {cat:"Distributed Systems",q:"What is vector clock used for?",opts:["Measuring processing latency per node","Tracking causality and ordering of events across distributed nodes without a global clock","Synchronizing clocks across data centers","Counting requests per server"],ans:1,exp:"Vector clocks capture causal relationships between events in distributed systems. Each node maintains a counter vector; by comparing clocks, the system can determine if events are concurrent or causally ordered."},
  {cat:"Distributed Systems",q:"What does 'idempotent consumer' mean in distributed messaging?",opts:["A consumer that processes messages in order","A consumer that can safely process the same message multiple times without unintended side effects","A consumer subscribed to multiple topics","A consumer that batches messages"],ans:1,exp:"An idempotent consumer produces the same result even when processing duplicate messages. Essential for at-least-once delivery systems to prevent double-charging or duplicate record creation."},
  {cat:"Distributed Systems",q:"What is the purpose of a circuit breaker pattern?",opts:["Limiting the number of concurrent database connections","Preventing cascading failures by stopping calls to a failing service after repeated errors","Encrypting traffic between services","Managing API versioning"],ans:1,exp:"A circuit breaker monitors failures. When errors exceed a threshold, it 'opens' and stops requests to the failing service, allowing it to recover. After a timeout, it tests with limited requests ('half-open' state)."},

  // ── CONSENSUS ALGORITHMS ──
  {cat:"Consensus Algorithms",q:"What is the Raft algorithm designed for?",opts:["Encrypting data across distributed nodes","Achieving distributed consensus on a replicated log with a clear leader election mechanism","Optimizing database query plans","Balancing load across microservices"],ans:1,exp:"Raft is a consensus algorithm designed to be more understandable than Paxos. It elects a leader, replicates log entries from leader to followers, and commits entries once a majority acknowledges them."},
  {cat:"Consensus Algorithms",q:"What is a 'quorum' in distributed consensus?",opts:["A single designated leader node","The minimum number of nodes that must agree for an operation to be considered successful","The total number of nodes in a cluster","A fallback mechanism for failed nodes"],ans:1,exp:"A quorum is a majority vote (n/2 + 1 nodes). Requiring a quorum for reads and writes ensures that at least one node in any quorum has the latest committed value, maintaining consistency despite failures."},
  {cat:"Consensus Algorithms",q:"What makes the Paxos algorithm difficult to implement?",opts:["It requires synchronous clocks","Its complexity and the many edge cases in multi-Paxos for practical systems","It only works with 3 nodes","It requires a shared filesystem"],ans:1,exp:"Paxos is notoriously difficult to implement correctly. The basic protocol handles single values, but extending to a replicated log (Multi-Paxos) and handling leader failures, holes in the log, etc. adds significant complexity."},
  {cat:"Consensus Algorithms",q:"What is the 'leader election' problem in distributed systems?",opts:["How a user is assigned an account admin role","How distributed nodes agree on which single node should coordinate operations","How a load balancer is selected","How primary and replica databases are assigned"],ans:1,exp:"Leader election is the process by which distributed nodes agree on a single coordinator (leader) that handles writes or coordination. Algorithms like Raft, ZAB (ZooKeeper), and Bully are used for this."},

  // ── STORAGE ──
  {cat:"Storage",q:"What is the difference between block storage, file storage, and object storage?",opts:["They only differ in storage capacity","Block: raw volumes (like hard drives); File: filesystem with directories; Object: flat store with keys and metadata, infinitely scalable","Block is for databases, file is for images, object is for code","They all use the same underlying mechanism"],ans:1,exp:"Block storage (EBS) provides raw disk partitions. File storage (EFS, NFS) provides hierarchical file systems. Object storage (S3) stores flat objects with metadata, offering massive scale and HTTP access."},
  {cat:"Storage",q:"What is RAID 1 used for?",opts:["Striping data across disks for performance","Mirroring data across two disks for redundancy","Distributing parity across multiple disks","Combining RAID 0 and RAID 1 configurations"],ans:1,exp:"RAID 1 mirrors data across two disks. Every write goes to both disks. If one fails, data is preserved on the other. Provides redundancy but uses 2x storage with no performance gain on writes."},
  {cat:"Storage",q:"What does LSM (Log-Structured Merge) tree optimize for?",opts:["Read-heavy workloads with frequent point queries","Write-heavy workloads by converting random writes to sequential disk writes","In-memory caching of hot data","Columnar compression of large datasets"],ans:1,exp:"LSM trees (used in Cassandra, LevelDB, RocksDB) buffer writes in memory (memtable), flush sorted runs to disk (SSTables), and merge them. This converts random writes to sequential, achieving very high write throughput."},
  {cat:"Storage",q:"What is the purpose of a checksum in storage systems?",opts:["Compressing stored data","Detecting data corruption by verifying stored data matches its recorded checksum","Encrypting data at rest","Indexing data for fast retrieval"],ans:1,exp:"Checksums (CRC32, MD5, SHA-256) generate a fixed-size hash of data. When reading, the checksum is recomputed and compared to the stored value. A mismatch indicates corruption."},

  // ── NETWORKING ──
  {cat:"Networking",q:"What is a TCP three-way handshake?",opts:["Three retries before a TCP connection is dropped","SYN → SYN-ACK → ACK: the process to establish a TCP connection","Encrypting three packets for security","Three-step DNS resolution process"],ans:1,exp:"TCP connection establishment uses three steps: Client sends SYN, server responds SYN-ACK, client sends ACK. After this the connection is established and data can flow."},
  {cat:"Networking",q:"What is the difference between TCP and UDP?",opts:["TCP is faster, UDP is more reliable","TCP provides reliable, ordered delivery with acknowledgments; UDP is faster but has no guarantees","TCP is for HTTP, UDP is for HTTPS","UDP supports more concurrent connections"],ans:1,exp:"TCP guarantees delivery, ordering, and error correction through acknowledgments and retransmission. UDP is connectionless with no delivery guarantees—ideal for real-time apps (video, DNS) where speed trumps reliability."},
  {cat:"Networking",q:"What is DNS and what does it do?",opts:["Encrypts network traffic","Translates human-readable domain names into IP addresses","Routes packets between routers","Assigns IP addresses to devices on a network"],ans:1,exp:"DNS (Domain Name System) is the internet's phonebook—it resolves human-readable hostnames (google.com) to IP addresses. It's hierarchical (root → TLD → authoritative) and heavily cached."},
  {cat:"Networking",q:"What is a reverse proxy and how does it differ from a forward proxy?",opts:["They are identical in function","A forward proxy hides clients from servers; a reverse proxy sits in front of servers and handles requests on their behalf","A reverse proxy handles only HTTPS","A forward proxy caches server responses; a reverse proxy does not"],ans:1,exp:"A forward proxy hides client identity from servers (e.g., VPN). A reverse proxy (nginx, HAProxy) hides server details from clients, enabling load balancing, SSL termination, and caching."},
  {cat:"Networking",q:"What is a WebSocket and when is it used?",opts:["An upgraded HTTPS connection for file transfer","A persistent full-duplex communication channel between client and server over a single TCP connection","A proxy protocol for HTTP/2","A type of REST endpoint"],ans:1,exp:"WebSockets provide persistent, bi-directional communication channels, ideal for real-time applications like chat, live dashboards, collaborative editing, and gaming—where the server needs to push data to clients."},
  {cat:"Networking",q:"What is HTTP/2's main improvement over HTTP/1.1?",opts:["Binary encoding only","Multiplexing multiple requests over a single connection, header compression, and server push","Mandatory HTTPS encryption","Longer timeout windows"],ans:1,exp:"HTTP/2 introduced multiplexing (multiple requests/responses over one TCP connection without head-of-line blocking), header compression (HPACK), server push, and binary framing—significantly improving performance."},

  // ── SECURITY ──
  {cat:"Security",q:"What is OAuth 2.0 used for?",opts:["Encrypting database passwords","Authorization framework allowing third-party apps limited access to user accounts without sharing credentials","Authenticating users with username/password","Encrypting API responses"],ans:1,exp:"OAuth 2.0 is an authorization framework. It lets users grant third-party apps limited access to their resources (e.g., 'Login with Google') without sharing passwords, using access tokens."},
  {cat:"Security",q:"What is the difference between authentication and authorization?",opts:["They are synonymous","Authentication verifies who you are; authorization determines what you are allowed to do","Authorization verifies identity; authentication grants access","Authentication is for APIs; authorization is for UIs"],ans:1,exp:"Authentication (authn) verifies identity: 'Who are you?' (username/password, MFA). Authorization (authz) determines permissions: 'What are you allowed to do?' (RBAC, policies). Both are required for secure systems."},
  {cat:"Security",q:"What is a JWT (JSON Web Token)?",opts:["A session cookie format","A compact, URL-safe token containing claims, signed by the server, used for stateless authentication","An encrypted database connection string","A format for encrypting API keys"],ans:1,exp:"A JWT is a base64-encoded JSON object with header, payload (claims), and signature. The server signs it; clients include it in requests. The server verifies the signature without needing a session store—enabling stateless auth."},
  {cat:"Security",q:"What is SQL injection and how is it prevented?",opts:["A technique to speed up SQL queries","Inserting malicious SQL code through user input to manipulate queries; prevented via parameterized queries/prepared statements","A way to merge multiple SQL databases","A method for encrypting SQL data"],ans:1,exp:"SQL injection occurs when user input is concatenated into SQL queries, allowing attackers to modify query logic. Prevention: use parameterized queries (prepared statements) and ORM frameworks that handle escaping."},
  {cat:"Security",q:"What is mutual TLS (mTLS)?",opts:["TLS with two SSL certificates on the server","Both client and server present certificates to authenticate each other during TLS handshake","A faster version of TLS for microservices","TLS applied twice for extra security"],ans:1,exp:"mTLS requires both the client and server to present and verify X.509 certificates. It provides two-way authentication—ensuring both parties are trusted—commonly used for service-to-service auth in microservices."},

  // ── ADDITIONAL IMPORTANT TOPICS ──
  {cat:"Distributed Systems",q:"What is the purpose of Zookeeper in distributed systems?",opts:["A NoSQL database for large datasets","Distributed coordination service for configuration, naming, synchronization, and leader election","A message queue for microservices","A caching layer for distributed data"],ans:1,exp:"ZooKeeper provides distributed coordination: configuration management, naming, distributed synchronization, and group services. Used by Kafka, HBase, and others for leader election and cluster coordination."},
  {cat:"Scalability",q:"What is the purpose of a connection pool?",opts:["Storing user session data","Reusing pre-established database connections to avoid the overhead of creating new connections for each request","Encrypting database connections","Distributing database load"],ans:1,exp:"Connection pooling maintains a pool of reusable DB connections. Creating connections is expensive (TCP handshake + auth). A pool allows the app to borrow and return connections quickly, improving throughput significantly."},
  {cat:"Databases",q:"What is a materialized view?",opts:["A virtual table defined by a query","A precomputed, stored query result that is updated on demand or schedule","A view that only shows certain rows","An encrypted view of sensitive data"],ans:1,exp:"A materialized view stores the results of a query physically on disk. Unlike a regular view (which re-executes on each access), materialized views are precomputed for fast reads. They need periodic refreshes for accuracy."},
  {cat:"API Design",q:"What is pagination and why is it important in APIs?",opts:["Splitting API documentation into pages","Returning large result sets in chunks (pages) to limit response size and server load","Versioning API endpoints","Caching API results per page"],ans:1,exp:"Pagination (cursor-based, offset-based, or keyset) splits large result sets into smaller pages. Returning 10,000 records at once strains servers, network, and clients. Pagination improves performance and user experience."},
  {cat:"Scalability",q:"What is the 'thundering herd' problem?",opts:["Too many servers causing network congestion","A large number of processes simultaneously competing for the same resource after being awoken simultaneously, causing system overload","Database lock contention across thousands of rows","CDN servers all requesting origin simultaneously"],ans:1,exp:"Thundering herd occurs when many processes/threads (or distributed clients) are simultaneously woken or triggered to compete for the same resource (e.g., expired cache key), overloading the backend."},
  {cat:"Databases",q:"What is database denormalization and when should it be used?",opts:["Removing all indexes for write performance","Intentionally introducing redundancy to improve read performance at the cost of write complexity","Splitting tables into smaller normalized forms","Encrypting sensitive database fields"],ans:1,exp:"Denormalization adds redundant data (e.g., storing a user's name in the orders table) to avoid expensive JOINs in read-heavy systems. Used when query performance is critical and write complexity is acceptable."},
  {cat:"Distributed Systems",q:"What is the purpose of a service registry (e.g., Consul, Eureka)?",opts:["Storing user authentication tokens","Maintaining a registry of available service instances for dynamic service discovery","Caching service responses","Monitoring service health metrics"],ans:1,exp:"A service registry tracks instances of services (host/port) dynamically. Services register on startup and deregister on shutdown. Clients query the registry for available instances—enabling dynamic service discovery in microservices."},
  {cat:"Caching",q:"What is write-behind (write-back) caching?",opts:["Writing to cache only, deferring database writes asynchronously","Writing only to the database with cache invalidation","Writing to both cache and database simultaneously","Reading from cache and writing to database"],ans:0,exp:"Write-behind caching writes to the cache immediately and asynchronously writes to the database later. This improves write performance but risks data loss if the cache fails before the write is persisted."},
  {cat:"Scalability",q:"What does 'P99 latency' mean?",opts:["Average latency across all requests","The latency at the 99th percentile—99% of requests complete within this time","Latency for 99% CPU usage scenarios","The 99th fastest response time in a benchmark"],ans:1,exp:"P99 (99th percentile latency) means 99% of requests finish in that time or less. High percentile latencies (P99, P999) reveal tail latency issues that average metrics hide, critical for SLA guarantees."},
  {cat:"Networking",q:"What is a 'long poll' vs 'server-sent events' (SSE) for real-time updates?",opts:["They are identical mechanisms","Long polling keeps HTTP request open until server has data (then client reconnects); SSE is a persistent one-way stream from server to client","Long polling uses WebSockets; SSE uses HTTP","SSE is bidirectional; long polling is unidirectional"],ans:1,exp:"Long polling: client sends request, server holds it until data is available, then responds (client reconnects immediately). SSE: browser API for persistent one-way streams from server over HTTP—simpler than WebSockets for push-only scenarios."},
  {cat:"Security",q:"What is CORS (Cross-Origin Resource Sharing)?",opts:["A caching mechanism for cross-origin assets","A browser security mechanism that controls how web pages can request resources from a different domain","An encryption standard for API communications","A way to share cookies across domains"],ans:1,exp:"CORS is a browser security mechanism. By default, browsers block cross-origin requests. Servers include CORS headers (Access-Control-Allow-Origin) to explicitly allow specific origins to access their resources."},
  {cat:"Distributed Systems",q:"What is an event sourcing pattern?",opts:["Storing only the current state of data","Storing every state change as an immutable sequence of events, deriving current state by replaying events","Broadcasting events to all microservices","Using event-driven architecture for UI updates"],ans:1,exp:"Event sourcing stores a log of all state-changing events rather than just current state. Current state is derived by replaying events. Benefits: complete audit trail, temporal queries, event replay for debugging."},
  {cat:"Databases",q:"What is the difference between a primary key and a foreign key?",opts:["They are used interchangeably","Primary key uniquely identifies a row within its table; foreign key references a primary key in another table to enforce relationships","Foreign key is faster to query","Primary key can be NULL; foreign key cannot"],ans:1,exp:"A primary key uniquely identifies each row in a table (NOT NULL, unique). A foreign key in one table references the primary key of another, enforcing referential integrity and modeling relationships."},
  {cat:"Scalability",q:"What is the difference between a monolith and microservices architecture?",opts:["Monoliths run on one server; microservices run on many","A monolith is a single deployable unit with all functionality; microservices decompose the application into independently deployable services","Microservices use SQL; monoliths use NoSQL","Monoliths are always slower than microservices"],ans:1,exp:"A monolith packages all features in one codebase/deployment. Microservices split functionality into small, independent services with their own deployment, scaling, and data. Microservices add complexity but enable independent scaling and deployment."},

  // ── OBSERVABILITY ──
  {cat:"Observability",q:"What are the three pillars of observability?",opts:["Logs, Alerts, and Dashboards","Metrics, Logs, and Traces","CPU, Memory, and Network","Uptime, Latency, and Throughput"],ans:1,exp:"The three pillars of observability are Metrics (numerical measurements over time), Logs (discrete event records), and Traces (end-to-end request journeys across services). Together they give full system visibility."},
  {cat:"Observability",q:"What is distributed tracing?",opts:["Logging all database queries","Tracking a single request's journey across multiple services with a unique trace ID","Monitoring CPU usage per service","Auditing all user actions across microservices"],ans:1,exp:"Distributed tracing (Jaeger, Zipkin, OpenTelemetry) assigns a unique trace ID to each request. As it passes through services, each hop creates a span. Together, spans form a trace showing latency at each service."},
  {cat:"Observability",q:"What is the difference between a metric and a log?",opts:["They are interchangeable","Metrics are numeric time-series aggregates (e.g., request rate); logs are discrete text records of individual events","Logs are faster to query; metrics are slower","Metrics only track errors; logs track all events"],ans:1,exp:"Metrics (Prometheus, Datadog) are numeric values aggregated over time—ideal for dashboards and alerting. Logs (ELK stack) capture individual events with context—ideal for debugging specific incidents."},
  {cat:"Observability",q:"What does an SLO (Service Level Objective) define?",opts:["The legal agreement between provider and customer","A target value for a service reliability metric (e.g., 99.9% uptime) used internally","The cost of downtime per hour","The maximum allowed latency for any request"],ans:1,exp:"An SLO is an internal target for service reliability, e.g., '99.9% of requests must succeed.' It's the goal teams aim for. An SLA is the external contract (with penalties). An SLI is the actual measured metric."},
  {cat:"Observability",q:"What is an error budget in SRE?",opts:["The budget allocated for fixing bugs","The allowed amount of downtime/errors defined by 100% minus the SLO target","The number of errors logged per day","The budget for monitoring tools"],ans:1,exp:"Error budget = 100% - SLO. A 99.9% SLO allows 0.1% error budget (~43.8 min/month). Teams can spend this budget on risky changes; once exhausted, new features freeze until reliability is restored."},
  {cat:"Observability",q:"What is a RED method in monitoring?",opts:["Reads, Errors, and Disk","Rate, Errors, Duration—the three key metrics for every service","Requests, Events, and Data","Retries, Errors, and Delays"],ans:1,exp:"The RED method (from Tom Wilkie) monitors: Rate (requests per second), Errors (failed request rate), and Duration (latency distribution). It's a practical framework for measuring microservice health."},
  {cat:"Observability",q:"What is log aggregation and why is it needed in microservices?",opts:["Compressing log files to save storage","Collecting logs from all services into a centralized system for unified search and analysis","Deleting old logs automatically","Encrypting logs for compliance"],ans:1,exp:"In microservices, each service emits logs independently. Log aggregation (ELK Stack, Loki, Splunk) centralizes them, enabling cross-service searching, correlation, and alerting from one interface."},
  {cat:"Observability",q:"What is a golden signal in monitoring?",opts:["A metric that indicates 100% uptime","The four key metrics (latency, traffic, errors, saturation) used to measure service health","An alert triggered by zero errors","A SLA-compliant response time"],ans:1,exp:"Google SRE's four golden signals: Latency (how long requests take), Traffic (how many requests), Errors (rate of failed requests), and Saturation (how full the system is). Monitoring these covers the most critical aspects."},

  // ── SERVICE DISCOVERY ──
  {cat:"Service Discovery",q:"What is client-side service discovery?",opts:["The client contacts a fixed IP address","The client queries a service registry and selects an instance itself before making the call","The server discovers which client to respond to","An API gateway routes requests to services"],ans:1,exp:"In client-side discovery, the client queries the service registry (Eureka, Consul), selects an available instance using a load balancing strategy, and makes the call directly. Netflix Ribbon is a classic example."},
  {cat:"Service Discovery",q:"What is server-side service discovery?",opts:["Services register themselves on startup","The client sends a request to a router/load balancer which queries the registry and forwards the request","Services discover each other through DNS only","Clients cache registry data locally"],ans:1,exp:"In server-side discovery, the client calls a load balancer or router (e.g., AWS ALB, Kubernetes Service). The router queries the registry and forwards to an available instance. The client is unaware of the registry."},
  {cat:"Service Discovery",q:"How does Kubernetes implement service discovery?",opts:["Via a custom DNS server that must be configured manually","Through kube-dns/CoreDNS and Services that provide stable DNS names and virtual IPs for pods","Through a centralized ZooKeeper cluster","By assigning fixed IP addresses to each pod"],ans:1,exp:"Kubernetes creates a DNS entry for each Service (e.g., my-svc.namespace.svc.cluster.local) via CoreDNS. Services also get a stable ClusterIP, abstracting dynamic pod IPs behind a consistent endpoint."},

  // ── EVENT-DRIVEN ARCHITECTURE ──
  {cat:"Event-Driven",q:"What is the difference between an event and a command in event-driven systems?",opts:["Events are synchronous; commands are asynchronous","A command requests an action from a specific recipient; an event notifies that something happened without dictating what happens next","Commands carry data; events carry no payload","They are interchangeable terms"],ans:1,exp:"A command (e.g., PlaceOrder) is directed at a specific handler to do something. An event (e.g., OrderPlaced) announces a fact—it happened—and multiple consumers can react independently. Events enable loose coupling."},
  {cat:"Event-Driven",q:"What is event streaming vs event queuing?",opts:["Streaming deletes events after consumption; queuing retains them","Streaming retains events in an ordered log for any consumer to replay; queuing delivers each message to one consumer and deletes it","They are the same thing with different names","Streaming is for metrics; queuing is for logs"],ans:1,exp:"Event streaming (Kafka) stores events durably in an ordered log—any consumer can read from any offset at any time, enabling replay. Message queuing (RabbitMQ) delivers messages to one consumer and removes them."},
  {cat:"Event-Driven",q:"What is CQRS (Command Query Responsibility Segregation)?",opts:["Combining reads and writes in one database model","Separating read models (queries) from write models (commands) to optimize each independently","A caching strategy for query results","A database normalization technique"],ans:1,exp:"CQRS separates the model used for writes (commands) from the model used for reads (queries). Write side handles business logic; read side is optimized for query performance. Often used with event sourcing."},
  {cat:"Event-Driven",q:"What is an outbox pattern in event-driven systems?",opts:["A dead letter queue for failed events","Writing events to a local database table (outbox) atomically with business data, then publishing them to the broker from the outbox","Storing outgoing API responses in a log","A message broker that holds undelivered messages"],ans:1,exp:"The outbox pattern solves dual-write: when you save data and publish an event, do both atomically by writing the event to an outbox table in the same DB transaction. A separate relay then publishes from the outbox to the broker."},
  {cat:"Event-Driven",q:"What is a consumer group in Kafka?",opts:["A set of brokers that form a Kafka cluster","A group of consumers that jointly consume a topic, with each partition assigned to exactly one consumer in the group","A group of producers writing to the same topic","A collection of Kafka topics"],ans:1,exp:"A consumer group allows parallel consumption of a topic. Each partition is consumed by only one group member, enabling horizontal scaling. Multiple groups can independently read the same topic from different offsets."},
  {cat:"Event-Driven",q:"What is event replay and why is it useful?",opts:["Retrying failed HTTP calls automatically","Re-processing previously stored events from the beginning to rebuild state, populate new read models, or debug issues","Sending duplicate events to detect consumer idempotency","Replaying events only after system crash"],ans:1,exp:"Event replay allows re-processing historical events to rebuild state from scratch, populate a new read model, fix processing bugs, or onboard new consumers. This is a core advantage of event sourcing and Kafka's log-based storage."},

  // ── DATA PIPELINES ──
  {cat:"Data Pipelines",q:"What is the difference between batch processing and stream processing?",opts:["Batch is real-time; stream processes at scheduled intervals","Batch processes accumulated data at scheduled intervals; stream processes data continuously as it arrives","Batch is faster than stream processing","Stream processing requires more storage"],ans:1,exp:"Batch processing (Hadoop MapReduce, Spark) processes large volumes of accumulated data periodically. Stream processing (Flink, Kafka Streams, Spark Streaming) processes data in real-time as it arrives, with low latency."},
  {cat:"Data Pipelines",q:"What is an ETL pipeline?",opts:["Event, Transform, Load","Extract data from sources, Transform it into the desired format, Load it into the destination","Execute, Test, Launch","Encrypt, Transfer, Log"],ans:1,exp:"ETL (Extract, Transform, Load) extracts data from source systems (databases, APIs), transforms it (cleaning, enriching, aggregating), and loads it into a data warehouse (Redshift, BigQuery) for analytics."},
  {cat:"Data Pipelines",q:"What is a data lake vs a data warehouse?",opts:["They store the same types of data","A data lake stores raw, unprocessed data in any format; a data warehouse stores processed, structured data optimized for analytics","Data lakes use SQL; data warehouses use NoSQL","Data warehouses are cheaper to operate"],ans:1,exp:"Data lakes (S3, Azure Data Lake) store raw data in its native format at low cost. Data warehouses (Redshift, Snowflake) store transformed, structured data optimized for SQL analytics. Often used together in a modern data architecture."},
  {cat:"Data Pipelines",q:"What is backpressure in stream processing?",opts:["Reversing data flow for error recovery","A mechanism where a consumer signals it is overwhelmed so the producer slows down to match consumption rate","Buffering all data before processing","Scaling the pipeline horizontally under load"],ans:1,exp:"Backpressure prevents overwhelming consumers. When a consumer can't keep up, it signals upstream to slow production. Reactive Streams and systems like Akka Streams implement backpressure for flow control."},
  {cat:"Data Pipelines",q:"What is a Lambda architecture in big data?",opts:["A serverless data processing framework","A big data architecture combining batch layer (accuracy) and speed layer (low latency), with a serving layer merging both views","An AWS Lambda-based data pipeline","A single-layer real-time processing architecture"],ans:1,exp:"Lambda architecture has three layers: Batch (reprocesses all data periodically for accuracy), Speed (processes recent data in real-time for low latency), and Serving (merges batch and speed views for queries)."},
  {cat:"Data Pipelines",q:"What is schema evolution in data pipelines?",opts:["Changing the database schema without downtime","Managing changes to data schemas over time while maintaining backward and forward compatibility","Versioning ETL scripts","Migrating from SQL to NoSQL"],ans:1,exp:"Schema evolution handles changes like adding/removing fields in a data schema without breaking existing producers or consumers. Tools like Confluent Schema Registry with Avro enforce compatibility rules (backward, forward, full)."},

  // ── SYSTEM DESIGN PATTERNS ──
  {cat:"System Design Patterns",q:"What is the Bulkhead pattern?",opts:["Encrypting traffic between services","Isolating components into pools so failures in one don't cascade to others","Replying requests in case of failure","Routing traffic based on request type"],ans:1,exp:"The Bulkhead pattern (from ship design) isolates resources (thread pools, connection pools) per service/feature. If one service hogs resources, others remain unaffected. Prevents cascading failures across the system."},
