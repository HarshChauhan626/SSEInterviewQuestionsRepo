  {cat:"System Design Patterns",q:"What is the Sidecar pattern in microservices?",opts:["A backup service for each microservice","A helper process deployed alongside each service to provide cross-cutting concerns like logging, monitoring, and proxy","A read-only replica of a microservice","A caching layer for each service"],ans:1,exp:"The Sidecar pattern attaches a helper container (the sidecar) to the main service container in the same pod. The sidecar handles cross-cutting concerns (logging, metrics, mTLS proxy) without changing the main service code."},
  {cat:"System Design Patterns",q:"What is the Retry pattern with exponential backoff?",opts:["Retrying exactly twice before failing","Retrying failed operations with progressively longer wait times between attempts to avoid overwhelming recovering services","Queueing retries in a database","Retrying only read operations, not writes"],ans:1,exp:"Exponential backoff doubles the wait time between retries (1s, 2s, 4s, 8s...) with added jitter to prevent synchronized thundering herds. Prevents hammering a recovering service while still eventually succeeding."},
  {cat:"System Design Patterns",q:"What is the Ambassador pattern?",opts:["A service that proxies external API calls on behalf of the application","A leader election mechanism","A pattern for migrating legacy systems","A routing pattern for multi-region systems"],ans:0,exp:"The Ambassador pattern places a proxy (ambassador) in front of an application to handle network concerns: retries, circuit breaking, logging, and protocol translation. The app communicates only with its ambassador."},
  {cat:"System Design Patterns",q:"What is the Competing Consumers pattern?",opts:["Multiple producers writing to the same queue","Multiple consumer instances reading from the same queue concurrently to scale message processing","Consumers that compete for lock ownership","A pattern for resolving write conflicts"],ans:1,exp:"Competing consumers allow multiple worker instances to pull and process messages from the same queue concurrently. This scales message processing horizontally and provides fault tolerance—if one consumer dies, others pick up its work."},
  {cat:"System Design Patterns",q:"What is a fanout pattern in messaging?",opts:["A single consumer processing all messages","Broadcasting a single message to multiple queues or subscribers simultaneously","Splitting large messages into smaller chunks","Routing messages based on content type"],ans:1,exp:"Fanout broadcasts a message to all bound queues or subscribers simultaneously. In AWS SNS, one SNS topic fans out to multiple SQS queues, Lambda functions, or HTTP endpoints—enabling parallel processing of the same event."},
  {cat:"System Design Patterns",q:"What is the Anti-Corruption Layer (ACL) pattern?",opts:["A security layer preventing SQL injection","A translation layer between systems to prevent a legacy system's model from corrupting a new system's domain model","A validation layer for API inputs","A caching layer for external API calls"],ans:1,exp:"The ACL (from Domain-Driven Design) isolates a bounded context from external or legacy systems by translating between their models. It prevents external concepts from leaking into the internal domain model."},
  {cat:"System Design Patterns",q:"What is the Backends for Frontends (BFF) pattern?",opts:["Deploying backend services behind a frontend CDN","Creating dedicated backend services tailored to each frontend type (mobile, web, third-party) with specific API contracts","A reverse proxy for frontend assets","Caching backend responses at the frontend layer"],ans:1,exp:"BFF creates separate backend APIs for each client type. Mobile BFF returns compact responses; web BFF returns richer data. Each BFF is optimized for its client's needs, avoiding one-size-fits-all API complexity."},

  // ── MORE SCALABILITY ──
  {cat:"Scalability",q:"What is a blue-green deployment?",opts:["A canary release with 50% traffic split","Maintaining two identical production environments (blue/green); switching traffic from one to the other for zero-downtime deployments","Deploying to two data centers simultaneously","A CI/CD pipeline with automated rollbacks"],ans:1,exp:"Blue-green deployment runs two identical production environments. Traffic goes to blue. Deploy to green, test, then switch traffic. If issues arise, instantly rollback by switching back to blue. Zero-downtime deployments."},
  {cat:"Scalability",q:"What is a canary deployment?",opts:["A deployment that triggers on schedule","Rolling out a new version to a small subset of users first to test in production before full rollout","A disaster recovery deployment strategy","Deploying to multiple clouds simultaneously"],ans:1,exp:"Canary deployments route a small percentage of traffic (e.g., 1-5%) to the new version. Monitoring metrics on the canary, then gradually increasing traffic if stable. Reduces risk of wide-scale failures from new releases."},
  {cat:"Scalability",q:"What is geo-distribution in system design?",opts:["Distributing load across CPUs on one server","Deploying systems across multiple geographic regions to reduce latency and improve availability for global users","Sharding data by geographic location","Routing requests by user country for legal compliance"],ans:1,exp:"Geo-distribution deploys infrastructure in multiple regions worldwide (AWS us-east-1, eu-west-1, etc.). Users are routed to the nearest region via GeoDNS or Anycast, reducing latency and providing regional failover."},
  {cat:"Scalability",q:"What is active-active vs active-passive multi-region setup?",opts:["Active-active uses SQL; active-passive uses NoSQL","Active-active: all regions serve traffic simultaneously; active-passive: one region is primary, others are standby and activate on failure","Active-active is more expensive but no benefit","Active-passive has no data replication"],ans:1,exp:"Active-active: all regions handle production traffic simultaneously, maximizing resource use and availability. Active-passive: the primary region handles all traffic; standby region activates only during failover, simpler but wastes resources."},
  {cat:"Scalability",q:"What is a read replica and when should you use it?",opts:["A backup database for disaster recovery only","A copy of the primary database that serves read traffic, reducing load on the primary for read-heavy workloads","A cache layer in front of the database","A database used for write operations only"],ans:1,exp:"Read replicas replicate data from the primary DB and serve read queries. Ideal when reads vastly outnumber writes (e.g., blog, news site). Reduces primary DB load. Reads may be slightly stale due to replication lag."},

  // ── MORE DATABASES ──
  {cat:"Databases",q:"What is database connection pooling's role in high-traffic systems?",opts:["It reduces the number of tables in a database","It maintains a pool of reusable connections, reducing latency from connection establishment under high load","It distributes write load across multiple databases","It compresses query results for faster transfer"],ans:1,exp:"Each DB connection involves TCP handshake and auth overhead. Under high traffic, creating per-request connections is expensive. Pooling (PgBouncer, HikariCP) reuses pre-established connections, dramatically improving throughput."},
  {cat:"Databases",q:"What is a B-tree index and why is it the default in most RDBMS?",opts:["A binary search tree optimized for in-memory operations","A balanced tree data structure that enables O(log n) lookups and is efficient for range queries and sorted data","An index that only works with integer keys","A hash-based index for O(1) lookups"],ans:1,exp:"B-trees maintain balanced sorted structure, enabling O(log n) lookups and efficient range scans (BETWEEN, >, <). They're the default index type in PostgreSQL, MySQL, Oracle because they support both equality and range queries."},
  {cat:"Databases",q:"What is the difference between optimistic and pessimistic locking?",opts:["Optimistic locking uses SELECT FOR UPDATE; pessimistic does not","Optimistic: assumes conflicts are rare, validates at commit time; pessimistic: locks data immediately on read to prevent conflicts","Optimistic locking is used only in NoSQL databases","Pessimistic locking is always faster"],ans:1,exp:"Optimistic locking (version field check on update) assumes low contention—no lock held, but update fails if version changed. Pessimistic locking (SELECT FOR UPDATE) locks the row immediately, preventing others from modifying until released."},
  {cat:"Databases",q:"What is a composite index and when is it beneficial?",opts:["An index combining data from multiple tables","An index on multiple columns, beneficial for queries filtering on those columns together in the correct order","An index that covers all rows regardless of filter","A partial index applied to NULL values"],ans:1,exp:"A composite (multi-column) index on (col1, col2) speeds up queries filtering on col1 alone or col1+col2 together (leading prefix rule). Useful when queries frequently filter on multiple columns."},
  {cat:"Databases",q:"What is a database deadlock and how is it resolved?",opts:["A slow query blocking other queries","A circular dependency where two transactions each hold a lock the other needs, causing both to wait indefinitely","A database running out of disk space","A failed database migration"],ans:1,exp:"A deadlock occurs when Transaction A holds Lock 1 and waits for Lock 2, while Transaction B holds Lock 2 and waits for Lock 1. DBs detect deadlocks and kill one transaction. Prevention: always acquire locks in the same order."},
  {cat:"Databases",q:"What is time-to-live (TTL) in databases and caches?",opts:["The time a database query takes to execute","An expiration mechanism that automatically deletes records or cache entries after a specified duration","The maximum time a database connection can stay open","The SLA uptime of a database service"],ans:1,exp:"TTL sets an expiration on data. Caches use TTL to auto-evict stale entries. DynamoDB and Redis support per-item TTL, automatically deleting expired records—useful for sessions, OTP codes, and temporary data."},

  // ── MORE NETWORKING ──
  {cat:"Networking",q:"What is Anycast routing?",opts:["Routing traffic to any available server randomly","A network addressing method where the same IP is advertised from multiple locations and traffic is routed to the topologically nearest one","Broadcasting packets to all hosts in a subnet","A DNS-based geographic routing strategy"],ans:1,exp:"Anycast assigns the same IP to multiple servers in different locations. Routers direct traffic to the nearest one based on BGP routing metrics. Used by CDNs and DNS providers (Cloudflare 1.1.1.1) for low-latency global routing."},
  {cat:"Networking",q:"What is QUIC protocol and why was it developed?",opts:["A replacement for DNS over HTTPS","A UDP-based transport protocol developed by Google to reduce latency by eliminating TCP handshakes and improving performance over lossy networks","An extension of HTTP/2 for binary framing","A protocol for inter-datacenter replication"],ans:1,exp:"QUIC (used in HTTP/3) runs over UDP, eliminating TCP's 3-way handshake, reducing connection setup time. It builds reliability and encryption into the protocol itself, improving performance especially on mobile and lossy networks."},
  {cat:"Networking",q:"What is a VPC (Virtual Private Cloud)?",opts:["A CDN network for private content","An isolated virtual network in the cloud where you control IP ranges, subnets, routing tables, and network gateways","A private container registry","A dedicated physical server in a data center"],ans:1,exp:"A VPC provides an isolated network environment in the cloud (AWS VPC, GCP VPC). You define IP ranges, create subnets (public/private), configure routing, security groups, and control traffic flow—similar to an on-premise network."},
  {cat:"Networking",q:"What is a NAT gateway and why is it used?",opts:["A gateway that translates domain names to IPs","Allows resources in a private subnet to access the internet while preventing inbound connections from the internet","A firewall for blocking malicious traffic","A load balancer for private subnets"],ans:1,exp:"NAT (Network Address Translation) gateway allows instances in a private subnet to make outbound internet requests (e.g., download packages) while remaining unreachable from the internet directly—improving security."},
  {cat:"Networking",q:"What is BGP (Border Gateway Protocol) used for?",opts:["Routing traffic within a single data center","The internet's inter-domain routing protocol that exchanges routing information between autonomous systems","Assigning IP addresses to devices","Encrypting traffic between cloud providers"],ans:1,exp:"BGP is the routing protocol of the internet. It exchanges routing information between Autonomous Systems (ISPs, cloud providers), enabling packets to find their way across the global internet. Anycast relies on BGP."},

  // ── MORE SECURITY ──
  {cat:"Security",q:"What is a DDoS attack and how is it mitigated?",opts:["A distributed database attack exploiting SQL injection","Overwhelming a system with traffic from many sources to make it unavailable; mitigated via traffic scrubbing, rate limiting, and CDN absorption","Exploiting certificate vulnerabilities","A man-in-the-middle attack on microservices"],ans:1,exp:"DDoS (Distributed Denial of Service) floods a target with traffic from many compromised machines. Mitigation: CDN/WAF (Cloudflare, AWS Shield) absorbs traffic, rate limiting drops excess, Anycast distributes attack traffic globally."},
  {cat:"Security",q:"What is a WAF (Web Application Firewall)?",opts:["A firewall that protects physical servers","A security layer that filters, monitors, and blocks malicious HTTP traffic to web applications","A network layer firewall for IP blocking","A VPN for securing web traffic"],ans:1,exp:"A WAF (AWS WAF, Cloudflare WAF) operates at Layer 7, inspecting HTTP requests to block common web attacks: SQL injection, XSS, CSRF, and malicious bots. It sits in front of the application, filtering before requests reach the server."},
  {cat:"Security",q:"What is zero-trust security architecture?",opts:["Trusting no external traffic and blocking all inbound connections","A security model that assumes no user or system is trusted by default; every access request must be verified regardless of network location","An architecture with no authentication requirements","A firewall-only security approach"],ans:1,exp:"Zero-trust ('never trust, always verify') authenticates and authorizes every request regardless of whether it comes from inside or outside the network. Uses principles like least privilege, MFA, microsegmentation, and continuous verification."},
  {cat:"Security",q:"What is secrets management and why is it important?",opts:["Keeping documentation confidential","Securely storing and distributing sensitive credentials (API keys, passwords, certificates) to services at runtime without hardcoding them","Encrypting user passwords in the database","Managing SSH keys for server access"],ans:1,exp:"Secrets management (HashiCorp Vault, AWS Secrets Manager) ensures credentials are never hardcoded in source code, are rotated regularly, have access auditing, and are injected securely at runtime—preventing credential leaks."},

  // ── MORE CACHING ──
  {cat:"Caching",q:"What is a distributed cache and how does it differ from a local cache?",opts:["Distributed caches are slower than local caches","A local cache is in-process memory (fast but per-instance); a distributed cache (Redis, Memcached) is shared across all instances","Local caches support data structures; distributed caches do not","Distributed caches only store database query results"],ans:1,exp:"Local (in-process) cache is fast but not shared—each server instance has its own copy, causing inconsistency. Distributed cache (Redis cluster) is shared across all instances, ensuring consistency and surviving single node restarts."},
  {cat:"Caching",q:"What is cache warming?",opts:["Increasing cache TTL to reduce misses","Pre-loading the cache with data before it receives production traffic to avoid cold-start cache misses","Enabling compression in cache","Adding more cache nodes proactively"],ans:1,exp:"Cache warming pre-populates the cache before going live. Useful after deployments or cache flushes. Without warming, the first surge of traffic hits cold cache—all requests fall through to the DB, potentially overwhelming it."},
  {cat:"Caching",q:"What is cache coherence in multi-level caching?",opts:["Ensuring all cache nodes have the same data","Keeping all cache levels (L1, L2, distributed) synchronized so reads return consistent, up-to-date data","Replicating cache across data centers","Invalidating all caches on every write"],ans:1,exp:"Cache coherence ensures that multiple cache layers (browser, CDN, application, DB query cache) don't serve stale data. Strategies include write-through, TTL-based expiry, and event-driven invalidation upon data changes."},

  // ── MORE MICROSERVICES ──
  {cat:"Microservices",q:"What is domain-driven design (DDD) and its relevance to microservices?",opts:["A database design methodology","A software design approach focusing on the business domain, where bounded contexts map naturally to microservice boundaries","A networking topology for microservices","An API design standard for microservices"],ans:1,exp:"DDD models software around the business domain. Bounded contexts (self-contained domain areas with their own model) map well to microservice boundaries—each service owns its domain and data, avoiding tight coupling."},
  {cat:"Microservices",q:"What is the two-phase commit (2PC) and why is it avoided in microservices?",opts:["A deployment strategy using two phases","A distributed transaction protocol that locks resources across services during commit, causing availability issues and tight coupling","A database migration technique","A way to version microservice APIs"],ans:1,exp:"2PC coordinates transactions across multiple services/databases in two phases (prepare + commit). It causes long-held locks, reduced availability, and tight coupling. The Saga pattern is preferred for microservices distributed transactions."},
  {cat:"Microservices",q:"What is idempotency key in API design?",opts:["An API key that never expires","A unique client-generated ID sent with a request so the server can safely retry without duplicate side effects","A hash of the request body","A versioning identifier for API schemas"],ans:1,exp:"Idempotency keys (used by Stripe, etc.) let clients safely retry requests. The server stores the key and result; if the same key is seen again, it returns the stored result instead of re-executing the operation."},
  {cat:"Microservices",q:"What is graceful degradation in distributed systems?",opts:["Rebooting failing services automatically","The ability of a system to continue functioning with reduced functionality when some components fail, rather than failing completely","Gradually deprecating old API versions","Reducing traffic during maintenance windows"],ans:1,exp:"Graceful degradation ensures that when dependencies fail, the system delivers reduced but working functionality. Example: if the recommendation service is down, show generic products rather than returning an error page."},

  // ── MORE LOAD BALANCING ──
  {cat:"Load Balancing",q:"What is a Global Server Load Balancer (GSLB)?",opts:["A load balancer that handles only global CDN traffic","A DNS-based load balancing mechanism that routes users to the best regional data center based on geographic proximity, health, and policy","A load balancer that manages all servers in a single data center","An L4 load balancer with global reach"],ans:1,exp:"GSLB uses intelligent DNS to route users to the optimal data center globally. Factors include geographic proximity, health checks, and capacity. Tools: AWS Route 53 latency routing, Cloudflare Load Balancing."},
  {cat:"Load Balancing",q:"What is the Power of Two Choices load balancing algorithm?",opts:["Choosing the least loaded of all servers","Randomly selecting two servers and routing to the less loaded one, reducing the imbalance of pure random without full scans","Splitting traffic 50/50 between two server pools","A weighted round robin with two weight classes"],ans:1,exp:"Power of Two Choices picks two random servers and sends to the less loaded. This achieves near-optimal load balancing with O(1) decision cost, avoiding the overhead of examining all servers while being much better than pure random."},

  // ── MORE CONSISTENCY ──
  {cat:"Consistency",q:"What is monotonic read consistency?",opts:["All reads are always up-to-date","If a process reads a value, subsequent reads will never return an older value (no going back in time)","Reads are processed in strict order","Read replicas are always in sync with the primary"],ans:1,exp:"Monotonic reads guarantee that once a client reads a value, future reads will never return older data—reads progress forward in time. Sticky routing to the same replica or routing reads through a single node ensures this."},
  {cat:"Consistency",q:"What is causal consistency?",opts:["Consistency based on the physical clock time of events","Guarantees that causally related operations are seen in order by all processes, while unrelated operations may be seen in any order","All writes must be acknowledged by all nodes","Consistency enforced at the application level only"],ans:1,exp:"Causal consistency preserves cause-and-effect ordering. If Alice posts a message and Bob replies, all users must see Alice's message before Bob's reply. Unrelated events may be seen in different orders. Vector clocks track causality."},

  // ── MORE HASHING ──
  {cat:"Hashing",q:"What is a Bloom filter and what is it used for?",opts:["A hash map for large datasets","A probabilistic data structure that tests whether an element is in a set, with possible false positives but no false negatives","A perfect hash function implementation","A compression algorithm for large datasets"],ans:1,exp:"A Bloom filter uses multiple hash functions and a bit array. It can say 'definitely not in set' or 'possibly in set.' False positives are possible; false negatives are not. Used to avoid expensive lookups (DB, disk) for items that don't exist."},
  {cat:"Hashing",q:"What is a HyperLogLog data structure used for?",opts:["Storing top-N most frequent items","Estimating the cardinality (count of unique elements) of a large dataset using very little memory","Hashing large files for deduplication","Sorting large datasets efficiently"],ans:1,exp:"HyperLogLog (used in Redis) estimates unique element count using O(log log N) memory. Instead of storing all elements, it uses probabilistic counting to estimate cardinality with ~2% error—perfect for counting unique website visitors."},
  {cat:"Hashing",q:"What is the use of MD5 or SHA hashing in system design?",opts:["As encryption algorithms for passwords","For generating checksums, content fingerprinting, deduplication, and cache key generation (not for password storage)","For compressing data before storage","For encrypting messages between services"],ans:1,exp:"MD5/SHA are used for checksums (data integrity), content fingerprinting (detecting duplicate files), generating cache keys, and ETags. They are NOT suitable for password storage (use bcrypt/Argon2) as they're not collision-resistant enough."},

  // ── MORE MESSAGE QUEUES ──
  {cat:"Message Queues",q:"What is message ordering guarantee in distributed queues?",opts:["All queues guarantee strict global ordering","Ordering varies: standard queues may reorder; FIFO queues guarantee order; Kafka guarantees order per partition","Message order only matters for video streaming","Ordering is always guaranteed when using durable queues"],ans:1,exp:"Standard queues (AWS SQS standard) may deliver out of order. FIFO queues guarantee order but limit throughput. Kafka guarantees order within a partition. Choosing depends on whether your application requires strict ordering."},
  {cat:"Message Queues",q:"What is the difference between push and pull message consumption?",opts:["Push is faster; pull is more reliable","In push, the broker delivers messages to consumers; in pull, consumers actively fetch messages from the broker","Push is for events; pull is for commands","They are the same mechanism with different names"],ans:1,exp:"Push (RabbitMQ, SNS): broker pushes messages to consumers immediately. Pull (Kafka, SQS): consumers poll the broker for messages. Pull gives consumers control over processing rate; push has lower latency but can overwhelm slow consumers."},
  {cat:"Message Queues",q:"What is a priority queue in message systems?",opts:["A queue that processes messages in insertion order","A queue where higher-priority messages are processed before lower-priority ones regardless of arrival order","A queue with multiple consumers","A queue for system admin messages only"],ans:1,exp:"Priority queues process messages by priority rather than arrival order. Critical use cases: emergency alerts before routine notifications, premium user requests before free-tier, payment retries before analytics events."},

  // ── MORE STORAGE ──
  {cat:"Storage",q:"What is erasure coding in distributed storage?",opts:["Deleting corrupted data automatically","A data protection technique that encodes data into fragments with redundancy so it can be reconstructed from a subset of fragments even if some are lost","Encrypting stored data using multiple keys","A method for compressing data into smaller blocks"],ans:1,exp:"Erasure coding (used in HDFS, Ceph, S3) splits data into k data fragments and m parity fragments. The original data can be recovered from any k of the k+m fragments. More storage-efficient than replication for large datasets."},
  {cat:"Storage",q:"What is a distributed file system (DFS)?",opts:["A local filesystem with encryption","A file system that allows multiple clients to access shared files across a network as if they were local","A file system built on SSDs for speed","A file system that compresses files automatically"],ans:1,exp:"A DFS (HDFS, GFS, NFS) allows multiple machines to share a common file namespace over a network. Files are accessed transparently like local files but stored across multiple servers, enabling shared access and fault tolerance."},
  {cat:"Storage",q:"What is the difference between SSD and HDD in system design context?",opts:["SSDs are only used for OS storage","SSDs offer much lower latency (microseconds) and higher IOPS vs HDDs (milliseconds, lower IOPS), critical for database and I/O intensive workloads","HDDs have faster sequential reads than SSDs","SSDs are more cost-effective for cold data storage"],ans:1,exp:"SSDs: ~0.1ms latency, 100K+ IOPS. HDDs: ~10ms latency, ~200 IOPS. For database and latency-sensitive workloads, SSDs are essential. HDDs remain cost-effective for large cold storage (backups, logs, archival)."},

  // ── MORE CAP / CONSISTENCY MODELS ──
  {cat:"CAP Theorem",q:"In real-world systems, why is partition tolerance non-negotiable?",opts:["Partitions are prevented by proper hardware","Network partitions always happen in distributed systems; removing P means having a single-node system, which is not truly distributed","Partition tolerance is optional in cloud environments","Only systems outside the cloud need partition tolerance"],ans:1,exp:"Network partitions (cable cuts, latency spikes, node crashes) happen in any distributed system. You cannot simply opt out of P. Therefore the real choice in CAP is between C and A when a partition occurs."},
  {cat:"Consistency",q:"What is session consistency (session guarantee)?",opts:["Ensuring sessions are stored in a database","A consistency model that guarantees read-your-writes, monotonic reads, and causal consistency within a single user session","Locking all data during a user session","Syncing all replicas before responding to a session"],ans:1,exp:"Session consistency provides a set of consistency guarantees (read-your-writes, monotonic reads) within a user session, typically by routing all of a session's requests to the same replica or tracking session state."},

  // ── ADDITIONAL CONCEPTS ──
  {cat:"Distributed Systems",q:"What is a distributed lock and when is it needed?",opts:["A hardware locking mechanism for distributed storage","A mechanism to ensure only one instance of a service performs a particular operation at a time across a distributed system","A lock that spans multiple database tables","A network-level lock for preventing DDoS"],ans:1,exp:"Distributed locks (Redis SETNX, ZooKeeper ephemeral nodes) prevent race conditions when multiple service instances might execute the same critical section concurrently—e.g., cron jobs, inventory deduction, or leader election."},
  {cat:"Distributed Systems",q:"What is the gossip protocol used for in distributed systems?",opts:["Spreading security patches across nodes","A peer-to-peer communication protocol where nodes periodically exchange state information with random peers to propagate information throughout the cluster","Monitoring CPU usage across nodes","Replicating database writes across nodes"],ans:1,exp:"Gossip protocols (used by Cassandra, Redis Cluster, Consul) propagate information like node membership, failures, and configuration by having each node periodically exchange state with a few random peers. Eventually all nodes converge."},
  {cat:"Scalability",q:"What is request coalescing (request collapsing)?",opts:["Merging multiple API requests from the same client","Combining multiple concurrent requests for the same resource into one upstream request, reducing backend load","Batching writes to reduce database round trips","Compressing API responses to reduce bandwidth"],ans:1,exp:"Request coalescing (used in Varnish, CDNs) detects multiple concurrent cache misses for the same key, makes one backend request, and returns the result to all waiting requesters. Prevents cache stampede in high-traffic systems."},
  {cat:"API Design",q:"What is long-polling vs WebSocket for real-time features?",opts:["They achieve identical performance","Long-polling repeatedly opens HTTP connections waiting for updates (higher overhead); WebSocket maintains one persistent bidirectional connection with lower overhead","WebSocket is only for mobile apps","Long-polling requires special server support; WebSocket does not"],ans:1,exp:"Long-polling: client makes HTTP request, server holds until update available, then responds—client immediately reconnects. WebSocket: single persistent TCP connection for full-duplex communication. WebSocket is more efficient for frequent updates."},
  {cat:"Microservices",q:"What is contract testing in microservices?",opts:["Testing the legal service contracts between teams","Verifying that a service's API matches what its consumers expect, catching integration bugs without deploying all services together","End-to-end testing of all microservices simultaneously","Testing service configuration files"],ans:1,exp:"Contract testing (Pact, Spring Cloud Contract) verifies that a producer service fulfills the contract expected by its consumer. It catches breaking API changes early, enabling independent deployments without full integration test environments."},
  {cat:"Networking",q:"What is mTLS and how does it differ from regular TLS?",opts:["mTLS uses stronger encryption algorithms","Regular TLS only authenticates the server; mTLS requires both client and server to present and verify certificates for mutual authentication","mTLS is used only for database connections","mTLS replaces OAuth for API authentication"],ans:1,exp:"Standard TLS: client verifies server's certificate (one-way). mTLS: both sides present certificates, so the server also authenticates the client. Used for service-to-service communication in zero-trust architectures and service meshes."},
  {cat:"System Design Patterns",q:"What is a Throttle pattern vs a Rate Limiter?",opts:["They are identical in behavior","Rate limiting enforces maximum request count per window; throttling queues or delays excess requests to smooth traffic instead of rejecting them","Throttling is per-user; rate limiting is per-system","Rate limiting is applied at the database; throttling at the load balancer"],ans:1,exp:"Rate limiting rejects requests over the limit. Throttling shapes traffic—excess requests are queued, delayed, or slowed down rather than rejected. Throttling preserves all requests at the cost of latency; rate limiting sacrifices some."},
  {cat:"Data Pipelines",q:"What is idempotent data processing in pipelines?",opts:["Processing each record only once regardless of delivery guarantees","Designing pipeline stages so reprocessing the same record multiple times produces the same outcome as processing it once","Deduplicating data before ingestion","Processing records in exactly the order they were created"],ans:1,exp:"Idempotent processing means running the same data through a pipeline stage multiple times doesn't cause duplicate records or incorrect state. Essential for at-least-once delivery systems where messages may be redelivered."},
  // ── KUBERNETES ──
  {cat:"Kubernetes",q:"What is a Kubernetes Pod?",opts:["A virtual machine running containers","The smallest deployable unit in Kubernetes, consisting of one or more containers sharing network and storage","A Kubernetes node","A Kubernetes namespace"],ans:1,exp:"A Pod is the atomic unit in Kubernetes. Containers in the same Pod share the same IP address, port space, and storage volumes. Pods are ephemeral—they can be killed and replaced by the scheduler."},
  {cat:"Kubernetes",q:"What is a Kubernetes Deployment?",opts:["A configuration file for networking","A controller that manages a ReplicaSet to maintain a desired number of Pod replicas and handle rolling updates","A Kubernetes namespace configuration","A storage volume definition"],ans:1,exp:"A Deployment declaratively manages Pods via ReplicaSets. It handles rolling updates (gradually replacing pods), rollbacks, and ensures the desired number of replicas are always running."},
  {cat:"Kubernetes",q:"What is a Kubernetes Service?",opts:["A background process running in a pod","An abstraction that provides a stable IP/DNS name for a set of Pods, load balancing traffic across them","A Kubernetes storage class","A job running on a schedule"],ans:1,exp:"A Service gives Pods a stable network identity. Since Pods are ephemeral and their IPs change, a Service provides a constant ClusterIP/DNS name. It load-balances traffic to all healthy matching Pods."},
  {cat:"Kubernetes",q:"What is a Kubernetes ConfigMap?",opts:["A Kubernetes encryption tool","A key-value store for non-sensitive configuration data, injected into Pods as env vars or files","A template for deploying applications","A Kubernetes RBAC policy"],ans:1,exp:"ConfigMaps decouple configuration from container images. They store non-secret config (DB host, feature flags) and can be mounted as files or injected as environment variables into Pods."},
  {cat:"Kubernetes",q:"What does a HorizontalPodAutoscaler (HPA) do?",opts:["Vertically scales Pod CPU/memory limits","Automatically scales the number of Pod replicas based on observed CPU/memory or custom metrics","Distributes Pods across nodes evenly","Monitors Pod health and restarts failed Pods"],ans:1,exp:"HPA watches metrics (CPU, memory, custom) and automatically adjusts the replica count of a Deployment or ReplicaSet. Scales out under load and in during quiet periods to optimize resource usage."},
  {cat:"Kubernetes",q:"What is a Kubernetes Namespace?",opts:["A DNS record for a service","A virtual cluster within a Kubernetes cluster providing resource isolation and scope for names","A node-level security boundary","A Kubernetes storage partition"],ans:1,exp:"Namespaces partition a Kubernetes cluster into virtual sub-clusters, isolating resources (Pods, Services, ConfigMaps) by team or environment (dev, staging, prod). Resource quotas can be applied per namespace."},
  {cat:"Kubernetes",q:"What is a Kubernetes DaemonSet?",opts:["A set of background daemon processes","Ensures a copy of a specific Pod runs on every (or selected) node in the cluster","A cluster-wide Cron scheduler","A set of configuration rules for services"],ans:1,exp:"DaemonSets ensure that one Pod replica runs on every node (or a subset matching a selector). Used for node-level services: log collectors (Fluentd), monitoring agents (Prometheus node-exporter), network plugins."},
  {cat:"Kubernetes",q:"What is the role of etcd in Kubernetes?",opts:["Storing container images","The distributed key-value store that stores all cluster state and configuration data","Routing network traffic between pods","Managing container lifecycle hooks"],ans:1,exp:"etcd is Kubernetes' backing store for all cluster data: node info, Pod specs, ConfigMaps, Secrets, Deployments. It uses Raft for consensus, ensuring cluster state is consistent and durable."},
  {cat:"Kubernetes",q:"What is a Kubernetes Ingress?",opts:["A type of Kubernetes volume","A resource that manages external HTTP/HTTPS traffic routing to internal Services based on rules","A network policy for pod communication","A load balancer service type"],ans:1,exp:"Ingress exposes HTTP/S routes from outside the cluster to Services. It supports path-based and host-based routing (e.g., /api → api-service, /app → frontend). Requires an Ingress controller (nginx, Traefik)."},
  {cat:"Kubernetes",q:"What is a PersistentVolume (PV) in Kubernetes?",opts:["Temporary storage for a Pod's lifetime","A piece of storage provisioned in the cluster, independent of Pod lifecycle, with its own lifecycle","An in-memory cache volume for high-speed access","A shared config volume between containers"],ans:1,exp:"PersistentVolumes are cluster-level storage resources that outlive Pods. PersistentVolumeClaims (PVCs) request storage. StorageClasses enable dynamic provisioning of PVs from cloud providers (AWS EBS, GCE PD)."},

  // ── CLOUD ──
  {cat:"Cloud",q:"What is the difference between IaaS, PaaS, and SaaS?",opts:["They are all the same type of cloud service","IaaS provides raw infrastructure; PaaS provides a managed platform for running apps; SaaS delivers complete software over the internet","IaaS is cheaper than PaaS; PaaS is cheaper than SaaS","Only SaaS requires an internet connection"],ans:1,exp:"IaaS (EC2, GCE): you manage OS and above. PaaS (Heroku, App Engine): you deploy code, provider manages OS/runtime. SaaS (Gmail, Salesforce): fully managed software delivered as a service. Each abstracts more from the user."},
  {cat:"Cloud",q:"What is serverless computing?",opts:["A system with no physical servers","A cloud execution model where the provider manages infrastructure and automatically scales; you pay only for actual execution time","A deployment model with no downtime","A cloud model that avoids using virtual machines"],ans:1,exp:"Serverless (AWS Lambda, GCP Cloud Functions) lets you run code without managing servers. The provider auto-scales from zero to peak. You pay per invocation/duration. Ideal for event-driven, unpredictable workloads."},
  {cat:"Cloud",q:"What is cloud-native architecture?",opts:["Applications running on physical hardware in the cloud","An approach to building apps that fully exploits cloud capabilities: containerization, microservices, dynamic orchestration, and DevOps practices","Moving existing monoliths to the cloud unchanged","Using only proprietary cloud services for all components"],ans:1,exp:"Cloud-native apps are designed for the cloud: containerized, dynamically orchestrated (Kubernetes), microservices-based, CI/CD driven, and observable. They embrace immutability, resilience, and horizontal scaling."},
  {cat:"Cloud",q:"What is a cloud region vs an availability zone (AZ)?",opts:["They are the same geographic unit","A region is a geographic area containing multiple isolated AZs; AZs are one or more data centers with independent power and networking","An AZ is larger than a region","Regions are for compute; AZs are for storage"],ans:1,exp:"A region (us-east-1) is a geographic cluster of AZs. Each AZ is physically separate with its own power/cooling/networking. Deploying across AZs provides high availability within a region. Regions provide geographic redundancy."},
  {cat:"Cloud",q:"What is auto-scaling and how does it work?",opts:["Manually adding servers during traffic spikes","Automatically adding or removing compute resources based on demand, using scaling policies and metrics triggers","Upgrading server hardware automatically","Distributing traffic evenly across fixed server pools"],ans:1,exp:"Auto-scaling (AWS ASG, GCP MIG) monitors metrics (CPU, request rate) and triggers scale-out (add instances) or scale-in (remove instances) actions. Maintains performance while optimizing costs."},
  {cat:"Cloud",q:"What is a managed database service and its advantages?",opts:["A database hosted entirely by the development team","A cloud-provided database where the provider handles provisioning, patching, backups, and failover","A database accessible only within a VPC","A read-only replica of an on-premise database"],ans:1,exp:"Managed DBs (AWS RDS, Cloud SQL, Atlas) offload operational burden: automated backups, patching, multi-AZ failover, read replicas. Teams focus on schema and queries instead of DBA operations."},
  {cat:"Cloud",q:"What is the shared responsibility model in cloud security?",opts:["The cloud provider is responsible for all security","Security responsibilities are split: provider secures infrastructure 'of' the cloud; customer secures what is 'in' the cloud","Customers are responsible for all security","Security is shared equally 50/50"],ans:1,exp:"Cloud providers secure physical infrastructure, hypervisor, and managed services. Customers secure their OS, applications, data, IAM, and network configuration. The line varies by service type (IaaS vs SaaS)."},
  {cat:"Cloud",q:"What is Infrastructure as Code (IaC)?",opts:["Writing backend code that runs on cloud infrastructure","Managing and provisioning infrastructure through machine-readable configuration files rather than manual processes","Deploying code using Docker containers","A monitoring tool for cloud resources"],ans:1,exp:"IaC (Terraform, Pulumi, CloudFormation) defines infrastructure in version-controlled code. This enables repeatable, auditable, and automated provisioning—eliminating configuration drift and manual errors."},

  // ── DATABASE INTERNALS ──
  {cat:"Database Internals",q:"What is a transaction log (redo log) in a relational database?",opts:["A performance monitoring log","A log recording all database changes, used for crash recovery by replaying committed transactions","An error log for failed queries","A slow query log for optimization"],ans:1,exp:"The redo log (MySQL InnoDB redo log, PostgreSQL WAL) records all modifications before they're applied to data pages. On crash recovery, the DB replays committed transactions and rolls back uncommitted ones."},
  {cat:"Database Internals",q:"What is MVCC (Multi-Version Concurrency Control)?",opts:["A backup strategy using multiple database versions","A technique where each transaction sees a snapshot of data at a point in time, allowing readers and writers to not block each other","Running multiple database versions simultaneously","A replication strategy using multiple primary databases"],ans:1,exp:"MVCC (PostgreSQL, MySQL InnoDB) maintains multiple versions of rows. Readers see a consistent snapshot without blocking writers; writers create new versions without blocking readers. Enables high concurrency without reader-writer locking."},
  {cat:"Database Internals",q:"What is query plan and why does it matter?",opts:["A schedule for running database backups","The execution strategy chosen by the query optimizer, showing how it will access and join data","A predefined set of SQL queries","A configuration for database indexing"],ans:1,exp:"The query optimizer generates a query plan (using EXPLAIN) showing whether it uses index scan, sequential scan, hash join, etc. Understanding plans helps identify missing indexes, bad statistics, and optimization opportunities."},
  {cat:"Database Internals",q:"What is a database buffer pool?",opts:["A connection pool for database clients","An in-memory cache of database pages (data + index blocks) that reduces disk I/O by keeping frequently accessed pages in RAM","A queue for pending write operations","A backup buffer for transaction logs"],ans:1,exp:"The buffer pool (InnoDB buffer pool, PostgreSQL shared_buffers) caches data pages in memory. Reads hit memory instead of disk. Writes go to the buffer and are flushed asynchronously (dirty page writeback), dramatically improving I/O performance."},
  {cat:"Database Internals",q:"What is the difference between a clustered and a non-clustered index?",opts:["Clustered indexes are faster; non-clustered are slower","A clustered index defines the physical order of data rows; a non-clustered index is a separate structure with pointers to the actual rows","Clustered indexes can only be on primary keys","Non-clustered indexes cannot be used for range queries"],ans:1,exp:"Clustered index: data rows are physically sorted by the index key (InnoDB always clusters by primary key). One per table. Non-clustered: a separate B-tree with leaf nodes containing pointers to heap rows. Multiple allowed per table."},
  {cat:"Database Internals",q:"What is database vacuum/autovacuum in PostgreSQL?",opts:["A process to delete old database files","A maintenance process that reclaims storage from dead row versions created by MVCC updates/deletes and updates statistics","A compression tool for database tables","A process that defragments table indexes"],ans:1,exp:"PostgreSQL's MVCC creates dead row versions on updates/deletes. VACUUM reclaims this space and updates table statistics for the query planner. Autovacuum runs automatically, preventing table bloat and maintaining performance."},
  {cat:"Database Internals",q:"What is a hot standby in PostgreSQL?",opts:["A standby server running at high CPU usage","A replica that can serve read-only queries while continuously applying WAL changes from the primary","A primary server with hot backup enabled","An in-memory replica for ultra-low latency reads"],ans:1,exp:"Hot standby allows read queries on a replica while it streams WAL from the primary. Unlike warm standbys (no queries allowed), hot standby reduces primary read load and provides a ready failover target."},
  {cat:"Database Internals",q:"What is connection multiplexing in database proxies?",opts:["Running multiple databases on one server","A proxy (PgBouncer) that multiplexes many client connections into fewer actual database connections, reducing connection overhead","Routing read/write queries to different databases","Encrypting multiple database connections"],ans:1,exp:"PgBouncer and similar proxies maintain a small pool of real DB connections and multiplex thousands of client connections onto them. Databases have connection limits; multiplexing allows many clients without exhausting the DB."},

  // ── DESIGN PROBLEMS ──
  {cat:"Design Problems",q:"How would you design a URL shortener (like bit.ly)?",opts:["Store the full URL in the short URL itself","Generate a unique short key (base62 hash of ID), store (short_key → long_url) in a DB, redirect users via 301/302","Use UUID as the short URL","Store URLs in a distributed cache only"],ans:1,exp:"URL shortener: generate a short key (base62 encode a unique ID or hash), store mapping in DB+cache. On redirect, look up key in cache (Redis) first, then DB. Use 301 (permanent) or 302 (temporary) redirect. Handle collisions with increment."},
  {cat:"Design Problems",q:"In designing a rate limiter, which algorithm handles burst traffic most gracefully?",opts:["Fixed window counter","Token bucket—allows bursts up to bucket capacity while enforcing average rate over time","Sliding window log","Leaky bucket—processes at fixed rate, discards excess"],ans:1,exp:"Token bucket allows short bursts (consuming accumulated tokens) while maintaining the average rate. A user can burst 10 requests immediately if their bucket is full, then refill at the configured rate—balancing user experience and protection."},
  {cat:"Design Problems",q:"How would you design a notification system for millions of users?",opts:["Send all notifications synchronously via HTTP calls","Use a message queue to decouple notification triggers, with workers handling delivery per channel (push, email, SMS) with retries and templating","Store notifications in a database and poll every second","Use WebSockets to push all notifications directly"],ans:1,exp:"Notification system: API writes to a Kafka/SQS queue → notification workers consume, look up user preferences/device tokens, call push/email/SMS providers. Use retries with exponential backoff, DLQ for failures, and batching for efficiency."},
  {cat:"Design Problems",q:"How do you handle distributed transaction failures in an e-commerce order system?",opts:["Use two-phase commit across all services","Use Saga pattern: each service performs its local transaction and publishes events; compensating transactions handle rollbacks on failure","Lock all resources until the full transaction completes","Store all data in a single database to avoid distributed transactions"],ans:1,exp:"Saga pattern decomposes the transaction into local steps: Create Order → Reserve Inventory → Charge Payment → Ship. Each step publishes an event. On failure, compensating transactions undo previous steps (cancel order, release inventory, refund)."},
  {cat:"Design Problems",q:"What is the key challenge in designing a real-time collaborative editor (like Google Docs)?",opts:["Storing document history","Handling concurrent edits by multiple users simultaneously—resolving conflicts while preserving intent and user experience","Rendering rich text in the browser","Handling user authentication"],ans:1,exp:"Conflict resolution for concurrent edits is the core challenge. Solutions: Operational Transformation (OT, used by Google Docs)—transforms operations based on prior state; or CRDT (Conflict-free Replicated Data Types)—mathematically guarantee convergence without coordination."},
  {cat:"Design Problems",q:"How would you design a type-ahead / autocomplete search feature for scale?",opts:["Run a LIKE query on the full database on every keystroke","Maintain a trie or prefix-based inverted index with top-N completions per prefix, cached aggressively at edge","Search the full-text index on every keystroke","Store all search queries in the user's browser only"],ans:1,exp:"Autocomplete: pre-compute top suggestions per prefix in a trie or sorted prefix table. Cache in Redis. For ultra-scale, serve from CDN edge. Rank by popularity/personalization. Debounce client requests (300ms) to reduce query volume."},
  {cat:"Design Problems",q:"How would you design a global leaderboard for a game?",opts:["Sort the entire user table on every request","Use a sorted set (Redis ZADD/ZRANK) for real-time ranking; batch-compute persistent leaderboards periodically","Store rankings in a document database","Use a graph database for player relationships and scores"],ans:1,exp:"Redis Sorted Sets (ZADD score member, ZREVRANK for rank) provide O(log n) updates and rank queries. For billions of players, use approximate leaderboards with sharded sorted sets or segment-based ranking (top 1000 exact, rest approximate)."},
  {cat:"Design Problems",q:"How do you prevent double-spending in a payment system?",opts:["Check balance before every transaction","Use idempotency keys + database transactions with optimistic/pessimistic locking or compare-and-swap operations to ensure each payment executes exactly once","Process payments sequentially in a single thread","Store pending payments in a cache"],ans:1,exp:"Prevent double-spending: idempotency key (client-generated UUID stored server-side) prevents duplicate API calls. Database-level: use SELECT FOR UPDATE (pessimistic) or version check (optimistic) to atomically deduct balance. Use message queues with exactly-once semantics."},
  {cat:"Design Problems",q:"How would you design a distributed job scheduler?",opts:["Use a single cron server for all jobs","Use a job queue (Kafka/SQS) with worker pools, idempotent job execution, distributed locks to prevent duplicate execution, and a metadata store for job state","Store jobs in a relational database and poll every second","Use a load balancer to distribute jobs"],ans:1,exp:"Distributed scheduler: leader election (ZooKeeper) for scheduling decisions; job state in DB (pending, running, done); distribute to worker queue (Kafka); workers acquire distributed lock (Redis) before executing; idempotent execution + DLQ for failures."},
  {cat:"Design Problems",q:"What are key considerations when designing a multi-tenant SaaS system?",opts:["All tenants share the same database tables without isolation","Data isolation strategy (shared DB/schema/table or separate DBs), tenant routing, per-tenant resource limits, and security boundaries","Giving each tenant a separate server always","Using only NoSQL databases for multi-tenancy"],ans:1,exp:"Multi-tenancy models: Silo (separate DB per tenant—most isolated, expensive), Bridge (shared DB, separate schema), Pool (shared schema with tenant_id column—cheapest, hardest isolation). Key: row-level security, query scoping, rate limiting per tenant."},

  // ── MORE DISTRIBUTED SYSTEMS ──
  {cat:"Distributed Systems",q:"What is the difference between latency and throughput?",opts:["They are inversely proportional in all cases","Latency is the time to complete a single operation; throughput is the number of operations completed per unit time","Latency measures server speed; throughput measures network speed","They measure the same thing in different units"],ans:1,exp:"Latency: time for one request (e.g., 50ms). Throughput: requests per second (e.g., 10,000 RPS). They're related but not the same—a system can have low latency and low throughput, or high throughput with acceptable latency."},
  {cat:"Distributed Systems",q:"What is a sidecar proxy in a service mesh?",opts:["A replica of the main service","A proxy container co-deployed with every service instance to intercept all network traffic and provide observability, security, and traffic management","A dedicated caching proxy","A load balancer deployed per region"],ans:1,exp:"In Istio/Linkerd, each Pod gets an Envoy sidecar proxy injected. All inbound/outbound traffic passes through the sidecar, which handles mTLS, retries, circuit breaking, distributed tracing, and metrics—transparently to the application code."},
  {cat:"Distributed Systems",q:"What is clock skew and how does it affect distributed systems?",opts:["CPU clock speed differences between servers","The difference in time readings between clocks on different nodes, causing ordering problems for time-based operations","Network latency causing delayed message delivery","A difference in timezone configuration"],ans:1,exp:"Clocks on different machines drift apart (clock skew). This makes timestamp-based event ordering unreliable. Solutions: NTP synchronization, logical clocks (Lamport timestamps), vector clocks, or using globally consistent timestamps (Google TrueTime)."},
  {cat:"Distributed Systems",q:"What is a Lamport timestamp?",opts:["A timestamp from the Lamport server","A logical clock that assigns monotonically increasing timestamps to events, preserving causal ordering across distributed nodes","A physical timestamp with nanosecond precision","A timestamp that is synchronized via GPS"],ans:1,exp:"Lamport timestamps: each node maintains a counter. On send: increment and attach. On receive: take max(local, received)+1. This ensures if A→B causally, then L(A)<L(B). Doesn't capture concurrent events but preserves causal order."},
  {cat:"Distributed Systems",q:"What is the difference between fail-stop and Byzantine failures?",opts:["Fail-stop is worse than Byzantine","Fail-stop: a node stops and doesn't send incorrect data; Byzantine: a node behaves arbitrarily (crashes, sends wrong data, or acts maliciously)","Byzantine failures only occur in blockchain","They are the same type of failure"],ans:1,exp:"Fail-stop (crash) failures: nodes simply stop responding—easy to detect via timeouts. Byzantine failures: nodes can send incorrect or inconsistent data to different nodes. BFT consensus requires >2/3 honest nodes and is more complex than CFT (which tolerates n/2 failures)."},

  // ── MORE API DESIGN ──
  {cat:"API Design",q:"What is OpenAPI/Swagger specification?",opts:["A programming language for APIs","A language-agnostic specification for describing RESTful APIs, enabling auto-generated documentation, client SDKs, and server stubs","A testing framework for APIs","An API security standard"],ans:1,exp:"OpenAPI (formerly Swagger) is a YAML/JSON spec describing endpoints, parameters, request/response schemas, and authentication. Tools auto-generate docs (Swagger UI), client libraries, and mock servers from the spec."},
  {cat:"API Design",q:"What is the difference between synchronous and asynchronous APIs?",opts:["Synchronous APIs use HTTP; async use WebSockets only","Synchronous: client waits for response before continuing; Asynchronous: client receives acknowledgment immediately and gets result later via callback/polling/webhook","Async APIs are always faster than sync","Synchronous APIs cannot handle concurrent requests"],ans:1,exp:"Sync API: client blocks until operation completes (fast operations). Async API: server accepts request (202 Accepted), processes in background, notifies via webhook, polling endpoint, or message. Used for long-running operations (video processing, reports)."},
  {cat:"API Design",q:"What is content negotiation in REST APIs?",opts:["Negotiating API rate limits with clients","The mechanism where client and server agree on data format via Accept/Content-Type headers","Versioning APIs through HTTP headers","Caching API responses based on content type"],ans:1,exp:"Content negotiation lets clients specify preferred response format via Accept header (Accept: application/json vs application/xml). Server responds with matching Content-Type. Enables one endpoint to serve multiple formats."},
  {cat:"API Design",q:"What is HATEOAS in REST?",opts:["A REST authentication standard","Hypermedia As The Engine Of Application State: API responses include links to related actions/resources, enabling clients to navigate without hardcoded URLs","A caching strategy for REST APIs","A REST API testing methodology"],ans:1,exp:"HATEOAS is a REST constraint where responses embed links to next possible actions. Example: an order response includes links to 'pay', 'cancel', 'track'. Clients discover API dynamically rather than having endpoints hardcoded."},

  // ── MORE SECURITY ──
  {cat:"Security",q:"What is PKCE (Proof Key for Code Exchange) and why is it used?",opts:["A password encryption standard","An OAuth 2.0 extension preventing authorization code interception attacks in public clients (mobile/SPA) by binding the code to a cryptographic secret","A two-factor authentication method","An API key rotation mechanism"],ans:1,exp:"PKCE prevents auth code theft in public clients. Client generates code_verifier + code_challenge (SHA256 hash). Sends challenge with auth request; sends verifier with token request. Server verifies hash—ensures only the original client can exchange the code."},
  {cat:"Security",q:"What is a replay attack and how is it prevented?",opts:["Replaying failed database transactions","An attacker intercepts and re-sends a valid request to perform unauthorized actions; prevented via nonces, timestamps, or short-lived tokens","An attacker replaying cached API responses","A DDoS attack using repeated requests"],ans:1,exp:"Replay attacks reuse captured valid requests. Prevention: include a nonce (unique per-request random value), timestamp (reject requests older than 5 min), or use short-lived JWTs/tokens. HTTPS alone doesn't prevent replay if an attacker steals a valid token."},
  {cat:"Security",q:"What is RBAC (Role-Based Access Control)?",opts:["Restricting access based on request rate","An access control model where permissions are assigned to roles, and roles are assigned to users","Access control based on resource type","A network-level access control list"],ans:1,exp:"RBAC assigns permissions to roles (Admin, Editor, Viewer) and assigns roles to users. Users inherit permissions via their roles. Simplifies permission management—changing a role updates all users in that role simultaneously."},
  {cat:"Security",q:"What is the principle of least privilege?",opts:["Users should have the most permissions possible for flexibility","Every user, process, or system should have only the minimum permissions required to perform its function","Permissions should be distributed equally among all users","Only administrators should have system access"],ans:1,exp:"Least privilege minimizes attack surface. A compromised account with minimal permissions limits blast radius. Applied to IAM roles, database users, service accounts, and network rules—grant only what's needed, nothing more."},

  // ── MORE SCALABILITY ──
  {cat:"Scalability",q:"What is tail latency and why does it matter?",opts:["The latency of the last request in a batch","High latency at the extreme percentiles (P99, P999) that affects a small fraction of requests but disproportionately impacts user experience in fan-out systems","Latency caused by slow network tail links","The latency of dequeuing from a message queue"],ans:1,exp:"In systems with fan-out (1 request → many downstream calls), overall latency is determined by the slowest backend (the tail). P99 tail latency causes slow user-visible response even if most calls are fast. Mitigations: hedged requests, timeout budgets."},
  {cat:"Scalability",q:"What is hedged requests strategy?",opts:["Routing requests to multiple regions","Sending a duplicate request to a second server after a short timeout, taking the first response—reduces tail latency at the cost of extra load","Caching request results as a hedge against failures","Retrying requests after exponential backoff"],ans:1,exp:"Hedged requests (from Google's Tail at Scale paper): if a response doesn't arrive within P95 threshold, send a duplicate to another replica. Use whichever response arrives first. Reduces tail latency significantly with modest extra load (~2%)."},
  {cat:"Scalability",q:"What is the C10K problem?",opts:["A CPU bottleneck when serving 10,000 users","The challenge of handling 10,000 concurrent network connections efficiently, which drove the development of event-driven and async I/O architectures","A memory limitation in 10K concurrent databases","A problem with 10,000 database connections"],ans:1,exp:"The C10K problem (Dan Kegel, 1999) asked how to handle 10,000 concurrent connections. Traditional thread-per-connection models failed at this scale. Solutions: event-driven I/O (epoll, kqueue), async frameworks (Node.js, Nginx, Go goroutines)."},

  // ── MORE CACHING ──
  {cat:"Caching",q:"What is Memoization vs Caching?",opts:["They are the same technique","Memoization caches function results in-process for the same inputs; caching is a broader term for any data storage for faster retrieval","Memoization is used only in functional programming","Caching is synchronous; memoization is asynchronous"],ans:1,exp:"Memoization is an optimization technique specific to pure functions: same inputs always return cached output. Caching is broader—can apply to DB queries, HTTP responses, computed results, with invalidation strategies, distributed storage, and TTL."},
  {cat:"Caching",q:"What is a negative cache and when is it useful?",opts:["A cache that only stores failed results","Caching the fact that a lookup returned no result (miss), to prevent repeated expensive lookups for non-existent keys","A cache that evicts data aggressively","A cache placed behind the database"],ans:1,exp:"Negative caching stores 'not found' results (e.g., user doesn't exist) with a short TTL. Without it, every request for a non-existent resource hits the DB. Useful against abuse (e.g., scanning non-existent user IDs) and for expensive misses."},

  // ── MORE REPLICATION ──
  {cat:"Replication",q:"What is chain replication?",opts:["Replicating data across a circular ring of nodes","A replication protocol where writes go to the head of a chain, propagate through middle nodes, and are acknowledged only after reaching the tail","Linking multiple replication streams in sequence","A Kafka replication strategy"],ans:1,exp:"Chain replication (CR): nodes arranged as a chain. Writes to head → propagated to tail → ACK to client. Reads only from tail (guaranteeing latest committed value). Provides strong consistency. Used in Ceph RADOS and some academic systems."},
  {cat:"Replication",q:"What is the purpose of a replication factor in Kafka?",opts:["The number of consumer groups per topic","The number of copies of each partition maintained across brokers, determining fault tolerance","The compression ratio applied to messages","The maximum number of partitions per topic"],ans:1,exp:"Replication factor 3 means each partition has 1 leader and 2 follower replicas on different brokers. The topic tolerates up to 2 broker failures. The minimum in-sync replicas (ISR) setting controls when writes are acknowledged."},

  // ── MORE SHARDING ──
  {cat:"Sharding",q:"What is directory-based sharding?",opts:["Sharding based on alphabetical order of keys","Using a lookup service (directory) to map each entity to its shard, providing flexibility to reassign shards without rehashing","Distributing shards across server directories","A sharding strategy using file system directories"],ans:1,exp:"Directory-based sharding stores a mapping table (key → shard) in a lookup service. Unlike hash/range sharding, you can reassign data to shards without remapping all keys. Tradeoff: the directory becomes a bottleneck/single point of failure."},
  {cat:"Sharding",q:"How do you handle cross-shard queries?",opts:["Cross-shard queries are impossible in sharded systems","Fan-out queries to all relevant shards and aggregate results in the application layer, or use a dedicated query coordinator service","Always denormalize data to avoid cross-shard queries","Use a global lock across all shards for queries"],ans:1,exp:"Cross-shard queries (e.g., sorted results across shards) require scatter-gather: query all shards in parallel, merge-sort results in memory. Expensive at scale. Mitigations: avoid them by shard key design, denormalize data, or use a search index (Elasticsearch) for cross-shard queries."},

  // ── MORE MESSAGE QUEUES ──
  {cat:"Message Queues",q:"What is Kafka's log compaction feature?",opts:["Compressing Kafka log files to save disk space","Retaining only the latest message for each key, effectively maintaining a snapshot of the latest state per key indefinitely","Merging multiple Kafka topics into one","Deleting old messages after processing"],ans:1,exp:"Log compaction removes all but the latest message per key. Result: compact log with latest value per key, retained forever regardless of retention time. Used for changelog topics and rebuilding state in Kafka Streams/ksqlDB."},
  {cat:"Message Queues",q:"What is the Kafka consumer offset and how is it managed?",opts:["The position of a producer in a topic","The position of a consumer in a partition log; managed by committing offsets to __consumer_offsets topic or externally","The lag between producer and consumer throughput","The index of the latest message in a partition"],ans:1,exp:"Kafka consumers track their position via offsets. Committed offset = last processed message position. On restart, consumer resumes from committed offset. Auto-commit (at-most-once risk) vs manual commit (at-least-once control). External offset management enables exactly-once."},

  // ── MORE CONSENSUS ──
  {cat:"Consensus Algorithms",q:"What is the difference between Raft and Multi-Paxos?",opts:["Raft uses more nodes than Paxos","Both achieve distributed consensus; Raft was designed for understandability with clear leader election and log replication phases; Paxos is mathematically elegant but harder to implement","Paxos handles Byzantine failures; Raft does not","Raft requires synchronous clocks; Paxos does not"],ans:1,exp:"Raft and Multi-Paxos solve the same problem. Raft explicitly separates leader election, log replication, and safety—making it easier to understand, teach, and implement correctly. Both are crash-fault-tolerant and require majority quorum."},
  {cat:"Consensus Algorithms",q:"What is the FLP impossibility result?",opts:["Faster-than-Light-speed Processing limitation","In an asynchronous distributed system, no deterministic consensus algorithm can guarantee termination if even one process can fail","A theorem about Byzantine fault tolerance limits","A proof that distributed locks are impossible"],ans:1,exp:"The Fischer-Lynch-Paterson theorem proves that in a purely asynchronous system with even one possible process crash, no deterministic algorithm can always reach consensus. Real systems work around this with timeouts, randomization (Raft's election randomization), or partial synchrony assumptions."},

  // ── MORE NETWORKING ──
  {cat:"Networking",q:"What is service mesh observability?",opts:["Monitoring hardware in a data center","Automatic collection of metrics, logs, and traces for all service-to-service communication without application code changes","Network packet inspection at Layer 2","Monitoring DNS resolution across services"],ans:1,exp:"Service meshes (Istio with Envoy) automatically emit L7 metrics (request rate, error rate, latency), distributed traces, and access logs for every service call. Teams gain full traffic visibility without instrumenting application code."},
  {cat:"Networking",q:"What is a connection draining / deregistration delay?",opts:["Waiting for connections to timeout on their own","Allowing in-flight requests to complete before removing a server instance from the load balancer pool during scale-in or deployments","Closing idle connections after a timeout","Draining a message queue before shutdown"],ans:1,exp:"Connection draining (AWS: deregistration delay) stops sending new requests to an instance being decommissioned but allows existing in-flight requests to complete within a timeout. Prevents dropping active requests during deployments or scale-in events."},

  // ── MORE DATA PIPELINES ──
  {cat:"Data Pipelines",q:"What is a data mesh architecture?",opts:["A microservices architecture for databases","A decentralized data ownership model where domain teams own and publish their data as products, with a federated governance layer","A distributed caching layer for analytics","A streaming data pipeline using mesh topology"],ans:1,exp:"Data mesh (Zhamak Dehghani) decentralizes data ownership: each domain team owns their data pipelines and exposes data as products. Federated governance ensures interoperability. Contrasts with centralized data lake/warehouse owned by a data team."},
  {cat:"Data Pipelines",q:"What is change data capture (CDC)?",opts:["Auditing changes to application configuration","Capturing every insert, update, and delete from a database log in real-time and publishing changes as events to downstream systems","A technique for comparing two database snapshots","Monitoring database schema changes over time"],ans:1,exp:"CDC (Debezium, AWS DMS) reads the DB replication log (binlog, WAL) to capture row-level changes in real-time. Changes are published to Kafka, enabling sync to search indexes, caches, data warehouses, and other services without polling the DB."},

  // ── MORE SQL vs NoSQL ──
  {cat:"SQL vs NoSQL",q:"What is a wide-column store and its typical use cases?",opts:["A SQL database with many columns per table","A NoSQL database where columns can vary per row and are grouped into column families, optimized for large-scale writes and time-series data","A database that compresses all columns","An OLAP database with columnar storage"],ans:1,exp:"Wide-column stores (Cassandra, HBase, Bigtable) organize data into column families. Rows can have different columns. Optimized for high-write throughput, large datasets, time-series, and IoT data. Queries must be designed around access patterns."},
  {cat:"SQL vs NoSQL",q:"What is the difference between eventual consistency in Cassandra and MongoDB?",opts:["They implement identical consistency models","Cassandra defaults to eventual consistency with tunable consistency levels (quorum reads/writes); MongoDB offers tunable read/write concern with optional strong consistency","MongoDB always uses strong consistency; Cassandra cannot","Both always use quorum-based strong consistency"],ans:1,exp:"Cassandra: default eventual consistency, but tunable—QUORUM reads+writes give strong consistency at latency cost. MongoDB: default strong consistency with primary reads, but can be relaxed (secondary reads, lower write concern). Both are tunable."},

  // ── MORE CDN ──
  {cat:"CDN",q:"What is a CDN pull vs push zone?",opts:["Pull is faster than push always","Pull zone: CDN fetches content from origin on first request (lazy); Push zone: you proactively upload content to CDN edge servers","Push zone is for dynamic content; pull is for static","They are the same mechanism"],ans:1,exp:"Pull zones (most common): first request goes to origin, CDN caches and serves subsequent requests. Push zones: you upload assets to CDN directly (common for large files, video). Pull is simpler; push ensures immediate availability without origin hits."},
  {cat:"CDN",q:"What is edge computing in the context of CDNs?",opts:["Running servers at the edge of a building","Executing compute logic (code) at CDN edge locations close to users, rather than in a central origin data center","Caching only at the geographic edge of a network","A technique for reducing CDN latency by prefetching"],ans:1,exp:"Edge computing (Cloudflare Workers, Fastly Compute@Edge, Lambda@Edge) runs code at CDN edge nodes globally. Enables: A/B testing at the edge, auth, personalization, and API aggregation—with sub-millisecond latency to users."},

  // ── MORE OBSERVABILITY ──
  {cat:"Observability",q:"What is the USE method in monitoring?",opts:["Uptime, Speed, and Errors","Utilization, Saturation, Errors—the three metrics for every resource (CPU, memory, disk, network)","Users, Services, and Events","Updates, Syncs, and Executions"],ans:1,exp:"The USE method (Brendan Gregg) monitors every resource: Utilization (% busy), Saturation (work backlog/queue), Errors (error rate). Applied to CPU, memory, disks, network interfaces. Complements RED (which is service-oriented)."},
  {cat:"Observability",q:"What is a span in distributed tracing?",opts:["A time range for log retention","A single unit of work within a trace, representing an operation in one service with start time, duration, and metadata","A network packet between services","A monitoring alert threshold"],ans:1,exp:"A span represents one operation (HTTP call, DB query, function call) within a distributed trace. Each span has: trace_id (shared), span_id (unique), parent_span_id, operation name, start time, duration, and tags. Spans form a tree showing request flow."},

  // ── MORE RATE LIMITING ──
  {cat:"Rate Limiting",q:"How do you implement distributed rate limiting across multiple API gateway instances?",opts:["Each instance independently limits requests without coordination","Use a centralized store (Redis) with atomic operations (INCR with TTL or Lua scripts) to share rate limit counters across all instances","Assign each user to a fixed gateway instance","Use a fixed window counter on a single master gateway"],ans:1,exp:"Distributed rate limiting: all gateway instances share counters in Redis. Use atomic INCR+EXPIRE (fixed window) or a sliding window Lua script. Redis Cluster shards counters for scale. Latency tradeoff: each request pays a Redis round-trip."},
  {cat:"Rate Limiting",q:"What is a rate limit response code and standard headers?",opts:["200 OK with a warning header","429 Too Many Requests, with headers: X-RateLimit-Limit, X-RateLimit-Remaining, X-RateLimit-Reset, Retry-After","503 Service Unavailable","400 Bad Request with error details"],ans:1,exp:"RFC 6585 defines 429 Too Many Requests for rate limiting. Best practice headers: X-RateLimit-Limit (limit), X-RateLimit-Remaining (requests left), X-RateLimit-Reset (Unix timestamp when window resets), Retry-After (seconds to wait). Helps clients implement smart backoff."},

  // ── MORE SYSTEM DESIGN PATTERNS ──
  {cat:"System Design Patterns",q:"What is the Strangler Fig pattern?",opts:["Immediately rewriting the legacy system","Gradually replacing a legacy system by routing new features to new services while the legacy system shrinks over time until it can be decommissioned","Running two versions of the system permanently","Migrating the database first before services"],ans:1,exp:"Strangler Fig (Martin Fowler): wrap the legacy system with a facade. New functionality goes to new services. Gradually reroute legacy functionality to new implementations. Eventually the legacy is 'strangled' away without a risky big-bang rewrite."},
  {cat:"System Design Patterns",q:"What is the Scatter-Gather pattern?",opts:["Distributing logs to multiple destinations","Sending a request to multiple services in parallel (scatter) and aggregating their responses into one result (gather)","Sharding data and gathering it at query time","A map-reduce variant for streaming data"],ans:1,exp:"Scatter-gather parallelizes work: one coordinator scatters sub-requests to multiple workers simultaneously, then gathers and merges responses. Used in search (Elasticsearch fan-out to shards), price comparison, and distributed aggregations."},
  {cat:"System Design Patterns",q:"What is the Claim Check pattern in messaging?",opts:["Verifying message sender identity","Storing large message payloads in external storage and passing only a reference (claim check token) in the message, keeping the message queue lightweight","Checking message delivery guarantees","A pattern for message deduplication"],ans:1,exp:"Claim check: store large payload (image, video, large JSON) in blob storage (S3). Pass the storage reference in the message. Consumer retrieves payload using the reference. Keeps message broker fast (small messages) and handles large payloads cost-effectively."},
];

// ── QUIZ STATE ──
let ACTIVE_QUESTIONS = [];
let current = 0, score = 0, answered = [];
let quizTotal = 0;

// Derive all unique topics from actual question data (always accurate)
const allTopics = [...new Set(ALL_QUESTIONS.map(q => q.cat))];

// Update subtitle with real total
document.getElementById('splashSub').textContent =
  `${ALL_QUESTIONS.length} curated MCQs across ${allTopics.length} topics. Pick a topic below or start all questions.`;

// Build topic grid — clicking a topic immediately starts its quiz
function buildTopicGrid() {
  const grid = document.getElementById('topicGrid');
  grid.innerHTML = allTopics.map(t => {
    const count = ALL_QUESTIONS.filter(q => q.cat === t).length;
    const safeId = 'tbtn-' + t.replace(/[^a-z0-9]/gi, '_');
    return `<button class="topic-btn" id="${safeId}" onclick="startTopic('${t.replace(/'/g,"\\'")}")">
