<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Design Quiz — 300 Questions</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #181c24;
    --border: #1e2433;
    --accent: #00e5ff;
    --accent2: #7c3aed;
    --accent3: #f59e0b;
    --correct: #10b981;
    --wrong: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --mono: 'JetBrains Mono', monospace;
    --display: 'Syne', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── SPLASH ── */
  #splash {
    position: fixed; inset: 0; z-index: 100;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
    gap: 1.5rem;
    padding: 3rem 1.5rem 4rem;
    overflow-y: auto;
  }
  .splash-badge {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-transform: uppercase;
    border: 1px solid var(--accent);
    padding: 0.35em 1em;
    opacity: 0;
    animation: fadeUp 0.6s 0.2s forwards;
  }
  .splash-title {
    font-family: var(--display);
    font-size: clamp(2.4rem, 7vw, 5rem);
    font-weight: 800;
    line-height: 1;
    text-align: center;
    opacity: 0;
    animation: fadeUp 0.6s 0.4s forwards;
  }
  .splash-title span { color: var(--accent); }
  .splash-sub {
    font-size: 0.85rem;
    color: var(--muted);
    text-align: center;
    max-width: 480px;
    line-height: 1.7;
    opacity: 0;
    animation: fadeUp 0.6s 0.6s forwards;
  }
  .topics-grid {
    display: flex; flex-wrap: wrap; gap: 0.5rem;
    justify-content: center; max-width: 600px;
    opacity: 0;
    animation: fadeUp 0.6s 0.8s forwards;
  }
  .topic-tag {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    padding: 0.3em 0.8em;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 2px;
  }
  .start-btn {
    margin-top: 0.5rem;
    padding: 0.9rem 3rem;
    background: var(--accent);
    color: #000;
    font-family: var(--mono);
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border: none; cursor: pointer;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    transition: transform 0.15s, box-shadow 0.15s;
    opacity: 0;
    animation: fadeUp 0.6s 1s forwards;
  }
  .start-btn:hover { transform: scale(1.04); box-shadow: 0 0 30px rgba(0,229,255,0.4); }

  /* ── MAIN APP ── */
  #app { display: none; position: relative; z-index: 1; max-width: 820px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 0 1.5rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2rem;
    flex-wrap: wrap; gap: 1rem;
  }
  .header-logo {
    font-family: var(--display);
    font-weight: 800; font-size: 1.1rem;
    color: var(--accent);
    letter-spacing: -0.02em;
  }
  .header-logo span { color: var(--text); }
  .progress-wrap { flex: 1; max-width: 300px; }
  .progress-label {
    display: flex; justify-content: space-between;
    font-size: 0.65rem; color: var(--muted); margin-bottom: 0.4rem;
    letter-spacing: 0.1em;
  }
  .progress-bar {
    height: 3px; background: var(--border); border-radius: 2px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--accent);
    transition: width 0.4s ease;
    box-shadow: 0 0 8px var(--accent);
  }
  .score-badge {
    font-size: 0.75rem;
    color: var(--accent3);
    border: 1px solid var(--accent3);
    padding: 0.3em 0.8em;
    letter-spacing: 0.1em;
  }

  /* Question card */
  .q-meta {
    display: flex; align-items: center; gap: 1rem;
    margin-bottom: 1.2rem; flex-wrap: wrap;
  }
  .q-num {
    font-size: 0.65rem; letter-spacing: 0.2em; color: var(--accent);
    text-transform: uppercase;
  }
  .q-category {
    font-size: 0.62rem; letter-spacing: 0.15em;
    color: var(--muted); text-transform: uppercase;
    border: 1px solid var(--border);
    padding: 0.2em 0.6em;
  }
  .q-text {
    font-family: var(--display);
    font-size: clamp(1rem, 2.5vw, 1.25rem);
    font-weight: 600;
    line-height: 1.5;
    margin-bottom: 2rem;
    color: var(--text);
  }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 0.75rem; }
  .option {
    position: relative;
    display: flex; align-items: flex-start; gap: 1rem;
    padding: 1rem 1.2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.1s;
    border-radius: 2px;
    text-align: left;
  }
  .option:hover:not(.disabled) {
    border-color: var(--accent);
    background: var(--surface2);
    transform: translateX(4px);
  }
  .option.correct { border-color: var(--correct); background: rgba(16,185,129,0.08); }
  .option.wrong   { border-color: var(--wrong);   background: rgba(239,68,68,0.08); }
  .option.disabled { cursor: default; }
  .opt-key {
    min-width: 26px; height: 26px;
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; font-weight: 700; color: var(--muted);
    flex-shrink: 0;
    transition: border-color 0.2s, color 0.2s;
  }
  .option.correct .opt-key { border-color: var(--correct); color: var(--correct); }
  .option.wrong   .opt-key { border-color: var(--wrong);   color: var(--wrong); }
  .option:hover:not(.disabled) .opt-key { border-color: var(--accent); color: var(--accent); }
  .opt-text { font-size: 0.88rem; line-height: 1.5; padding-top: 0.15rem; }

  /* Explanation */
  .explanation {
    margin-top: 1.5rem;
    padding: 1.2rem 1.4rem;
    background: var(--surface2);
    border-left: 3px solid var(--accent);
    display: none;
    animation: fadeUp 0.3s forwards;
  }
  .explanation.show { display: block; }
  .exp-label {
    font-size: 0.62rem; letter-spacing: 0.2em; color: var(--accent);
    text-transform: uppercase; margin-bottom: 0.6rem;
  }
  .exp-text { font-size: 0.84rem; line-height: 1.7; color: #94a3b8; }

  /* Nav */
  .nav {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 2rem; gap: 1rem; flex-wrap: wrap;
  }
  .nav-btn {
    padding: 0.75rem 2rem;
    font-family: var(--mono);
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    transition: 0.2s;
    clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .nav-btn.primary {
    background: var(--accent); color: #000;
    border-color: var(--accent);
  }
  .nav-btn.primary:hover { box-shadow: 0 0 20px rgba(0,229,255,0.35); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Result screen */
  #result {
    display: none; text-align: center;
    padding: 4rem 2rem;
    animation: fadeUp 0.5s forwards;
  }
  .result-title {
    font-family: var(--display);
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 800; margin-bottom: 0.5rem;
  }
  .result-score {
    font-size: clamp(3rem, 10vw, 6rem);
    font-family: var(--display);
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
    margin: 1rem 0;
    text-shadow: 0 0 60px rgba(0,229,255,0.4);
  }
  .result-grade {
    font-size: 1.1rem; color: var(--muted); margin-bottom: 2rem;
  }
  .result-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 1rem; max-width: 400px; margin: 0 auto 2.5rem;
  }
  .result-stat {
    background: var(--surface); border: 1px solid var(--border);
    padding: 1rem; border-radius: 2px;
  }
  .stat-val { font-size: 1.5rem; font-weight: 700; font-family: var(--display); }
  .stat-val.c { color: var(--correct); }
  .stat-val.w { color: var(--wrong); }
  .stat-val.s { color: var(--accent3); }
  .stat-lab { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.1em; margin-top: 0.2rem; }
  .restart-btn {
    padding: 0.9rem 3rem;
    background: var(--accent); color: #000;
    font-family: var(--mono); font-weight: 700;
    font-size: 0.9rem; letter-spacing: 0.15em;
    text-transform: uppercase; border: none; cursor: pointer;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .restart-btn:hover { transform: scale(1.04); box-shadow: 0 0 30px rgba(0,229,255,0.4); }

  /* Question dots minimap */
  .minimap {
    display: flex; flex-wrap: wrap; gap: 4px;
    margin-bottom: 1.5rem;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--border);
    transition: background 0.3s;
    cursor: pointer;
  }
  .dot.answered { background: var(--accent); }
  .dot.current  { background: var(--accent3); box-shadow: 0 0 6px var(--accent3); }
  .dot.correct-dot { background: var(--correct); }
  .dot.wrong-dot   { background: var(--wrong); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-anim { animation: fadeUp 0.3s forwards; }

  /* ── TOPIC SELECTION ── */
  .mode-tabs {
    display: flex; gap: 0.5rem;
    opacity: 0; animation: fadeUp 0.6s 0.7s forwards;
  }
  .mode-tab {
    padding: 0.45rem 1.2rem;
    font-family: var(--mono); font-size: 0.7rem;
    letter-spacing: 0.12em; text-transform: uppercase;
    border: 1px solid var(--border);
    background: transparent; color: var(--muted);
    cursor: pointer; transition: 0.2s;
    clip-path: polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%);
  }
  .mode-tab.active {
    background: var(--accent); color: #000;
    border-color: var(--accent);
  }
  .mode-tab:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

  #topicSelect {
    width: 100%; max-width: 640px;
    opacity: 0; animation: fadeUp 0.6s 0.85s forwards;
  }
  .topic-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 0.5rem;
  }
  .topic-btn {
    padding: 0.6rem 0.8rem;
    font-family: var(--mono); font-size: 0.68rem;
    letter-spacing: 0.08em; text-align: left;
    border: 1px solid var(--border);
    background: var(--surface); color: var(--muted);
    cursor: pointer; transition: 0.2s;
    border-radius: 2px; position: relative;
  }
  .topic-btn .t-count {
    display: block; font-size: 0.6rem;
    color: var(--accent); margin-top: 0.2rem;
  }
  .topic-btn:hover { border-color: var(--accent2); color: var(--text); background: var(--surface2); }
  .topic-btn.selected { border-color: var(--accent); color: var(--accent); background: rgba(0,229,255,0.07); }
  .topic-btn.selected::after {
    content: '✓';
    position: absolute; top: 0.4rem; right: 0.6rem;
    font-size: 0.65rem; color: var(--accent);
  }
  .sel-info {
    font-size: 0.7rem; color: var(--muted);
    text-align: center; margin-top: 0.5rem;
    letter-spacing: 0.05em;
  }
  .sel-info span { color: var(--accent3); }

  .quiz-mode-label {
    font-size: 0.62rem; letter-spacing: 0.18em;
    color: var(--accent2); text-transform: uppercase;
    border: 1px solid var(--accent2);
    padding: 0.2em 0.6em;
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/redux/4.2.1/redux.min.js"></script>
</head>
<body>

<!-- ── SPLASH ── -->
<div id="splash">
  <div class="splash-badge">Interview Prep Series</div>
  <div class="splash-title">System<br><span>Design</span> Quiz</div>
  <div class="splash-sub" id="splashSub">300 curated MCQs across 29 topics. Pick a topic below or start all questions.</div>

  <!-- All Topics button -->
  <button class="start-btn" id="startBtn" onclick="startAll()">Start Full Quiz (All Topics) →</button>

  <!-- Topic grid — always visible -->
  <div style="width:100%;max-width:680px;">
    <div style="font-size:0.62rem;letter-spacing:0.2em;color:var(--accent);text-transform:uppercase;margin-bottom:0.75rem;opacity:0;animation:fadeUp 0.5s 1.1s forwards;">Or choose a topic:</div>
    <div class="topic-grid" id="topicGrid"></div>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">
  <div class="header">
    <div class="header-logo">SD<span>Quiz</span></div>
    <div class="progress-wrap">
      <div class="progress-label">
        <span id="progLabel">Q 1 / 300</span>
        <span id="progPct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
    </div>
    <div class="score-badge">Score: <span id="scoreDisplay">0</span></div>
  </div>

  <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.5rem;">
    <div class="quiz-mode-label" id="modeLabel">All Topics</div>
    <button style="font-family:var(--mono);font-size:0.65rem;letter-spacing:0.1em;padding:0.25em 0.8em;background:transparent;border:1px solid var(--border);color:var(--muted);cursor:pointer;text-transform:uppercase;" onclick="goHome()">← Change Mode</button>
  </div>
  <div class="minimap" id="minimap"></div>

  <div id="quizArea"></div>

  <div id="result">
    <div class="result-title">Quiz Complete 🎯</div>
    <div class="result-score" id="finalScore"></div>
    <div class="result-grade" id="finalGrade"></div>
    <div class="result-grid">
      <div class="result-stat"><div class="stat-val c" id="rCorrect">0</div><div class="stat-lab">CORRECT</div></div>
      <div class="result-stat"><div class="stat-val w" id="rWrong">0</div><div class="stat-lab">WRONG</div></div>
      <div class="result-stat"><div class="stat-val s" id="rSkipped">0</div><div class="stat-lab">SKIPPED</div></div>
    </div>
    <button class="restart-btn" onclick="restartQuiz()">Try Again →</button>
  </div>
</div>

<script>
const TOPICS = ["Scalability","Load Balancing","Caching","Databases","CAP Theorem","Consistency","Replication","Sharding","Microservices","Message Queues","CDN","API Design","Rate Limiting","SQL vs NoSQL","Hashing","Distributed Systems","Consensus Algorithms","Storage","Networking","Security","Observability","Service Discovery","Event-Driven","Data Pipelines","System Design Patterns","Kubernetes","Cloud","Database Internals","Design Problems"];

// ── QUIZ STATE ──
const { createStore } = window.Redux;

const initialState = {
  activeQuestions: [],
  current: 0,
  score: 0,
  answered: [],
  quizTotal: 0,
  topic: 'All Topics',
  view: 'splash' // 'splash', 'app', 'result'
};

function quizReducer(state = initialState, action) {
  switch (action.type) {
    case 'START_QUIZ':
      return {
        ...state,
        activeQuestions: action.payload.questions,
        quizTotal: action.payload.questions.length,
        current: 0,
        score: 0,
        answered: new Array(action.payload.questions.length).fill(null),
        topic: action.payload.topic,
        view: 'app'
      };
    case 'SELECT_ANSWER': {
      if (state.answered[state.current] !== null) return state;
      const isCorrect = action.payload === state.activeQuestions[state.current].ans;
      const newAnswered = [...state.answered];
      newAnswered[state.current] = action.payload;
      return {
        ...state,
        answered: newAnswered,
        score: isCorrect ? state.score + 1 : state.score
      };
    }
    case 'NEXT_QUESTION':
      if (state.current < state.quizTotal - 1) {
        return { ...state, current: state.current + 1 };
      }
      return state;
    case 'PREV_QUESTION':
      if (state.current > 0) {
        return { ...state, current: state.current - 1 };
      }
      return state;
    case 'JUMP_TO':
      return { ...state, current: action.payload };
    case 'SHOW_RESULT':
      return { ...state, view: 'result' };
    case 'GO_HOME':
      return { ...state, view: 'splash' };
    case 'RESTART_QUIZ':
      return {
        ...state,
        current: 0,
        score: 0,
        answered: new Array(state.quizTotal).fill(null),
        view: 'app'
      };
    default:
      return state;
  }
}

const store = createStore(quizReducer);

// Derive all unique topics from actual question data (always accurate)
const allTopics = [...new Set(ALL_QUESTIONS.map(q => q.cat))];

// Update subtitle with real total
document.getElementById('splashSub').textContent =
  `${ALL_QUESTIONS.length} curated MCQs across ${allTopics.length} topics. Pick a topic below or start all questions.`;

// Build topic grid — clicking a topic immediately starts its quiz
function buildTopicGrid() {
  const grid = document.getElementById('topicGrid');
  grid.innerHTML = allTopics.map(t => {
    const count = ALL_QUESTIONS.filter(q => q.cat === t).length;
    const safeId = 'tbtn-' + t.replace(/[^a-z0-9]/gi, '_');
    return `<button class="topic-btn" id="${safeId}" onclick="startTopic('${t.replace(/'/g,"\\'")}")">
      ${t}<span class="t-count">${count} Q</span>
    </button>`;
  }).join('');
}
buildTopicGrid();

// ── ACTION CREATORS & DISPATCHERS ──

function startTopic(t) {
  const questions = ALL_QUESTIONS.filter(q => q.cat === t);
  store.dispatch({ type: 'START_QUIZ', payload: { questions, topic: t } });
}

function startAll() {
  const questions = ALL_QUESTIONS.slice();
  store.dispatch({ type: 'START_QUIZ', payload: { questions, topic: 'All Topics' } });
}

function goHome() {
  store.dispatch({ type: 'GO_HOME' });
}

function jumpTo(i) {
  store.dispatch({ type: 'JUMP_TO', payload: i });
}

function selectAnswer(i) {
  store.dispatch({ type: 'SELECT_ANSWER', payload: i });
}

function nextQ() {
  store.dispatch({ type: 'NEXT_QUESTION' });
}

function prevQ() {
  store.dispatch({ type: 'PREV_QUESTION' });
}

function showResult() {
  store.dispatch({ type: 'SHOW_RESULT' });
}

function restartQuiz() {
  store.dispatch({ type: 'RESTART_QUIZ' });
}

// ── UI RENDERING ──

function buildMinimap(state) {
  const mm = document.getElementById('minimap');
  mm.innerHTML = '';
  for(let i=0; i < state.quizTotal; i++){
    const d = document.createElement('div');
    d.className='dot'; d.title=`Q${i+1}`;
    d.onclick = () => jumpTo(i);
    mm.appendChild(d);
  }
}

function updateMinimap(state) {
  const dots = document.querySelectorAll('.dot');
  dots.forEach((d,i)=>{
    d.className='dot';
    if(i === state.current) d.classList.add('current');
    else if(state.answered[i] !== null){
      const correct = state.activeQuestions[i].ans === state.answered[i];
      d.classList.add(correct ? 'correct-dot' : 'wrong-dot');
    } else if(i < state.current) d.classList.add('answered');
  });
}

function renderQuestionUI(state) {
  const q = state.activeQuestions[state.current];
  if (!q) return;

  const pct = Math.round((state.current / state.quizTotal) * 100);
  document.getElementById('progLabel').textContent = `Q ${state.current+1} / ${state.quizTotal}`;
  document.getElementById('progPct').textContent = pct+'%';
  document.getElementById('progFill').style.width = pct+'%';
  document.getElementById('scoreDisplay').textContent = state.score;
  updateMinimap(state);

  const isAnswered = state.answered[state.current] !== null;

  document.getElementById('quizArea').innerHTML = `
    <div class="card-anim">
      <div class="q-meta">
        <span class="q-num">Question ${state.current+1} of ${state.quizTotal}</span>
        <span class="q-category">${q.cat}</span>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="options">
        ${q.opts.map((o,i)=>{
          let cls='option';
          if(isAnswered){
            cls+=' disabled';
            if(i===q.ans) cls+=' correct';
            else if(i===state.answered[state.current]) cls+=' wrong';
          }
          return `<div class="${cls}" onclick="selectAnswer(${i})">
            <div class="opt-key">${String.fromCharCode(65+i)}</div>
            <div class="opt-text">${o}</div>
          </div>`;
        }).join('')}
      </div>
      <div class="explanation${isAnswered?' show':''}" id="exp">
        <div class="exp-label">// Explanation</div>
        <div class="exp-text">${q.exp}</div>
      </div>
      <div class="nav">
        <button class="nav-btn" onclick="prevQ()" ${state.current===0?'disabled':''}>← Prev</button>
        <span style="font-size:0.7rem;color:var(--muted)">${isAnswered?(state.answered[state.current]===q.ans?'✓ Correct':'✗ Incorrect'):'Not answered'}</span>
        ${state.current===state.quizTotal-1
          ? `<button class="nav-btn primary" onclick="showResult()">Finish Quiz →</button>`
          : `<button class="nav-btn primary" onclick="nextQ()">Next →</button>`}
      </div>
    </div>
  `;
}

function renderResultUI(state) {
  const correct = state.answered.filter((a,i)=>a===state.activeQuestions[i].ans).length;
  const wrong   = state.answered.filter((a,i)=>a!==null&&a!==state.activeQuestions[i].ans).length;
  const skipped = state.answered.filter(a=>a===null).length;
  const pct = Math.round((correct/state.quizTotal)*100) || 0;
  let grade='Needs Work 📚';
  if(pct>=90) grade='Expert Level 🏆';
  else if(pct>=75) grade='Advanced 🌟';
  else if(pct>=60) grade='Intermediate 👍';
  else if(pct>=40) grade='Developing 📖';
  
  document.getElementById('finalScore').textContent = pct+'%';
  document.getElementById('finalGrade').textContent = grade;
  document.getElementById('rCorrect').textContent = correct;
  document.getElementById('rWrong').textContent = wrong;
  document.getElementById('rSkipped').textContent = skipped;
}

// ── STORE SUBSCRIPTION ──

let prevState = {};
function renderApp() {
  const state = store.getState();
  
  if (state.view !== prevState.view) {
    document.getElementById('splash').style.display = state.view === 'splash' ? 'flex' : 'none';
    document.getElementById('app').style.display = (state.view === 'app' || state.view === 'result') ? 'block' : 'none';
    document.getElementById('quizArea').style.display = state.view === 'app' ? 'block' : 'none';
    document.getElementById('minimap').style.display = state.view === 'app' ? 'flex' : 'none';
    document.getElementById('result').style.display = state.view === 'result' ? 'block' : 'none';
  }

  if (state.topic !== prevState.topic) {
    document.getElementById('modeLabel').textContent = state.topic;
  }

  if (state.view === 'app') {
    if (state.activeQuestions !== prevState.activeQuestions) {
      buildMinimap(state);
    }
    renderQuestionUI(state);
  }

  if (state.view === 'result' && prevState.view !== 'result') {
    renderResultUI(state);
  }

  prevState = state;
}

store.subscribe(renderApp);
renderApp();
</script>
</body>
</html>
