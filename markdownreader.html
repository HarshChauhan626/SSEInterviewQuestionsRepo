<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Markdown Reader — Dev Notes</title>
  <meta name="description" content="Read and explore DSA, system design, and interview prep notes with syntax highlighting and Mermaid diagrams.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;1,14..32,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.6.1/github-markdown-dark.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      color-scheme: dark;
      /* ── Shared design tokens (matches index.html) ── */
      --bg:           #0a0c10;
      --surface:      #111318;
      --surface2:     #181c23;
      --border:       rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.18);
      --text:         #e8edf5;
      --text-2:       #8b95a8;
      --text-3:       #565f70;
      --accent:       #6c8cff;
      --accent-dim:   rgba(108,140,255,0.12);
      --accent-ring:  rgba(108,140,255,0.22);
      --red:          #f87171;
      --radius:       12px;
    }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Inter', system-ui, ui-sans-serif, -apple-system, sans-serif;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    /* Ambient blobs — same as index.html */
    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(110px);
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 560px; height: 480px;
      top: -160px; left: -200px;
      background: radial-gradient(circle, rgba(108,140,255,0.2) 0%, transparent 70%);
    }
    body::after {
      width: 440px; height: 380px;
      bottom: -100px; right: -160px;
      background: radial-gradient(circle, rgba(34,211,166,0.1) 0%, transparent 70%);
    }

    /* ── Layout shell ── */
    .shell {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 260px;
      gap: 1px;
      background: var(--border);
    }

    aside,
    .reader {
      min-height: 0;
      background: rgba(10,12,16,0.9);
      backdrop-filter: blur(24px);
    }

    /* ── File drawer (slide-in panel) ── */
    aside {
      display: flex;
      flex-direction: column;
      padding: 16px;
    }

    .file-panel {
      position: fixed;
      z-index: 30;
      inset: 0 auto 0 0;
      width: min(300px, calc(100vw - 28px));
      height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      box-shadow: 24px 0 72px rgba(0,0,0,0.5);
      transform: translateX(-104%);
      transition: transform 200ms cubic-bezier(.4,0,.2,1);
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    body.files-open .file-panel { transform: translateX(0); }

    .drawer-backdrop {
      position: fixed;
      z-index: 20;
      inset: 0;
      border: 0;
      padding: 0;
      opacity: 0;
      pointer-events: none;
      background: rgba(0,0,0,0.55);
      transition: opacity 200ms ease;
      cursor: default;
    }
    body.files-open .drawer-backdrop {
      opacity: 1;
      pointer-events: auto;
    }

    /* ── Brand / drawer header ── */
    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .brand a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.01em;
    }
    .brand-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
      animation: pulse 2.5s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.45; transform: scale(0.82); }
    }

    .icon-btn {
      display: inline-grid;
      place-items: center;
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-2);
      background: var(--surface2);
      cursor: pointer;
      transition: border-color 160ms, color 160ms, background 160ms;
      text-decoration: none;
      flex-shrink: 0;
    }
    .icon-btn:hover {
      border-color: var(--border-hover);
      color: var(--text);
      background: rgba(255,255,255,0.07);
    }

    .brand h1 {
      margin: 0;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-2);
      letter-spacing: 0;
    }

    /* ── Search in drawer ── */
    .search {
      display: flex;
      align-items: center;
      gap: 9px;
      flex: 0 0 auto;
      height: 40px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: var(--surface2);
      transition: border-color 160ms, box-shadow 160ms;
    }
    .search:focus-within {
      border-color: rgba(108,140,255,0.4);
      box-shadow: 0 0 0 3px var(--accent-ring);
    }

    .search svg,
    .icon-btn svg,
    .brand svg {
      width: 16px;
      height: 16px;
      flex: 0 0 auto;
      color: var(--text-3);
    }

    input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font: 0.88rem/1 'Inter', sans-serif;
    }
    input::placeholder { color: var(--text-3); }

    /* ── File list ── */
    .file-list,
    .toc {
      min-height: 0;
      overflow: auto;
      margin-top: 12px;
      padding-right: 2px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .file-link,
    .toc a {
      display: block;
      margin-bottom: 4px;
      padding: 9px 10px;
      border: 1px solid transparent;
      border-radius: 8px;
      color: var(--text-2);
      text-decoration: none;
      font-size: 0.875rem;
      line-height: 1.3;
      transition: color 140ms, border-color 140ms, background 140ms;
    }
    .file-link:hover,
    .toc a:hover {
      color: var(--text);
      border-color: var(--border);
      background: var(--surface2);
    }
    .file-link.active {
      color: var(--accent);
      border-color: var(--accent-dim);
      background: var(--accent-dim);
      font-weight: 600;
    }

    /* ── Main reader pane ── */
    .reader {
      overflow: auto;
      scroll-behavior: smooth;
    }

    /* ── Top bar ── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 60px;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(10,12,16,0.8);
      backdrop-filter: blur(20px) saturate(1.4);
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .doc-title { min-width: 0; }
    .doc-title strong {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text);
    }
    .doc-title span {
      color: var(--text-3);
      font-size: 0.78rem;
      font-family: 'JetBrains Mono', monospace;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex: 0 0 auto;
    }

    /* ── Content area ── */
    .content-wrap {
      width: min(960px, calc(100% - 36px));
      margin: 0 auto;
      padding: 32px 0 80px;
    }

    .markdown-body {
      padding: 36px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(17,19,24,0.85);
      box-shadow: 0 24px 72px rgba(0,0,0,0.4);
      backdrop-filter: blur(12px);
    }

    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3 {
      letter-spacing: -0.01em;
      border-bottom-color: var(--border);
    }
    .markdown-body a { color: var(--accent); }
    .markdown-body code {
      border-radius: 5px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.875em;
    }
    .markdown-body pre {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #0b0d12;
    }
    .markdown-body table { display: table; width: 100%; }
    .markdown-body tr:nth-child(even) { background: rgba(255,255,255,0.02); }

    /* ── Mermaid diagrams ── */
    .mermaid {
      display: flex;
      justify-content: center;
      overflow-x: auto;
      padding: 20px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #0b0d12;
    }

    /* ── TOC panel (right) ── */
    .side-title {
      margin: 16px 0 4px;
      color: var(--text-3);
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    .toc a {
      padding-left: calc(10px + var(--depth, 0) * 12px);
      font-size: 0.83rem;
    }

    /* ── States ── */
    .empty,
    .error {
      padding: 24px;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-2);
      background: var(--surface);
      font-size: 0.9rem;
    }
    .error strong { color: var(--red); }

    /* ── Responsive ── */
    @media (max-width: 1100px) {
      .shell { grid-template-columns: minmax(0, 1fr); }
      .toc-panel { display: none; }
    }
    @media (max-width: 760px) {
      .shell { height: 100vh; grid-template-columns: 1fr; }
      .topbar { padding: 0 14px; }
      .topbar-left { gap: 10px; }
      .content-wrap { width: min(100% - 24px, 960px); padding-top: 20px; }
      .markdown-body { padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="file-panel">
      <div class="brand">
        <a href="index.html" title="Back to library" aria-label="Back to Dev Notes library">
          <div class="brand-dot"></div>
          Dev Notes
        </a>
        <h1>Notes</h1>
      </div>
      <label class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="11" cy="11" r="7"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
        <input id="fileSearch" type="search" placeholder="Find a file..." autocomplete="off">
      </label>
      <nav class="file-list" id="fileList" aria-label="Markdown files"></nav>
    </aside>
    <button class="drawer-backdrop" id="drawerBackdrop" type="button" aria-label="Close file list"></button>

    <main class="reader" id="reader">
      <header class="topbar">
        <div class="topbar-left">
          <button class="icon-btn" id="fileDrawerBtn" type="button" title="Open file list" aria-label="Open file list" aria-expanded="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M8 6h13"></path>
              <path d="M8 12h13"></path>
              <path d="M8 18h13"></path>
              <path d="M3 6h.01"></path>
              <path d="M3 12h.01"></path>
              <path d="M3 18h.01"></path>
            </svg>
          </button>
          <div class="doc-title">
            <strong id="docTitle">Markdown Reader</strong>
            <span id="docMeta">Loading...</span>
          </div>
        </div>
        <div class="actions">
          <a class="icon-btn" id="rawLink" href="#" target="_blank" rel="noopener" title="Open raw file" aria-label="Open raw file">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M15 3h6v6"></path>
              <path d="M10 14 21 3"></path>
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
            </svg>
          </a>
          <button class="icon-btn" id="themeBtn" type="button" title="Switch contrast" aria-label="Switch contrast">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
            </svg>
          </button>
        </div>
      </header>
      <div class="content-wrap">
        <article class="markdown-body" id="content">
          <div class="empty">Choose a Markdown file from the library.</div>
        </article>
      </div>
    </main>

    <aside class="toc-panel">
      <p class="side-title">On This Page</p>
      <nav class="toc" id="toc" aria-label="Table of contents"></nav>
    </aside>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js"></script>
  <script>
    const fallbackMarkdownFiles = [
      "a2arag.md",
      "agenticai.md",
      "backtracking.md",
      "binarysearch.md",
      "bitmanipulation.md",
      "databases.md",
      "disjoinset.md",
      "distributedsystems.md",
      "dotnet.md",
      "dp.md",
      "dsaeasytomedium.md",
      "golang.md",
      "graph.md",
      "greedy.md",
      "heap.md",
      "intervals.md",
      "kubernetes.md",
      "linkedlist.md",
      "monotonicstack.md",
      "nodejs.md",
      "observability.md",
      "prefixsum.md",
      "puzzles.md",
      "queue.md",
      "react.md",
      "recursion.md",
      "slidingwindow.md",
      "systemdesigneventdrivenetc.md",
      "trees.md",
      "trie.md",
      "twopointer.md",
      "websocket.md"
    ];

    const titleMap = {
      "a2arag.md": "A2A RAG",
      "agenticai.md": "Agentic AI",
      "backtracking.md": "Backtracking",
      "binarysearch.md": "Binary Search",
      "bitmanipulation.md": "Bit Manipulation",
      "databases.md": "Databases",
      "disjoinset.md": "Disjoint Set",
      "distributedsystems.md": "Distributed Systems",
      "dotnet.md": ".NET",
      "dp.md": "Dynamic Programming",
      "dsaeasytomedium.md": "DSA Easy To Medium",
      "golang.md": "Golang",
      "graph.md": "Graph",
      "greedy.md": "Greedy",
      "heap.md": "Heap",
      "intervals.md": "Intervals",
      "kubernetes.md": "Kubernetes",
      "linkedlist.md": "Linked List",
      "monotonicstack.md": "Monotonic Stack",
      "nodejs.md": "Node.js",
      "observability.md": "Observability",
      "prefixsum.md": "Prefix Sum",
      "puzzles.md": "Puzzles",
      "queue.md": "Queue",
      "react.md": "React",
      "recursion.md": "Recursion",
      "slidingwindow.md": "Sliding Window",
      "systemdesigneventdrivenetc.md": "System Design: Event Driven Etc",
      "trees.md": "Trees",
      "trie.md": "Trie",
      "twopointer.md": "Two Pointer",
      "websocket.md": "WebSocket"
    };

    const fileAliases = {
      "a2rag.md": "a2arag.md"
    };

    const md = window.markdownit({
      html: true,
      linkify: true,
      typographer: true,
      highlight(code, lang) {
        const language = lang && hljs.getLanguage(lang) ? lang : "plaintext";
        return `<pre><code class="hljs language-${language}">${hljs.highlight(code, { language }).value}</code></pre>`;
      }
    });

    mermaid.initialize({
      startOnLoad: false,
      theme: "dark",
      securityLevel: "loose",
      flowchart: { curve: "basis" },
      themeVariables: {
        background: "#0c111b",
        primaryColor: "#102033",
        primaryTextColor: "#eef4ff",
        primaryBorderColor: "#66d9ff",
        lineColor: "#7cf7bd",
        secondaryColor: "#1f2937",
        tertiaryColor: "#111827"
      }
    });

    let markdownFiles = [...fallbackMarkdownFiles];
    const params = new URLSearchParams(location.search);
    let selectedFile = params.get("file");
    const fileList = document.querySelector("#fileList");
    const fileSearch = document.querySelector("#fileSearch");
    const content = document.querySelector("#content");
    const docTitle = document.querySelector("#docTitle");
    const docMeta = document.querySelector("#docMeta");
    const rawLink = document.querySelector("#rawLink");
    const toc = document.querySelector("#toc");
    const reader = document.querySelector("#reader");
    const fileDrawerBtn = document.querySelector("#fileDrawerBtn");
    const drawerBackdrop = document.querySelector("#drawerBackdrop");

    function titleFromFile(file) {
      if (titleMap[file]) return titleMap[file];
      return file
        .replace(/\.md$/i, "")
        .replace(/([a-z])([A-Z])/g, "$1 $2")
        .replace(/dsa/i, "DSA")
        .replace(/ai/i, "AI")
        .replace(/a2a/i, "A2A")
        .replace(/rag/i, "RAG")
        .replace(/dotnet/i, ".NET")
        .replace(/\b\w/g, char => char.toUpperCase());
    }

    function resolveFile(file) {
      if (!file) return markdownFiles[0];
      const decoded = decodeURIComponent(file).split("/").pop();
      if (markdownFiles.includes(decoded)) return decoded;
      if (fileAliases[decoded] && markdownFiles.includes(fileAliases[decoded])) return fileAliases[decoded];

      const lowerMatch = markdownFiles.find(candidate => candidate.toLowerCase() === decoded.toLowerCase());
      return lowerMatch || decoded;
    }

    function slugify(text) {
      return text.toLowerCase().trim().replace(/[^\w\s-]/g, "").replace(/\s+/g, "-");
    }

    function renderFiles() {
      const term = fileSearch.value.trim().toLowerCase();
      const files = markdownFiles.filter(file => {
        return file.toLowerCase().includes(term) || titleFromFile(file).toLowerCase().includes(term);
      });

      fileList.innerHTML = files.map(file => `
        <a class="file-link ${file === selectedFile ? "active" : ""}" href="markdownreader.html?file=${encodeURIComponent(file)}">${titleFromFile(file)}</a>
      `).join("");
    }

    function setFileDrawer(open) {
      document.body.classList.toggle("files-open", open);
      fileDrawerBtn.setAttribute("aria-expanded", String(open));
      fileDrawerBtn.setAttribute("aria-label", open ? "Close file list" : "Open file list");
      fileDrawerBtn.setAttribute("title", open ? "Close file list" : "Open file list");
      if (open) fileSearch.focus({ preventScroll: true });
    }

    async function loadManifest() {
      try {
        const response = await fetch("md-files.json", { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const manifest = await response.json();
        const files = Array.isArray(manifest) ? manifest : manifest.files;
        if (Array.isArray(files) && files.length) {
          markdownFiles = files.filter(file => file.endsWith(".md")).sort((a, b) => a.localeCompare(b));
        }
      } catch (error) {
        markdownFiles = [...fallbackMarkdownFiles];
      }

      selectedFile = resolveFile(selectedFile || markdownFiles[0]);
    }

    function rewriteMermaidBlocks() {
      content.querySelectorAll("pre code.language-mermaid").forEach((code, index) => {
        const div = document.createElement("div");
        div.className = "mermaid";
        div.id = `mermaid-${index}`;
        div.textContent = code.textContent;
        code.closest("pre").replaceWith(div);
      });
    }

    function escapeHtml(value) {
      return value
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    async function renderMermaidBlocks() {
      const diagrams = [...content.querySelectorAll(".mermaid")];
      for (const [index, diagram] of diagrams.entries()) {
        const source = diagram.textContent.trim();
        if (!source) continue;

        try {
          const renderId = `mermaid-render-${Date.now()}-${index}`;
          const result = await mermaid.render(renderId, source);
          diagram.innerHTML = result.svg;
        } catch (error) {
          diagram.innerHTML = `
            <div class="error">
              <strong>Diagram could not be rendered.</strong><br>
              The Markdown content is still available below.
              <pre><code>${escapeHtml(source)}</code></pre>
            </div>
          `;
        }
      }
    }

    function buildToc() {
      const headings = [...content.querySelectorAll("h1, h2, h3")];
      const seen = new Map();
      headings.forEach(heading => {
        const base = slugify(heading.textContent) || "section";
        const count = seen.get(base) || 0;
        seen.set(base, count + 1);
        heading.id = count ? `${base}-${count + 1}` : base;
      });

      toc.innerHTML = headings.length
        ? headings.map(heading => `
          <a href="#${heading.id}" style="--depth:${Number(heading.tagName.slice(1)) - 1}">${heading.textContent}</a>
        `).join("")
        : `<span class="empty">No headings found.</span>`;
    }

    async function loadMarkdown(file) {
      file = resolveFile(file);
      if (!markdownFiles.includes(file)) {
        content.innerHTML = `<div class="error"><strong>Unknown file.</strong><br>Select a file from the library.</div>`;
        return;
      }

      selectedFile = file;
      const currentParam = new URLSearchParams(location.search).get("file");
      if (currentParam !== file) {
        history.replaceState(null, "", `markdownreader.html?file=${encodeURIComponent(file)}`);
      }

      docTitle.textContent = titleFromFile(file);
      docMeta.textContent = file;
      rawLink.href = file;

      let source = "";
      try {
        const response = await fetch(file, { cache: "no-store" });
        if (!response.ok) throw new Error(`${response.status} ${response.statusText || "Fetch failed"} while fetching ${file}`);
        source = await response.text();
      } catch (error) {
        content.innerHTML = `
          <div class="error">
            <strong>Could not load ${file}.</strong><br>
            The deployed site could not fetch the Markdown file.<br>
            <small>${error.message}</small>
          </div>
        `;
        docMeta.textContent = "Load failed";
        toc.innerHTML = "";
        return;
      }

      const rendered = md.render(source);
      content.innerHTML = DOMPurify.sanitize(rendered, {
        ADD_TAGS: ["iframe"],
        ADD_ATTR: ["allow", "allowfullscreen", "frameborder", "scrolling", "target"]
      });
      rewriteMermaidBlocks();
      buildToc();
      await renderMermaidBlocks();
      docMeta.textContent = `${file} • ${source.split(/\s+/).filter(Boolean).length.toLocaleString()} words`;

      // ── Scroll to URL hash after render ──────────────────────────────
      const hash = location.hash;
      if (hash) {
        // Small delay so layout settles after mermaid / hljs paint
        setTimeout(() => {
          // Try exact id match first, then anchor-name match
          const target = reader.querySelector(hash) ||
                         reader.querySelector(`[name="${hash.slice(1)}"]`);
          if (target) {
            target.scrollIntoView({ behavior: "smooth", block: "start" });
          }
        }, 120);
      }

      // ── Wire internal links in rendered markdown ──────────────────────
      content.querySelectorAll('a[href^="#"]').forEach(link => {
        link.addEventListener("click", e => {
          e.preventDefault();
          const id = link.getAttribute("href");
          const el = reader.querySelector(id) ||
                     reader.querySelector(`[name="${id.slice(1)}"]`);
          if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
        });
      });
    }

    fileSearch.addEventListener("input", renderFiles);
    fileDrawerBtn.addEventListener("click", () => {
      setFileDrawer(!document.body.classList.contains("files-open"));
    });
    drawerBackdrop.addEventListener("click", () => setFileDrawer(false));
    document.addEventListener("keydown", event => {
      if (event.key === "Escape") setFileDrawer(false);
    });
    document.querySelector("#themeBtn").addEventListener("click", () => {
      document.body.classList.toggle("high-contrast");
      content.style.background = document.body.classList.contains("high-contrast") ? "#020617" : "";
    });

    toc.addEventListener("click", event => {
      const link = event.target.closest("a");
      if (!link) return;
      event.preventDefault();
      reader.querySelector(link.getAttribute("href"))?.scrollIntoView({ behavior: "smooth", block: "start" });
      history.replaceState(null, "", link.getAttribute("href"));
    });

    loadManifest().then(() => {
      renderFiles();
      loadMarkdown(selectedFile);
    });
  </script>
</body>
</html>
