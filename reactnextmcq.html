  {tag:"Modern React",q:"What is the purpose of the <code>'use client'</code> directive?",opts:["Marks a CSS file","Marks a module and all its transitive imports as part of the client bundle — enabling hooks, event handlers, and browser APIs","Enables SSR","Optimizes the component"],ans:0,sol:"'use client' at the top of a file creates a client boundary. Everything imported by that file is also a client component. It's the mechanism for mixing RSCs and client components in the App Router."},
  {tag:"Modern React",q:"What is <code>'use server'</code> directive?",opts:["Enables SSR for a component","Marks a function or an entire file's exports as Server Actions — callable from client components but executed on the server","Disables client rendering","A Next.js config flag"],ans:1,sol:"'use server' in a function or at the top of a file declares Server Actions. Client components can import and call them; Next.js securely routes the call to the server and returns the result."},
  {tag:"Modern React",q:"What is tRPC?",opts:["A React Router replacement","An end-to-end typesafe API layer that lets you call server functions from the client with full TypeScript inference — no code generation, no schema files","A database client","A testing framework"],ans:1,sol:"tRPC exposes server-side functions as a typesafe API. The client infers types directly from the server router — no REST, no GraphQL schema, no code gen. Built on React Query, it's popular with Next.js + TypeScript apps."},
  {tag:"Modern React",q:"What is Storybook used for in React development?",opts:["E2E testing","An isolated component development environment for building, documenting, and visually testing UI components in isolation outside the app","API mocking","State management"],ans:1,sol:"Storybook renders components in isolation with different props (stories). Teams use it for component documentation, visual regression testing, and design system development without needing the full app running."},
  {tag:"Modern React",q:"What is Playwright used for?",opts:["Unit testing","End-to-end testing in real browsers (Chromium, Firefox, WebKit) — testing full user flows like login, navigation, and form submission","API testing","Component testing"],ans:1,sol:"Playwright is a Microsoft E2E testing tool that controls real browsers. For Next.js, it's used to test full user journeys. It supports network interception, visual snapshots, and parallel test execution."},
  {tag:"Modern React",q:"What is Vitest?",opts:["A React framework","A Vite-native unit testing framework — fast, Jest-compatible, with native ESM support and instant HMR for tests","A browser testing tool","A linting tool"],ans:1,sol:"Vitest is a unit/integration test runner built on Vite. It's Jest-compatible (same API), significantly faster due to Vite's build pipeline, and supports native ESM. It's the test runner of choice for Vite/React projects."},
  {tag:"Modern React",q:"What is the purpose of ESLint in a React project?",opts:["Compiling TypeScript","Static code analysis to find potential bugs, enforce code style, and catch common React mistakes (missing keys, hooks rules violations) before runtime","Bundling code","Testing components"],ans:1,sol:"ESLint with eslint-plugin-react and eslint-plugin-react-hooks statically analyzes code for issues like missing key props, incorrect hook usage (exhaustive-deps), and accessibility problems (jsx-a11y plugin)."},
  {tag:"Modern React",q:"What is Prettier and how does it complement ESLint?",opts:["A CSS formatter only","An opinionated code formatter for consistent code style (indentation, quotes, semicolons) — ESLint catches bugs; Prettier enforces style. eslint-config-prettier disables conflicting ESLint style rules","A linting tool","A build tool"],ans:1,sol:"Prettier formats code automatically (spacing, trailing commas, line length) regardless of how it was written. ESLint finds bugs and enforces best practices. They're complementary: use eslint-config-prettier to prevent conflicts."},

  // ── EXTRA NEXT.JS ────────────────────────────────────────────────────
  {tag:"Next.js Advanced",q:"What are Next.js Rewrites?",opts:["URL redirects","URL mappings that proxy a request to a different destination without changing the browser URL — useful for API proxying or URL aliasing","CSS class rewrites","Component rewrites"],ans:1,sol:"Rewrites in next.config.js map an incoming URL to another path internally or externally, without the browser URL changing. They're ideal for proxying API requests to hide backend URLs or for URL aliasing."},
  {tag:"Next.js Advanced",q:"What are Next.js Redirects?",opts:["Internal routing","Rules in next.config.js that redirect incoming requests to a different URL, with a 301/302 status code, changing the browser URL","Component navigation","A React hook"],ans:1,sol:"Redirects send the browser to a new URL with a status code (301 permanent, 302 temporary). Defined in next.config.js redirects array. Useful for legacy URL migrations, trailing slash normalization, etc."},
  {tag:"Next.js Advanced",q:"What is the Next.js bundle analyzer?",opts:["A code linter","@next/bundle-analyzer visualizes the size of webpack output files with an interactive treemap, helping identify large dependencies in the bundle","A performance profiler","A network analyzer"],ans:1,sol:"@next/bundle-analyzer wraps the Next.js webpack config to output interactive treemap HTML files after next build. You can visually inspect which dependencies are bloating your bundle and where to apply code splitting."},
  {tag:"Next.js Advanced",q:"How does Next.js handle CSS imports?",opts:["Only inline styles","Global CSS can only be imported in _app.js; CSS Modules (*.module.css) can be imported in any component; Tailwind via PostCSS","CSS is not supported","Only styled-components"],ans:1,sol:"Next.js supports: CSS Modules (scoped, importable anywhere), global CSS (must be imported in _app.js or root layout.tsx), and third-party CSS. It also integrates with Sass, Tailwind, and CSS-in-JS via PostCSS."},
  {tag:"Next.js Advanced",q:"What is the difference between <code>cookies()</code> and <code>headers()</code> in Next.js App Router?",opts:["No difference","Both are server-only functions: cookies() reads/writes HTTP cookies, headers() reads incoming request headers — both opt a route into dynamic rendering","Both are client functions","headers() modifies response headers"],ans:1,sol:"cookies() and headers() (from 'next/headers') are async functions only available in Server Components, Route Handlers, and Middleware. Accessing them opts the route into dynamic (per-request) rendering."},
  {tag:"Next.js Advanced",q:"What is the <code>not-found.tsx</code> file in the App Router?",opts:["A 500 error page","A component rendered when notFound() is called or the URL matches no route in the segment, displaying a custom 404 UI","A loading fallback","A redirect file"],ans:1,sol:"not-found.tsx provides a custom 404 UI for a route segment. It's automatically rendered when a URL matches no routes, or when you explicitly call the notFound() function from a Server Component."},
  {tag:"Next.js Advanced",q:"What does <code>notFound()</code> do in a Server Component?",opts:["Renders a 404 HTML page","Throws a special error that triggers Next.js to render the nearest not-found.tsx boundary, effectively showing a 404 response","Redirects to /404","Returns null"],ans:1,sol:"Calling notFound() from a Server Component (e.g., when a DB query returns null) interrupts rendering and renders the nearest not-found.tsx, responding with a 404 status code."},
  {tag:"Next.js Advanced",q:"What is the purpose of the <code>opengraph-image.tsx</code> file in Next.js?",opts:["A regular image component","A special file that uses the ImageResponse API to dynamically generate Open Graph and Twitter Card images for social sharing using JSX","A static image","An image optimizer"],ans:1,sol:"opengraph-image.tsx (and twitter-image.tsx) uses @vercel/og (ImageResponse) to dynamically generate social card images using JSX and CSS. Next.js automatically adds the og:image meta tags to the page head."},
  {tag:"Next.js Advanced",q:"What is the Next.js <code>instrumentation.ts</code> file used for?",opts:["Adding code instruments","A file with a register() function called once when the Next.js server initializes — used to integrate OpenTelemetry, APM tools, or run startup logic","A webpack plugin","A test setup file"],ans:1,sol:"instrumentation.ts exports a register() function that Next.js calls once when the server worker starts. It's the official hook for setting up observability (OpenTelemetry, Sentry, Datadog) in Next.js apps."},
  {tag:"Next.js Advanced",q:"What is on-demand ISR and how is it triggered?",opts:["Automatic ISR only","Programmatically invalidating the cache for specific paths/tags using revalidatePath or revalidateTag (typically from Server Actions or Route Handlers), bypassing the time-based revalidation interval","A cron job","A Vercel-only feature"],ans:1,sol:"On-demand ISR lets you purge cached pages immediately when data changes rather than waiting for the time-based interval. Call revalidatePath('/posts/[slug]') or revalidateTag('posts') from a webhook or Server Action."},

  // ── REACT QUERY / DATA ────────────────────────────────────────────────
  {tag:"Data Fetching",q:"What is the difference between <code>useQuery</code> and <code>useMutation</code> in TanStack Query?",opts:["No difference","useQuery is for reading data (GET); useMutation is for write operations (POST/PUT/DELETE) with callbacks for success/error/settle","useQuery is for server; useMutation for client","useMutation replaces useState"],ans:1,sol:"useQuery fetches and caches data, automatically refetching when stale. useMutation handles create/update/delete operations with onSuccess/onError callbacks. Use mutate() or mutateAsync() to trigger a mutation."},
  {tag:"Data Fetching",q:"What is query invalidation in TanStack Query?",opts:["Deleting a query","Marking query cache entries as stale so they refetch on next access — commonly called in useMutation's onSuccess to refresh related data","A cache clear","A network error handler"],ans:1,sol:"queryClient.invalidateQueries({ queryKey: ['todos'] }) marks all matching queries as stale. If they're currently rendered, they immediately refetch. This keeps UI fresh after mutations without manual state updates."},
  {tag:"Data Fetching",q:"What is prefetching in TanStack Query or Next.js?",opts:["Pre-loading images","Fetching data before it's needed (before navigation or on hover) and storing it in cache so the page renders instantly when opened","A caching strategy","A build optimization"],ans:1,sol:"queryClient.prefetchQuery() or next/link's automatic prefetching loads data/pages before they're requested. Users perceive instant navigation because data/HTML is already cached locally."},
  {tag:"Data Fetching",q:"What is the <code>staleTime</code> option in TanStack Query?",opts:["Session timeout","The duration in milliseconds that fetched data is considered fresh; within this window, no refetch occurs — defaults to 0 (always stale)","Cache expiry","Network timeout"],ans:1,sol:"staleTime: 60000 means data fetched within the last 60 seconds won't be refetched, even on focus or mount. Increasing staleTime reduces network requests for data that doesn't change frequently."},

  // ── MORE HOOKS & PATTERNS ─────────────────────────────────────────────
  {tag:"Hooks",q:"What is <code>useImperativeHandle</code>?",opts:["A performance hook","A hook used with forwardRef to customize the ref handle exposed to parent components — restricting or augmenting what the parent can access","An effect hook","A routing hook"],ans:1,sol:"useImperativeHandle(ref, () => ({ focus, scrollIntoView })) defines what a parent receives when it uses a ref on a component. It's used with forwardRef to expose an imperative API on a component."},
  {tag:"Hooks",q:"What is <code>useDebugValue</code>?",opts:["Debugging state mutations","A hook that adds a label to a custom hook displayed in React DevTools, helping developers understand what the custom hook's current value is","Logging hook calls","Profiling renders"],ans:1,sol:"useDebugValue(value) inside a custom hook adds a label in React DevTools. Optionally pass a formatter: useDebugValue(date, d => d.toDateString()) to avoid expensive formatting unless DevTools is open."},
  {tag:"Hooks",q:"What does <code>useSyncExternalStore</code> do?",opts:["Syncs browser storage","Safely subscribes to external stores (Redux, localStorage, browser APIs) from React components with proper handling for Concurrent Mode tearing","Synchronizes multiple useStates","Connects to WebSockets"],ans:1,sol:"useSyncExternalStore(subscribe, getSnapshot, getServerSnapshot) is the React 18 hook for subscribing to external stores. It prevents tearing in Concurrent Mode by ensuring consistent reads during render."},
  {tag:"Hooks",q:"What is the <code>useInsertionEffect</code> hook for?",opts:["Inserting DOM nodes","A hook for CSS-in-JS libraries to inject styles into the DOM before layout effects fire, preventing layout flicker during SSR hydration","Inserting elements","A server hook"],ans:1,sol:"useInsertionEffect fires before DOM mutations and is designed for CSS-in-JS libraries. It injects style tags synchronously before any layout effects read styles, preventing flash of incorrectly styled content."},
  {tag:"Component Patterns",q:"What is the Provider pattern in React?",opts:["React Router's pattern","Creating a Context provider component that wraps part of the tree and shares data/functionality via useContext without prop drilling","A Redux pattern","A testing pattern"],ans:1,sol:"The Provider pattern wraps a subtree with a Context.Provider, making the context value available to any descendant via useContext. Common for themes, auth, I18n, and feature flags."},
  {tag:"Component Patterns",q:"What is the Container / Presenter (Smart/Dumb) pattern?",opts:["A Docker pattern","Separating data-fetching and state logic (container) from pure presentational UI (presenter), keeping components focused and testable","A routing pattern","A CSS pattern"],ans:1,sol:"Container components handle data fetching, state, and business logic; Presenter components receive data via props and render UI. With hooks, this pattern is less formal but the principle of separation persists."},

  // ── NEXTJS MISC ────────────────────────────────────────────────────────
  {tag:"Next.js Fundamentals",q:"What is the <code>next dev</code> command?",opts:["Builds for production","Starts the development server with HMR, fast refresh, and error overlays","Deploys to Vercel","Runs tests"],ans:1,sol:"next dev starts the development server (default: localhost:3000) with Hot Module Replacement, React Fast Refresh for instant component updates, detailed error overlays, and TypeScript checking."},
  {tag:"Next.js Fundamentals",q:"What is React Fast Refresh?",opts:["A caching strategy","A Next.js/React feature that hot-reloads only the changed component during development, preserving component state and avoiding full page reloads","A production optimization","A build tool"],ans:1,sol:"Fast Refresh replaces the old HMR. It remounts only the changed component subtree, preserving state in sibling components. Syntax errors show overlays without losing app state, making development much smoother."},
  {tag:"Next.js Fundamentals",q:"How do you add custom HTTP headers in Next.js?",opts:["Via React state","Via the headers() array in next.config.js, or directly in Route Handlers and Middleware using the Response API","Via HTML meta tags","Via .env files"],ans:1,sol:"next.config.js has an async headers() function returning an array of { source, headers } objects. For route-specific headers in the App Router, set them directly in Route Handler Response objects."},
  {tag:"App Router",q:"What is <code>permanentRedirect</code> in Next.js App Router?",opts:["Equivalent to redirect","A Server Component / Route Handler function that sends a 308 permanent redirect (vs redirect's 307), telling browsers and search engines the URL has permanently moved","A middleware helper","A client hook"],ans:1,sol:"permanentRedirect(url) sends a 308 Permanent Redirect (search engines update their index). redirect(url) sends 307 (temporary). Both are only callable on the server side; neither returns anything, they throw."},
  {tag:"App Router",q:"What is streaming in the context of Next.js App Router?",opts:["Video streaming","Progressively sending rendered HTML chunks from the server to the browser as each Suspense boundary resolves, reducing Time to First Byte and enabling faster FCP","Audio streaming","WebSocket streaming"],ans:1,sol:"Next.js App Router uses HTTP streaming to send page HTML in chunks. Suspense boundaries define stream boundaries — outer content is sent immediately while inner async content is flushed when ready, improving TTFB and LCP."},
  {tag:"Next.js Advanced",q:"What is the Vercel AI SDK and how does it relate to Next.js?",opts:["A design tool","A TypeScript SDK for building AI-powered features with React and Next.js — provides hooks like useChat, useCompletion, and supports streaming LLM responses via Server Actions or Route Handlers","A deployment tool","A database ORM"],ans:1,sol:"The AI SDK (ai package) provides useChat, useCompletion hooks for the client and streamText, generateText for the server. It integrates with Next.js Route Handlers and Server Actions for type-safe streaming AI responses."},
  {tag:"Performance",q:"What is the Largest Contentful Paint (LCP) and how does Next.js improve it?",opts:["A React metric","A Core Web Vital measuring when the largest visible content element renders; Next.js improves it via SSR/SSG (sending pre-rendered HTML), image optimization (priority, preloading), and font optimization","A bundle metric","A JavaScript benchmark"],ans:1,sol:"LCP measures perceived load speed — when the main content appears. Next.js improves LCP by pre-rendering HTML (fast FCP), optimizing the LCP image with priority={true} on next/image, and self-hosting fonts with next/font."},
  {tag:"Performance",q:"What is Cumulative Layout Shift (CLS) and how does Next.js address it?",opts:["A state management issue","A Core Web Vital measuring unexpected layout shifts; next/image prevents it by requiring width+height (reserving space), and next/font eliminates font-swap shifts","A CSS bug","A network issue"],ans:1,sol:"CLS measures visual stability. Images without explicit dimensions cause layout shifts when they load. next/image requires width and height (or fill), reserving space. next/font uses CSS size-adjust to prevent shifts when custom fonts load."},
  {tag:"Modern React",q:"What is Biome (formerly Rome)?",opts:["A CSS framework","A fast Rust-based toolchain combining linting, formatting, and more in a single tool — a potential replacement for ESLint + Prettier in React/TypeScript projects","A state manager","A testing framework"],ans:1,sol:"Biome is a fast, all-in-one toolchain written in Rust. It lints and formats JavaScript/TypeScript/JSX with near-instant speeds, aiming to replace ESLint + Prettier with a single zero-config tool."},
  {tag:"Modern React",q:"What is React Compiler (React Forget)?",opts:["A JSX transpiler","An experimental React compiler that automatically adds memoization (equivalent to useMemo/useCallback/React.memo) to components, eliminating the need to manually optimize renders","A TypeScript compiler","A production bundler"],ans:1,sol:"React Compiler analyzes component code and automatically applies memoization where beneficial. It aims to make manual React.memo, useCallback, and useMemo unnecessary — components are optimized at compile time."},
  {tag:"Next.js Advanced",q:"What is <code>next/og</code> (ImageResponse)?",opts:["An image loader","A utility that generates PNG images from JSX using WebAssembly-based rendering — used for dynamic Open Graph images, social cards, and preview thumbnails","An OG tag manager","A static image optimizer"],ans:1,sol:"ImageResponse from 'next/og' renders JSX to a PNG image using Satori (SVG renderer) and Resvg (PNG converter) in the Edge Runtime. Perfect for dynamically generating personalized social card images."},
  {tag:"Testing",q:"What is Cypress used for in React testing?",opts:["Unit testing","End-to-end and component testing that runs in a real browser, providing time-travel debugging, automatic waiting, and visual test replay","API testing","State testing"],ans:1,sol:"Cypress supports full E2E tests (full browser, real HTTP) and component testing (mounting individual React components). Its time-travel debugging (snapshots at each step) and automatic retries make debugging flaky tests easier."},
  {tag:"TypeScript & React",q:"What is <code>satisfies</code> in TypeScript and why is it useful in Next.js?",opts:["A validation keyword","An operator that validates an expression matches a type without widening the type — preserving literal types while ensuring type safety. Useful for route params and metadata types","A casting operator","A null check"],ans:1,sol:"satisfies T validates that a value matches T while keeping the most specific inferred type. In Next.js, const metadata = { title: 'Home' } satisfies Metadata validates the metadata shape while preserving 'Home' (not just string) for autocomplete."},
  {tag:"React Fundamentals",q:"What is the difference between <code>React.cloneElement</code> and <code>React.Children.map</code>?",opts:["No difference","cloneElement clones a single element adding/overriding props; Children.map iterates over children (handling arrays, null, etc.) — often combined to inject props into children","cloneElement is deprecated","Children.map is for arrays only"],ans:1,sol:"React.cloneElement(element, extraProps) creates a new element with merged props. React.Children.map(children, child => React.cloneElement(child, ...)) traverses the children tree safely, handling arrays and fragments."},
  {tag:"React Fundamentals",q:"What does <code>React.createContext</code> return?",opts:["A hook","A Context object with a Provider component and a Consumer component (and a default value)","A state","A component"],ans:1,sol:"createContext(defaultValue) returns an object: { Provider, Consumer, displayName }. Wrap components in <MyContext.Provider value={...}> to supply a value. useContext(MyContext) reads it in descendants."},
  {tag:"Advanced React",q:"What is the difference between a micro-frontend and a monolithic React app?",opts:["Size difference only","Micro-frontends decompose the UI into independently deployable modules (potentially different frameworks) with independent CI/CD; monoliths build everything together","A deployment strategy only","A CSS architecture"],ans:1,sol:"Micro-frontends apply microservices principles to the frontend: independent teams own vertical slices deployed separately, integrated via Module Federation (webpack), iframes, or web components. Monorepos with Turborepo offer a middle ground."},
  {tag:"Next.js Advanced",q:"What is Module Federation and how does it relate to Next.js?",opts:["A CSS module system","A webpack 5 feature enabling multiple webpack builds to share code at runtime — used to implement micro-frontends; Next.js supports it via @module-federation/nextjs-mf","A Node.js module","An npm workspace"],ans:1,sol:"Module Federation allows runtime code sharing between separately deployed webpack bundles. @module-federation/nextjs-mf enables Next.js apps to expose or consume remote components, enabling true micro-frontend architecture."},
  {tag:"Modern React",q:"What is the Island Architecture?",opts:["A design pattern for island nations","A rendering strategy where most of the page is static HTML (like an SSG) but interactive components ('islands') are individually hydrated — popularized by Astro and influencing Next.js PPR","A CSS grid pattern","A component pattern"],ans:1,sol:"Islands Architecture ships mostly static HTML and selectively hydrates only interactive components. Each island hydrates independently with minimal JS. It inspired Next.js PPR, where static shells and dynamic islands coexist."},
  {tag:"Performance",q:"What is First Contentful Paint (FCP)?",opts:["When JavaScript loads","When the browser renders the first pixel of text or image — a key UX metric. SSR/SSG in Next.js improves FCP by sending pre-rendered HTML instead of a JS bundle","When CSS loads","When the DOM is built"],ans:1,sol:"FCP measures when any text, image, non-white canvas, or SVG first appears. SSR/SSG dramatically improve FCP because the browser renders HTML immediately. CSR has a poor FCP — the blank page shows until JS parses and fetches data."},
  {tag:"Performance",q:"What is Time to Interactive (TTI)?",opts:["When page loads","When a page becomes fully interactive — all JS loaded, event handlers attached, and main thread idle. Heavy JS bundles delay TTI; code splitting and lazy loading help","When images load","When CSS loads"],ans:1,sol:"TTI measures when a page is reliably interactive. Long JS parse/execute times delay TTI. Strategies: code split with React.lazy, defer non-critical JS with next/script, remove unused dependencies, and use efficient event handling."},
  {tag:"Accessibility",q:"What is the tab index and how should it be used in React?",opts:["A CSS property","tabIndex={0} makes a non-interactive element focusable (keyboard navigable); tabIndex={-1} removes it from tab order but allows programmatic focus; tabIndex > 0 is an antipattern","A DOM event","A React prop only"],ans:1,sol:"tabIndex={0} adds an element to the natural tab flow. tabIndex={-1} allows focus() via JS but not keyboard tab. Positive values create a custom tab order, which is an accessibility antipattern — stick to 0 and -1."},
  {tag:"Styling",q:"What are CSS Custom Properties (variables) and how are they used in React?",opts:["SCSS variables","Native CSS variables (--color-primary: #blue) accessible in JS via element.style.setProperty or React's style prop — enabling dynamic theming without JS-in-CSS libraries","A CSS framework","PostCSS variables"],ans:1,sol:"CSS custom properties (--name: value) are resolved by the browser's cascade. In React, <div style={{ '--theme-color': color }} > sets them dynamically. Child components access them via var(--theme-color) in CSS."},
  {tag:"Next.js Fundamentals",q:"What is the public folder in Next.js?",opts:["A folder for Node modules","Files in /public are served at the root URL (e.g., /public/logo.png → /logo.png) as static assets with no processing — ideal for favicons, robots.txt, and sitemap.xml","A server-only folder","A components folder"],ans:1,sol:"The /public directory contains static assets served as-is from the root. Referencing /logo.png in <img src='/logo.png'> serves /public/logo.png. Unlike assets in src, these aren't processed by webpack."},
  {tag:"Next.js Fundamentals",q:"How do you implement internationalization (i18n) in Next.js?",opts:["Only with third-party libraries","Via the i18n config in next.config.js (Pages Router) for locale detection/routing, or the App Router with locale segments and libraries like next-intl or react-i18next","By duplicating pages","Via environment variables"],ans:1,sol:"Pages Router: configure i18n: { locales, defaultLocale } in next.config.js for automatic locale routing. App Router: use [locale] segments + middleware for locale detection, with next-intl or similar for translations."},
  {tag:"React Fundamentals",q:"What is <code>forwardRef</code> in React?",opts:["A ref forwarding CSS technique","A React API that lets a parent component pass a ref through to a child DOM element or component — enabling the parent to access the child's DOM node or imperative handle","A HOC","A context provider"],ans:1,sol:"React.forwardRef((props, ref) => <input ref={ref} />) lets parent components attach a ref to an internal DOM node. Without forwardRef, refs on function components point to nothing (null) by default."},
  {tag:"React Fundamentals",q:"What is the significance of <code>defaultProps</code> vs default parameter values?",opts:["No difference","defaultProps is a class/function component property for setting prop defaults (deprecated for function components in React 18.3+); default parameter values in destructuring are the modern idiomatic approach for function components","defaultProps is faster","Default parameters don't work with TypeScript"],ans:1,sol:"function Comp({ name = 'World' }) uses JavaScript default parameter syntax — more natural and TypeScript-friendly. React deprecated defaultProps for function components in 18.3 (still valid for class components). The behavior is identical."},
  {tag:"Security",q:"What is Content Security Policy (CSP) and how is it set in Next.js?",opts:["A React prop","An HTTP response header that restricts which resources (scripts, styles, fonts) the browser can load, mitigating XSS; set via next.config.js headers() or Middleware","A webpack plugin","A browser API"],ans:1,sol:"CSP is set via the Content-Security-Policy response header. In Next.js, configure it in next.config.js async headers() or in middleware.ts using the NextResponse. Use nonces for inline scripts in Next.js with CSP."},
  {tag:"Next.js Advanced",q:"What is the purpose of <code>next/headers</code>?",opts:["Managing HTML <head>","Providing server-only functions cookies() and headers() for reading HTTP cookies and request headers from Server Components, Route Handlers, and Middleware","Client-side cookie management","Setting response headers"],ans:1,sol:"import { cookies, headers } from 'next/headers' provides async functions for reading HTTP cookies and request headers on the server. Accessing them makes the route dynamic. In Next.js 15, they return Promises."},
  {tag:"App Router",q:"What is the <code>after()</code> API in Next.js 15?",opts:["A setTimeout wrapper","An unstable API that schedules work to run after the response has been sent to the client — useful for logging, analytics, and cleanup that shouldn't delay the response","An after-render hook","A cron scheduler"],ans:1,sol:"after(callback) from 'next/server' executes code after the response is finalized and sent. It's ideal for fire-and-forget tasks like logging analytics events or sending notifications without blocking the response time."},
  {tag:"Next.js Fundamentals",q:"What is the difference between <code>next start</code> and <code>next dev</code>?",opts:["Same thing","next dev starts a development server with HMR; next start serves the production build from .next (must run next build first) with no hot reloading","next start is for testing","next dev builds for production"],ans:1,sol:"next dev is for development — fast refresh, detailed errors, no optimization. next start serves the optimized production build (.next) — run next build first. Always test with next start before deploying to avoid prod-only bugs."},
  {tag:"Modern React",q:"What is Remix and how does it differ from Next.js?",opts:["A music app","A React framework emphasizing progressive enhancement, web standards (fetch, FormData, Response), and nested route data loading via loaders/actions. Less opinionated on rendering strategy vs Next.js","A state manager","A CSS framework"],ans:1,sol:"Remix is a full-stack React framework using web platform APIs. Its nested route loaders/actions colocate data with UI. It doesn't support SSG (only SSR). Next.js offers more rendering flexibility (SSG, ISR, RSC). Both are great modern choices."},
  {tag:"Modern React",q:"What is Astro and when would you choose it over Next.js?",opts:["A JavaScript runtime","A multi-framework static site builder that ships zero JS by default and selectively hydrates interactive components (Islands). Choose Astro for mostly-static content sites; Next.js for full-stack apps with complex data fetching","A CSS framework","A state manager"],ans:1,sol:"Astro is optimized for content-heavy sites (blogs, docs, marketing). It generates static HTML and hydrates only interactive islands. Next.js is better for full-stack apps needing SSR, Server Actions, API routes, and complex state. Different tools, different use cases."},
  {tag:"Modern React",q:"What is React Native's relationship to React?",opts:["It's a completely separate library","React Native uses the same React component model and hooks but renders to native mobile UI elements (View, Text, Pressable) instead of HTML DOM elements","It's a web framework","It's a fork of React"],ans:1,sol:"React Native shares React's programming model (hooks, context, functional components) but the renderer outputs native UI primitives (UIView on iOS, View on Android) instead of HTML. Code sharing with React web is possible via platform-specific files."},
  {tag:"TypeScript & React",q:"What is <code>ComponentPropsWithoutRef</code> and when do you use it?",opts:["A React HOC","A TypeScript utility that extracts the props type of a built-in HTML element (e.g., ComponentPropsWithoutRef<'button'>) or component — useful for building polymorphic components that extend native element props","A class utility","A DOM type"],ans:1,sol:"ComponentPropsWithoutRef<'button'> gives you all valid button HTML attributes as a type. Extend it for wrapper components: interface Props extends ComponentPropsWithoutRef<'button'> { variant: 'primary' } — passing all native props through automatically."},
  {tag:"React Fundamentals",q:"What is the React DevTools browser extension used for?",opts:["Building React apps","Inspecting the component tree, viewing/editing props and state, profiling renders, and highlighting re-renders in the browser — essential for debugging React apps","Testing React apps","Deploying React apps"],ans:1,sol:"React DevTools adds a Components panel (browse tree, inspect/edit state and props) and a Profiler panel (record renders, see what caused each render, identify slow components) to browser DevTools."},
  {tag:"Advanced React",q:"What is the difference between controlled and uncontrolled inputs in the context of React Hook Form?",opts:["No difference","RHF uses uncontrolled inputs by default (register via ref) for performance; Controller wraps external controlled components (MUI, Ant Design) that require value+onChange props","RHF only supports controlled","RHF only supports uncontrolled"],ans:1,sol:"RHF's register() connects inputs as uncontrolled (direct DOM ref). The <Controller> component wraps controlled UI libraries (like Material UI's TextField) that need controlled value and onChange props injected by RHF."},
  {tag:"Next.js Advanced",q:"What is the Next.js Cache hierarchy in the App Router?",opts:["One level of cache","Four levels: Request Memoization (per-render dedup), Data Cache (persistent fetch cache across requests), Full Route Cache (static HTML at build), and Router Cache (client-side navigation cache)","Two levels: server and client","Three levels: build, request, browser"],ans:1,sol:"Next.js App Router has 4 caching layers: 1) Request Memoization (deduplicates identical fetch calls in a single render), 2) Data Cache (persists across requests/deploys with revalidation), 3) Full Route Cache (pre-rendered HTML/RSC payload at build), 4) Router Cache (client-side cache of RSC payloads for back/forward navigation)."},
  {tag:"App Router",q:"What does <code>'use cache'</code> directive do in Next.js 15?",opts:["Enables browser cache","An experimental directive that marks a function or component for persistent caching with configurable revalidation — a more ergonomic replacement for fetch cache options and unstable_cache","A no-op","Enables Redis"],ans:1,sol:"'use cache' (Next.js 15 experimental) marks a Server Component, async function, or route segment for caching. Paired with cacheTag() and cacheLife() helpers, it offers a unified, intuitive caching API replacing multiple previous patterns."},
  {tag:"Next.js Fundamentals",q:"How do you set up TypeScript in a new Next.js project?",opts:["Manually install tsc","create-next-app automatically sets up TypeScript when you choose Yes; in existing projects, add a tsconfig.json and install @types/react @types/node — Next.js detects TypeScript and auto-configures","Only via a plugin","TypeScript is not supported"],ans:1,sol:"Next.js has first-class TypeScript support. create-next-app --typescript bootstraps with full TS config. For existing projects: touch tsconfig.json, then install type packages — next dev auto-populates tsconfig.json with optimal settings."},
  {tag:"Performance",q:"What is React's <code>Profiler</code> API?",opts:["A DevTools-only feature","A built-in React component <Profiler id='...' onRender={callback}> that collects render timing data programmatically — useful for custom performance monitoring in production","A webpack plugin","A Node.js profiler"],ans:1,sol:"<Profiler onRender={(id, phase, actualDuration, baseDuration, startTime, commitTime) => log(...)> collects render metrics. Unlike DevTools, it works in production (disabled in development-only builds) for real-world performance monitoring."},
  {tag:"Security",q:"What are HTTP-only cookies and why are they important for auth tokens in Next.js?",opts:["Cookies that only work over HTTP","Cookies with the HttpOnly flag set — they cannot be accessed by JavaScript (document.cookie), preventing XSS attacks from stealing auth tokens. Set via Set-Cookie header in Next.js Route Handlers or Server Actions","A Next.js cookie type","SameSite cookies"],ans:1,sol:"HttpOnly cookies are inaccessible to JavaScript, mitigating XSS token theft. In Next.js, set them server-side via cookies().set('token', value, { httpOnly: true, secure: true, sameSite: 'lax' }) in Server Actions or Route Handlers."},
];

// State
let currentIndex = 0;
let answers = new Array(QUESTIONS.length).fill(null);
let submitted = false;
let activeFilter = 'All';

function getTags() {
  const t = ['All', ...new Set(QUESTIONS.map(q => q.tag))];
  return t;
}

function getFilteredIndices() {
  if (activeFilter === 'All') return QUESTIONS.map((_, i) => i);
  return QUESTIONS.reduce((acc, q, i) => { if (q.tag === activeFilter) acc.push(i); return acc; }, []);
}

function startQuiz() {
  document.getElementById('splash').style.display = 'none';
  document.getElementById('header').classList.remove('hidden');
  document.getElementById('main').classList.remove('hidden');
  renderFilterBar();
  renderPager();
  renderQuestion(currentIndex);
}

function renderFilterBar() {
  const bar = document.getElementById('filterBar');
  bar.innerHTML = getTags().map(t =>
    `<button class="filter-btn${activeFilter===t?' active':''}" onclick="setFilter('${t.replace(/'/g,"\\'")}')">
      ${t}
    </button>`
  ).join('');
}

function setFilter(tag) {
  activeFilter = tag;
  const filtered = getFilteredIndices();
  currentIndex = filtered[0];
  renderFilterBar();
  renderPager();
  renderQuestion(currentIndex);
}

function renderPager() {
  const pager = document.getElementById('pager');
  const filtered = getFilteredIndices();
  pager.innerHTML = filtered.map(i => {
    let cls = 'page-btn';
    if (i === currentIndex) cls += ' active';
    else if (submitted && answers[i] !== null) {
      cls += answers[i] === QUESTIONS[i].ans ? ' correct-pg' : ' wrong-pg';
    } else if (answers[i] !== null) cls += ' answered';
    return `<button class="${cls}" onclick="goTo(${i})">${i+1}</button>`;
  }).join('');
}

function goTo(i) {
  currentIndex = i;
  renderPager();
  renderQuestion(i);
}

function navigate(dir) {
  const filtered = getFilteredIndices();
  const idx = filtered.indexOf(currentIndex);
  const next = idx + dir;
  if (next >= 0 && next < filtered.length) {
    goTo(filtered[next]);
  }
}

function renderQuestion(i) {
  const q = QUESTIONS[i];
  const chosen = answers[i];
  const isAnswered = chosen !== null;
  const filtered = getFilteredIndices();
  const pos = filtered.indexOf(i);

  document.getElementById('prevBtn').disabled = pos === 0;
  document.getElementById('nextBtn').disabled = pos === filtered.length - 1;

  const optHtml = q.opts.map((opt, oi) => {
    let cls = 'opt';
    if (isAnswered) {
      cls += ' disabled';
      if (oi === q.ans) cls += submitted ? ' correct' : ' show-correct';
      else if (oi === chosen && chosen !== q.ans) cls += ' wrong';
    }
    return `<div class="${cls}" onclick="selectAnswer(${i},${oi})">
      <span class="opt-letter">${'ABCD'[oi]}</span>
      <span class="opt-text">${opt.replace(/`([^`]+)`/g,'<code>$1</code>')}</span>
    </div>`;
  }).join('');

  const solHtml = (isAnswered) ? `
    <div class="solution">
      <div class="sol-label">Explanation</div>
      <div class="sol-text">${q.sol.replace(/`([^`]+)`/g,'<code>$1</code>')}</div>
    </div>` : '';

  document.getElementById('questionContainer').innerHTML = `
    <div class="q-card">
      <div class="q-meta">
        <span class="q-num">Q ${i+1} / ${QUESTIONS.length}</span>
        <span class="q-tag">${q.tag}</span>
      </div>
      <div class="q-text">${q.q.replace(/`([^`]+)`/g,'<code>$1</code>')}</div>
      <div class="options">${optHtml}</div>
      ${solHtml}
    </div>`;

  updateProgress();
}

function selectAnswer(qi, oi) {
  if (answers[qi] !== null) return;
  answers[qi] = oi;
  renderPager();
  renderQuestion(qi);
  updateProgress();
}

function updateProgress() {
  const answered = answers.filter(a => a !== null).length;
  const pct = (answered / QUESTIONS.length * 100).toFixed(1);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${answered} / ${QUESTIONS.length} answered`;
  const correct = answers.filter((a, i) => a === QUESTIONS[i].ans).length;
  document.getElementById('scoreDisplay').textContent = correct;
}

function submitAll() {
  const answered = answers.filter(a => a !== null).length;
  if (answered < QUESTIONS.length * 0.5) {
    if (!confirm(`You've only answered ${answered}/${QUESTIONS.length} questions. Submit anyway?`)) return;
  }
  submitted = true;
  const correct = answers.filter((a, i) => a !== null && a === QUESTIONS[i].ans).length;
  const wrong = answers.filter((a, i) => a !== null && a !== QUESTIONS[i].ans).length;
  const skipped = answers.filter(a => a === null).length;
  const pct = Math.round(correct / QUESTIONS.length * 100);

  document.getElementById('main').style.display = 'none';
  document.getElementById('header').classList.add('hidden');
  document.getElementById('results').style.display = 'block';
  document.getElementById('rScore').textContent = correct;
  document.getElementById('rPct').textContent = pct + '%';
  document.getElementById('rCorrect').textContent = correct;
  document.getElementById('rWrong').textContent = wrong;
  document.getElementById('rSkipped').textContent = skipped;

  let grade, emoji;
  if (pct >= 90) { grade = '🏆 Outstanding'; }
  else if (pct >= 75) { grade = '🎯 Strong Performance'; }
  else if (pct >= 60) { grade = '📈 Good Progress'; }
  else if (pct >= 40) { grade = '📚 Keep Studying'; }
  else { grade = '🔁 Review the Fundamentals'; }
  document.getElementById('rGrade').textContent = grade;
}

function restartQuiz() {
  answers = new Array(QUESTIONS.length).fill(null);
  submitted = false;
  currentIndex = 0;
  activeFilter = 'All';
  document.getElementById('results').style.display = 'none';
  document.getElementById('header').classList.remove('hidden');
  document.getElementById('main').style.display = 'block';
  renderFilterBar();
  renderPager();
  renderQuestion(0);
}
</script>
</body>
</html>
