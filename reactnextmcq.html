<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>React & Next.js — Master Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #16161f;
    --border: #2a2a3a;
    --accent: #61dafb;
    --accent2: #00e5a0;
    --accent3: #ff6b6b;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --correct: #00e5a0;
    --wrong: #ff6b6b;
    --pending: #ffd166;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse 80% 60% at 50% -20%,rgba(97,218,251,0.06) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,rgba(0,229,160,0.04) 0%,transparent 50%);pointer-events:none;z-index:0}

  /* SPLASH */
  #splash{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);padding:24px;text-align:center}
  .splash-badge{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.2em;color:var(--accent);text-transform:uppercase;border:1px solid rgba(97,218,251,.3);padding:6px 16px;border-radius:2px;margin-bottom:32px}
  .splash-title{font-size:clamp(42px,8vw,96px);font-weight:800;line-height:.95;letter-spacing:-.03em;margin-bottom:16px}
  .splash-title span.r{color:var(--accent)}
  .splash-title span.n{color:var(--accent2)}
  .splash-sub{color:var(--muted);font-size:16px;margin-bottom:48px;max-width:440px;line-height:1.6}
  .splash-stats{display:flex;gap:32px;margin-bottom:48px}
  .stat{display:flex;flex-direction:column;align-items:center;gap:4px}
  .stat-num{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;color:var(--accent)}
  .stat-label{font-size:12px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
  .btn-start{background:var(--accent);color:#000;font-family:'Syne',sans-serif;font-weight:700;font-size:16px;letter-spacing:.05em;padding:16px 48px;border:none;cursor:pointer;border-radius:2px;transition:all .2s;text-transform:uppercase}
  .btn-start:hover{background:#fff;transform:translateY(-2px);box-shadow:0 12px 32px rgba(97,218,251,.25)}

  /* HEADER */
  #header{position:sticky;top:0;z-index:50;background:rgba(10,10,15,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:16px}
  .logo{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--accent);white-space:nowrap}
  .progress-wrap{flex:1;display:flex;flex-direction:column;gap:4px}
  .progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .4s cubic-bezier(.4,0,.2,1)}
  .progress-label{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted)}
  .score-pill{font-family:'Space Mono',monospace;font-size:12px;background:var(--card);border:1px solid var(--border);padding:6px 14px;border-radius:2px;white-space:nowrap}
  .score-pill span{color:var(--accent2)}

  /* MAIN */
  #main{position:relative;z-index:1;max-width:800px;margin:0 auto;padding:32px 20px 80px}

  /* QUESTION CARD */
  .q-card{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:32px;margin-bottom:20px;animation:fadeUp .4s ease}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .q-meta{display:flex;align-items:center;gap:12px;margin-bottom:20px}
  .q-num{font-family:'Space Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:.15em;text-transform:uppercase}
  .q-tag{font-family:'Space Mono',monospace;font-size:10px;background:rgba(97,218,251,.08);color:var(--accent);padding:3px 10px;border-radius:2px;letter-spacing:.1em}
  .q-text{font-size:18px;font-weight:600;line-height:1.5;color:var(--text);margin-bottom:28px}
  .q-text code{font-family:'Space Mono',monospace;font-size:14px;background:rgba(97,218,251,.08);color:var(--accent);padding:1px 6px;border-radius:2px}

  /* OPTIONS */
  .options{display:flex;flex-direction:column;gap:10px}
  .opt{display:flex;align-items:flex-start;gap:14px;padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:3px;cursor:pointer;transition:all .15s;font-size:15px;line-height:1.5}
  .opt:hover:not(.disabled){border-color:rgba(97,218,251,.4);background:rgba(97,218,251,.04);transform:translateX(4px)}
  .opt.disabled{cursor:default}
  .opt.correct{border-color:var(--correct);background:rgba(0,229,160,.08)}
  .opt.wrong{border-color:var(--wrong);background:rgba(255,107,107,.08)}
  .opt.show-correct{border-color:var(--correct);background:rgba(0,229,160,.06)}
  .opt-letter{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;min-width:24px;height:24px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:2px;color:var(--muted);flex-shrink:0;margin-top:1px;transition:all .15s}
  .opt.correct .opt-letter{background:var(--correct);color:#000;border-color:var(--correct)}
  .opt.wrong .opt-letter{background:var(--wrong);color:#fff;border-color:var(--wrong)}
  .opt.show-correct .opt-letter{background:rgba(0,229,160,.3);color:var(--correct);border-color:var(--correct)}
  .opt-text code{font-family:'Space Mono',monospace;font-size:13px;background:rgba(255,255,255,.05);padding:1px 5px;border-radius:2px}

  /* SOLUTION */
  .solution{margin-top:16px;padding:16px 20px;background:rgba(97,218,251,.04);border:1px solid rgba(97,218,251,.2);border-radius:3px;animation:fadeUp .3s ease}
  .sol-label{font-family:'Space Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:.2em;text-transform:uppercase;margin-bottom:8px}
  .sol-text{font-size:14px;color:#b0b0c0;line-height:1.6}
  .sol-text code{font-family:'Space Mono',monospace;font-size:12px;background:rgba(97,218,251,.1);color:var(--accent);padding:1px 5px;border-radius:2px}

  /* NAV */
  .nav{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
  .btn{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;padding:10px 24px;border-radius:2px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);letter-spacing:.05em;text-transform:uppercase;transition:all .2s}
  .btn:hover{border-color:var(--accent);color:var(--accent)}
  .btn.primary{background:var(--accent);color:#000;border-color:var(--accent)}
  .btn.primary:hover{background:#fff;border-color:#fff}
  .btn:disabled{opacity:.3;cursor:default}

  /* FILTER BAR */
  .filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
  .filter-btn{font-family:'Space Mono',monospace;font-size:11px;padding:5px 12px;border-radius:2px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;letter-spacing:.08em}
  .filter-btn:hover,.filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(97,218,251,.06)}

  /* RESULTS */
  #results{display:none;max-width:800px;margin:0 auto;padding:48px 20px 80px}
  .result-hero{text-align:center;margin-bottom:48px}
  .result-score{font-family:'Space Mono',monospace;font-size:72px;font-weight:700;line-height:1;color:var(--accent)}
  .result-denom{font-size:24px;color:var(--muted);margin-bottom:16px}
  .result-pct{font-family:'Space Mono',monospace;font-size:20px;color:var(--accent2);margin-bottom:8px}
  .result-grade{font-size:28px;font-weight:700;margin-bottom:32px}
  .result-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:48px}
  .rs{padding:20px;background:var(--card);border:1px solid var(--border);border-radius:4px;text-align:center}
  .rs-val{font-family:'Space Mono',monospace;font-size:24px;font-weight:700;margin-bottom:4px}
  .rs-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
  .rs-val.c{color:var(--correct)}
  .rs-val.w{color:var(--wrong)}
  .rs-val.s{color:var(--accent)}

  /* HIDDEN */
  .hidden{display:none!important}

  /* PAGINATION */
  .pager{display:flex;align-items:center;gap:8px;margin-bottom:32px;flex-wrap:wrap}
  .page-btn{font-family:'Space Mono',monospace;font-size:11px;min-width:32px;height:32px;border-radius:2px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
  .page-btn:hover{border-color:var(--accent);color:var(--accent)}
  .page-btn.active{background:var(--accent);color:#000;border-color:var(--accent)}
  .page-btn.answered{border-color:rgba(0,229,160,.4);color:var(--accent2)}
  .page-btn.correct-pg{border-color:var(--correct);background:rgba(0,229,160,.1);color:var(--correct)}
  .page-btn.wrong-pg{border-color:var(--wrong);background:rgba(255,107,107,.1);color:var(--wrong)}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-badge">Interview Prep Series</div>
  <h1 class="splash-title"><span class="r">React</span> &<br><span class="n">Next.js</span></h1>
  <p class="splash-sub">Master the most asked interview questions. 200 MCQs covering hooks, routing, SSR, performance, and everything in between.</p>
  <div class="splash-stats">
    <div class="stat"><span class="stat-num">200</span><span class="stat-label">Questions</span></div>
    <div class="stat"><span class="stat-num">12</span><span class="stat-label">Topics</span></div>
    <div class="stat"><span class="stat-num">∞</span><span class="stat-label">Attempts</span></div>
  </div>
  <button class="btn-start" onclick="startQuiz()">Start Quiz</button>
</div>

<!-- HEADER -->
<div id="header" class="hidden">
  <div class="logo">RN·MCQ</div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-label" id="progressLabel">0 / 200 answered</div>
  </div>
  <div class="score-pill">Score: <span id="scoreDisplay">0</span></div>
</div>

<!-- MAIN QUIZ -->
<div id="main" class="hidden">
  <div class="filter-bar" id="filterBar"></div>
  <div class="pager" id="pager"></div>
  <div id="questionContainer"></div>
  <div class="nav">
    <button class="btn" id="prevBtn" onclick="navigate(-1)" disabled>← Prev</button>
    <button class="btn primary" id="submitBtn" onclick="submitAll()">Finish & See Results</button>
    <button class="btn" id="nextBtn" onclick="navigate(1)">Next →</button>
  </div>
</div>

<!-- RESULTS -->
<div id="results">
  <div class="result-hero">
    <div class="result-score" id="rScore">0</div>
    <div class="result-denom">out of 200</div>
    <div class="result-pct" id="rPct">0%</div>
    <div class="result-grade" id="rGrade">—</div>
    <button class="btn primary" onclick="restartQuiz()" style="margin-top:8px">Restart Quiz</button>
  </div>
  <div class="result-stats">
    <div class="rs"><div class="rs-val c" id="rCorrect">0</div><div class="rs-label">Correct</div></div>
    <div class="rs"><div class="rs-val w" id="rWrong">0</div><div class="rs-label">Wrong</div></div>
    <div class="rs"><div class="rs-val s" id="rSkipped">0</div><div class="rs-label">Skipped</div></div>
  </div>
</div>

<script>
const QUESTIONS = [
  // ── REACT FUNDAMENTALS ──────────────────────────────────────────────
  {tag:"React Fundamentals",q:"What is the virtual DOM in React?",opts:["A direct copy of the browser DOM","A lightweight in-memory representation of the real DOM","A database for component state","A browser API for rendering"],ans:1,sol:"The virtual DOM is a lightweight JavaScript object tree that mirrors the real DOM. React diffs it against the previous snapshot to determine the minimal set of real DOM updates needed, improving performance."},
  {tag:"React Fundamentals",q:"Which method is called first in a React class component lifecycle?",opts:["componentDidMount","render","constructor","componentWillMount"],ans:2,sol:"The constructor is called before the component is mounted. It's used to initialize state and bind event handlers. 'componentWillMount' is deprecated."},
  {tag:"React Fundamentals",q:"What does JSX stand for?",opts:["JavaScript XML","Java Syntax Extension","JSON XML","JavaScript Extension"],ans:0,sol:"JSX stands for JavaScript XML. It's a syntax extension that lets you write HTML-like markup inside JavaScript. Babel compiles it to React.createElement() calls."},
  {tag:"React Fundamentals",q:"What is a React Fragment used for?",opts:["Splitting code bundles","Grouping elements without adding extra DOM nodes","Memoizing components","Creating portals"],ans:1,sol:"React.Fragment (or the shorthand <>) lets you group multiple children without adding an extra DOM wrapper node, keeping the DOM clean."},
  {tag:"React Fundamentals",q:"What is the correct way to render a list in React?",opts:["Using a for loop directly in JSX","Using Array.map() with a unique key prop","Using Array.forEach()","Using a while loop"],ans:1,sol:"Array.map() is idiomatic React for rendering lists. Each element must have a unique key prop so React can efficiently track additions, removals, and reorders."},
  {tag:"React Fundamentals",q:"What is prop drilling?",opts:["A performance optimization technique","Passing props through many intermediate components","A way to drill into the DOM","A testing methodology"],ans:1,sol:"Prop drilling occurs when you pass props down through multiple layers of components that don't need them, just to get the data to a deeply nested child. Context API or state managers like Redux solve this."},
  {tag:"React Fundamentals",q:"What does <code>React.StrictMode</code> do?",opts:["Enables TypeScript","Runs the app in production mode","Highlights potential problems by double-invoking certain functions in dev","Disables all warnings"],ans:2,sol:"StrictMode intentionally double-invokes render methods and lifecycle functions in development to detect side effects and warn about deprecated APIs. It has no effect in production."},
  {tag:"React Fundamentals",q:"What is the purpose of the <code>key</code> prop in React?",opts:["Styling elements","Providing a unique identifier so React can track list items across renders","Encrypting component data","Setting component IDs"],ans:1,sol:"The key prop helps React identify which items in a list have changed, been added, or removed. Using stable, unique keys (like database IDs) enables efficient reconciliation."},
  {tag:"React Fundamentals",q:"What is a controlled component in React?",opts:["A component controlled by CSS","A component whose form data is managed by React state","A component with no children","A component rendered server-side"],ans:1,sol:"In a controlled component, form input values are driven by React state. Every state change goes through a React event handler, making React the single source of truth."},
  {tag:"React Fundamentals",q:"What is an uncontrolled component?",opts:["A component without props","A component that manages its own form data via the DOM (refs)","A component with no lifecycle","A component outside the component tree"],ans:1,sol:"Uncontrolled components store their own state internally in the DOM. You access values via refs rather than React state. Useful for file inputs or integrating with non-React libraries."},

  // ── HOOKS ────────────────────────────────────────────────────────────
  {tag:"Hooks",q:"What does <code>useState</code> return?",opts:["Only the current state","Only the setter function","A tuple of [state, setter]","An object with state and dispatch"],ans:2,sol:"useState returns a two-element array: the current state value and a setter function. Destructuring it as [value, setValue] is idiomatic React."},
  {tag:"Hooks",q:"When does <code>useEffect</code> run with an empty dependency array?",opts:["On every render","Never","Only once after the initial render","Before every render"],ans:2,sol:"Passing [] as the dependency array to useEffect means the effect runs only after the first render (mount) and the cleanup runs on unmount — equivalent to componentDidMount + componentWillUnmount."},
  {tag:"Hooks",q:"What is the primary use case of <code>useRef</code>?",opts:["Managing complex state","Accessing DOM nodes or persisting a mutable value across renders without causing re-renders","Subscribing to context","Memoizing expensive computations"],ans:1,sol:"useRef returns a mutable ref object with a .current property. It persists across renders and is ideal for holding a DOM reference or any value that shouldn't trigger a re-render when changed."},
  {tag:"Hooks",q:"What does <code>useCallback</code> do?",opts:["Caches the return value of a function","Memoizes a function reference so it's stable across renders","Creates a new function on every render","Replaces useEffect"],ans:1,sol:"useCallback memoizes a function so it only gets a new reference when its dependencies change. This prevents unnecessary re-renders of child components that receive callbacks as props."},
  {tag:"Hooks",q:"What is the difference between <code>useMemo</code> and <code>useCallback</code>?",opts:["No difference","useMemo memoizes a computed value; useCallback memoizes a function","useMemo is for functions; useCallback is for values","useMemo is deprecated"],ans:1,sol:"useMemo(() => computedValue, deps) memoizes the result of a computation. useCallback(fn, deps) memoizes the function itself. useCallback(fn, deps) is equivalent to useMemo(() => fn, deps)."},
  {tag:"Hooks",q:"What does <code>useContext</code> do?",opts:["Creates a context","Subscribes a component to a context value without render props","Provides context to children","Destroys context"],ans:1,sol:"useContext(MyContext) subscribes the component to the nearest matching Provider and returns its current value. The component re-renders whenever the context value changes."},
  {tag:"Hooks",q:"What does <code>useReducer</code> return?",opts:["A reducer function","[state, dispatch]","[state, reducer]","An action object"],ans:1,sol:"useReducer(reducer, initialState) returns [state, dispatch]. You dispatch action objects, and the reducer function computes the next state. Great for complex state logic."},
  {tag:"Hooks",q:"Can you call a Hook inside a conditional statement?",opts:["Yes, always","Yes, but only in class components","No — Hooks must be called at the top level, unconditionally","Only if wrapped in try-catch"],ans:2,sol:"The Rules of Hooks state that Hooks must be called at the top level, never inside loops, conditions, or nested functions. This ensures Hook call order is consistent across renders."},
  {tag:"Hooks",q:"What problem does <code>useLayoutEffect</code> solve compared to <code>useEffect</code>?",opts:["It's asynchronous","It fires synchronously after DOM mutations but before the browser paints, preventing visual flicker","It runs server-side","It replaces componentDidUpdate"],ans:1,sol:"useLayoutEffect fires synchronously after React updates the DOM but before the browser has painted. Use it to read layout from the DOM and re-render synchronously to prevent visual inconsistencies."},
  {tag:"Hooks",q:"What is the purpose of the cleanup function returned from <code>useEffect</code>?",opts:["To reset state","To cancel subscriptions, timers, or async tasks when the component unmounts or before the effect re-runs","To trigger a re-render","To memoize the effect"],ans:1,sol:"Returning a cleanup function from useEffect is analogous to componentWillUnmount. React calls it before running the effect again (if deps changed) and when the component unmounts, preventing memory leaks."},
  {tag:"Hooks",q:"Which hook would you use to implement debouncing a search input?",opts:["useContext","useRef + useEffect","useReducer","useLayoutEffect"],ans:1,sol:"Combine useRef to store the timer ID and useEffect to set/clear the debounce timer. The cleanup function clears the previous timer each time the value changes."},
  {tag:"Hooks",q:"What does <code>useId</code> return (React 18+)?",opts:["A UUID","A stable unique ID per component instance, safe for SSR hydration","A random number","A DOM element ID"],ans:1,sol:"useId generates a stable, unique ID that is consistent between server and client renders, making it safe for use in accessibility attributes like aria-labelledby without hydration mismatches."},
  {tag:"Hooks",q:"What is a custom hook?",opts:["A built-in React hook","A JavaScript function starting with 'use' that can call other hooks","A class method","A lifecycle method"],ans:1,sol:"A custom hook is any JavaScript function whose name starts with 'use' and that may call other hooks. It's the primary way to share stateful logic across components without changing the component hierarchy."},
  {tag:"Hooks",q:"What does <code>useTransition</code> do in React 18?",opts:["Adds CSS transitions","Marks state updates as non-urgent so urgent updates (typing) aren't blocked","Replaces useEffect","Manages form transitions"],ans:1,sol:"useTransition returns [isPending, startTransition]. Updates wrapped in startTransition are marked as non-urgent, letting React keep the UI responsive by deferring them when needed (e.g., filtering a large list)."},
  {tag:"Hooks",q:"What is <code>useDeferredValue</code> used for?",opts:["Deferring component mounting","Returning a deferred version of a value that may lag behind the latest value to keep the UI responsive","Lazy loading images","Deferring network requests"],ans:1,sol:"useDeferredValue accepts a value and returns a deferred copy. During urgent renders, the deferred value stays at its previous version. This prevents slow re-renders (like large lists) from blocking fast ones."},

  // ── COMPONENT PATTERNS ───────────────────────────────────────────────
  {tag:"Component Patterns",q:"What is a Higher-Order Component (HOC)?",opts:["A component with more than 100 lines","A function that takes a component and returns a new enhanced component","A component that renders other components via children prop","A class component"],ans:1,sol:"An HOC is a function (wrappedComponent => EnhancedComponent) that adds cross-cutting concerns like auth, logging, or data fetching. They're a composition pattern, not a React feature."},
  {tag:"Component Patterns",q:"What is the render props pattern?",opts:["Returning JSX from a prop","A technique where a component shares code by having a prop whose value is a function that returns JSX","Using dangerouslySetInnerHTML","Rendering server-side props"],ans:1,sol:"Render props is a technique where a component accepts a function prop (often called 'render' or 'children') that it calls with internal state, sharing logic without HOCs."},
  {tag:"Component Patterns",q:"What is React.memo used for?",opts:["Memoizing context","Wrapping a functional component to prevent re-renders when props haven't changed","Caching API calls","Replacing PureComponent"],ans:1,sol:"React.memo is a HOC for functional components. It shallowly compares props before re-rendering; if props didn't change, the previous render is reused — similar to PureComponent for classes."},
  {tag:"Component Patterns",q:"What is a compound component?",opts:["A component that uses compound interest","A pattern where related components share implicit state via Context","A component with nested routes","A component with multiple render methods"],ans:1,sol:"Compound components (e.g., <Select>/<Select.Option>) use context to share state implicitly between a parent and its child components, providing a flexible, expressive API."},
  {tag:"Component Patterns",q:"What is the purpose of React Portals?",opts:["Creating routes","Rendering children into a DOM node that exists outside the parent component's DOM hierarchy","Managing global state","Code splitting"],ans:1,sol:"ReactDOM.createPortal(children, domNode) renders children into a different part of the DOM (e.g., document.body) while keeping them in the React component tree, preserving event bubbling."},
  {tag:"Component Patterns",q:"What is lazy loading in React?",opts:["Loading images slowly","Deferring component loading until needed using React.lazy + Suspense","Using useEffect for data fetching","Delaying state updates"],ans:1,sol:"React.lazy(() => import('./Component')) enables code splitting at the component level. Wrapped in Suspense with a fallback, the component's bundle is loaded only when it's first rendered."},
  {tag:"Component Patterns",q:"What does <code>React.Suspense</code> do?",opts:["Creates async effects","Shows a fallback UI while lazy-loaded components or async data is loading","Replaces try-catch","Suspends the entire app"],ans:1,sol:"Suspense lets components 'wait' for something before rendering. It shows the fallback prop until all lazily loaded components (or data in React 18 Suspense for data) inside it are ready."},
  {tag:"Component Patterns",q:"What is an Error Boundary?",opts:["A try-catch block","A class component that catches JavaScript errors in its child tree and displays a fallback UI","A type checker","A form validator"],ans:1,sol:"Error Boundaries are class components implementing getDerivedStateFromError and/or componentDidCatch. They catch render errors in their subtree and show a fallback UI instead of crashing the whole app."},
  {tag:"Component Patterns",q:"Can functional components be Error Boundaries?",opts:["Yes, with useError hook","Yes, with try-catch","No — Error Boundaries currently require class components","Yes, in React 18+"],ans:2,sol:"As of React 18, Error Boundaries still require class components. The react-error-boundary library provides a wrapper HOC so you can use them declaratively in functional code."},
  {tag:"Component Patterns",q:"What is reconciliation in React?",opts:["Merging git branches","The algorithm React uses to diff virtual DOM trees and determine minimal real DOM updates","Handling network conflicts","Combining Redux stores"],ans:1,sol:"Reconciliation is React's diffing algorithm. It compares the new virtual DOM tree with the previous one, then computes the minimal set of operations needed to update the real DOM efficiently."},

  // ── STATE MANAGEMENT ─────────────────────────────────────────────────
  {tag:"State Management",q:"What is the Context API used for?",opts:["Routing","Sharing state across the component tree without prop drilling","Handling side effects","Server-side rendering"],ans:1,sol:"The Context API allows you to create a global-ish store accessible via useContext. It avoids prop drilling by making data available to any component in its provider's subtree."},
  {tag:"State Management",q:"When should you NOT use Context for state management?",opts:["Never","When the state changes frequently and many components subscribe — causing unnecessary re-renders","When using TypeScript","When building forms"],ans:1,sol:"Context re-renders all subscribers when its value changes. For high-frequency updates (e.g., mouse position), dedicated state managers like Zustand or Redux (with selectors) are more performant."},
  {tag:"State Management",q:"What is Redux?",opts:["A CSS framework","A predictable state container — stores all state in one immutable store updated via dispatched actions and reducers","A routing library","A testing tool"],ans:1,sol:"Redux centralizes application state in a single store. State is read-only; the only way to change it is by dispatching actions. Reducers specify how state transitions happen, making changes predictable and debuggable."},
  {tag:"State Management",q:"What is the purpose of Redux middleware like Redux Thunk?",opts:["Adding CSS","Allowing action creators to return functions (for async logic) instead of plain action objects","Routing","Testing reducers"],ans:1,sol:"Redux Thunk allows action creators to return functions instead of plain objects, enabling async logic (API calls, timers) before dispatching the real action. Redux Saga and RTK Query are modern alternatives."},
  {tag:"State Management",q:"What is Zustand?",opts:["A German word meaning state","A minimal, flexible state management library using hooks without boilerplate","A CSS-in-JS library","A testing framework"],ans:1,sol:"Zustand is a small (< 1 KB) state management library. You create a store with a hook; components subscribe only to the slice they use. No Provider needed, no boilerplate."},
  {tag:"State Management",q:"What is the difference between local state and global state?",opts:["No difference","Local state is owned by one component; global state is shared across many components","Local state is faster","Global state uses localStorage"],ans:1,sol:"Local state (useState) lives in a single component and is only relevant there. Global state (Context, Redux, Zustand) is accessible by multiple components and represents shared application-wide data."},
  {tag:"State Management",q:"What is an immutable update in Redux?",opts:["Freezing the DOM","Returning a new state object instead of mutating the existing one","Deleting state","Using Object.freeze"],ans:1,sol:"Redux reducers must be pure functions that return a new state object rather than mutating the old one. This enables time-travel debugging and reliable change detection via reference equality."},
  {tag:"State Management",q:"What is React Query (TanStack Query) primarily used for?",opts:["Routing","Server state management — fetching, caching, synchronizing, and updating async data","CSS animations","Form validation"],ans:1,sol:"React Query manages server state. It handles caching, background refetching, pagination, and optimistic updates, removing the need to manually write fetch + useState + useEffect patterns."},

  // ── PERFORMANCE ──────────────────────────────────────────────────────
  {tag:"Performance",q:"What causes unnecessary re-renders in React?",opts:["Using hooks","Parent re-renders, unstable references (new objects/arrays/functions on every render), and Context value changes","Using TypeScript","Using fragments"],ans:1,sol:"The main causes are parent re-renders (children re-render by default), new object/array/function references on every render breaking React.memo's shallow comparison, and Context value changes."},
  {tag:"Performance",q:"What is code splitting?",opts:["Splitting CSS files","Breaking JavaScript bundles into smaller chunks loaded on demand","Dividing a component into smaller components","Splitting state between hooks"],ans:1,sol:"Code splitting divides your bundle so users download only the code needed for the current page/view. React.lazy + dynamic import() is the standard approach, often configured via webpack or Next.js."},
  {tag:"Performance",q:"What is tree shaking?",opts:["Removing unused React components from state","Eliminating dead (unreferenced) code from the final bundle during build","Pruning the virtual DOM","Removing CSS"],ans:1,sol:"Tree shaking is a bundler optimization (webpack, Rollup, Vite) that removes exported code that's never imported/used. It requires ES modules (import/export) to work statically."},
  {tag:"Performance",q:"What does the React Profiler measure?",opts:["Network requests","How often components render and what the rendering cost is","CSS paint times","Bundle sizes"],ans:1,sol:"The React Profiler (in DevTools or the <Profiler> API) records renders: how many times each component rendered, why it rendered, and how long it took — helping identify bottlenecks."},
  {tag:"Performance",q:"What is windowing (virtualization) in React?",opts:["Server-side rendering in a browser window","Rendering only the visible items in a large list, recycling DOM nodes as you scroll","Opening new browser windows","A Next.js feature"],ans:1,sol:"Windowing renders only the rows currently visible in the viewport, dramatically reducing DOM nodes for large lists. Libraries: react-window and react-virtual. TanStack Virtual is the modern choice."},
  {tag:"Performance",q:"When should you use <code>useMemo</code>?",opts:["Always, for every computed value","Only for expensive computations or to preserve reference identity for downstream memoized components","Never, it's deprecated","Only in class components"],ans:1,sol:"useMemo is most valuable when the computation is genuinely expensive (e.g., sorting thousands of items) or when you need stable reference identity to prevent a child component from re-rendering unnecessarily."},

  // ── ROUTING ──────────────────────────────────────────────────────────
  {tag:"Routing",q:"What package is most commonly used for routing in React SPAs?",opts:["Next.js","React Router","Vue Router","React Navigation"],ans:1,sol:"React Router (v6+) is the de-facto standard for client-side routing in React SPAs, providing components like <Routes>, <Route>, and hooks like useNavigate, useParams."},
  {tag:"Routing",q:"What is the difference between <code>useNavigate</code> and <code>Link</code> in React Router v6?",opts:["No difference","Link is a component for declarative navigation; useNavigate is a hook for programmatic navigation","useNavigate only works in class components","Link replaces the history API"],ans:1,sol:"<Link to='/path'> is a declarative anchor element for navigation. useNavigate() returns a navigate function for programmatic redirects (e.g., after form submission or auth checks)."},
  {tag:"Routing",q:"What does <code>useParams</code> return?",opts:["Query string parameters","An object of URL dynamic segment params (e.g., {id: '42'})","The full URL","Route state"],ans:1,sol:"useParams() returns an object of key/value pairs for dynamic URL segments. For a route defined as /users/:id, it returns { id: '42' } for the URL /users/42."},
  {tag:"Routing",q:"What is a nested route in React Router?",opts:["A route with many components","A child route rendered inside a parent route's layout using <Outlet>","A recursive route","A dynamic route"],ans:1,sol:"Nested routes render child route elements inside parent layouts via <Outlet />. This enables shared UI (nav, sidebar) without re-mounting when navigating between children."},
  {tag:"Routing",q:"What does <code>useSearchParams</code> do?",opts:["Parses URL path params","Gets and sets the URL query string (e.g., ?page=2&sort=asc) as a URLSearchParams object","Manages router history","Redirects to a search page"],ans:1,sol:"useSearchParams() returns [searchParams, setSearchParams]. searchParams is a URLSearchParams instance; calling setSearchParams updates the URL query string without causing a page reload."},

  // ── NEXT.JS FUNDAMENTALS ─────────────────────────────────────────────
  {tag:"Next.js Fundamentals",q:"What is Next.js?",opts:["A CSS framework","A React framework for production with file-based routing, SSR, SSG, API routes, and more","A database ORM","A state management library"],ans:1,sol:"Next.js is a React framework by Vercel that adds server-side rendering, static site generation, file-system routing, API routes, image optimization, and more out of the box."},
  {tag:"Next.js Fundamentals",q:"What is the Pages Router in Next.js?",opts:["A React Router integration","The original file-based routing system where each file in /pages becomes a route","A middleware router","An API routing system"],ans:1,sol:"In the Pages Router, every .js/.jsx/.ts/.tsx file inside the /pages directory automatically becomes a route. Index files map to the root of their directory."},
  {tag:"Next.js Fundamentals",q:"What is the App Router (Next.js 13+)?",opts:["A replacement for React Router","A new routing system under /app using React Server Components, layouts, and nested routes","An API router","A CSS router"],ans:1,sol:"The App Router (introduced in Next.js 13) uses the /app directory. It embraces React Server Components by default, with co-located layouts, loading.tsx, error.tsx, and segment-based rendering."},
  {tag:"Next.js Fundamentals",q:"What is <code>getStaticProps</code>?",opts:["A client-side data fetching function","A Pages Router function that fetches data at build time to generate a static page","A React hook","A server action"],ans:1,sol:"getStaticProps runs at build time on the server. It returns props that are serialized into the static HTML, enabling zero-latency page loads from a CDN with no server required at runtime."},
  {tag:"Next.js Fundamentals",q:"What is <code>getServerSideProps</code>?",opts:["A static generation function","A Pages Router function that fetches data on every request, enabling dynamic SSR","A React hook","A build-time function"],ans:1,sol:"getServerSideProps runs on the server on every request. The fetched data is passed as props and rendered into HTML before being sent to the client — ideal for personalized or real-time data."},
  {tag:"Next.js Fundamentals",q:"What is <code>getStaticPaths</code> used for?",opts:["Defining static file paths","Specifying which dynamic routes to pre-render at build time when using getStaticProps","Generating sitemaps","Defining API routes"],ans:1,sol:"getStaticPaths returns a list of paths for dynamic routes (e.g., /posts/[id]). Next.js pre-renders all those paths at build time. Combined with fallback, it controls behavior for unknown paths."},
  {tag:"Next.js Fundamentals",q:"What does the <code>fallback</code> option in <code>getStaticPaths</code> do?",opts:["Nothing","Controls what happens when visiting a path not returned by getStaticPaths: false=404, true=render on demand, 'blocking'=SSR then cache","Enables fallback CSS","Sets a 404 page"],ans:1,sol:"fallback:false → 404 for unknown paths. fallback:true → serves a loading state, generates page in background, then serves cached version. fallback:'blocking' → SSR the first request, cache for subsequent."},
  {tag:"Next.js Fundamentals",q:"What is Incremental Static Regeneration (ISR)?",opts:["A CSS technique","A Next.js feature that re-generates static pages in the background after a specified revalidation period","A database strategy","A caching API"],ans:1,sol:"ISR lets you update static pages after build time. By adding revalidate: N to getStaticProps, Next.js serves the cached static page and regenerates it in the background when a request comes in after N seconds."},
  {tag:"Next.js Fundamentals",q:"How do you create an API route in the Pages Router?",opts:["Create a file in /api-routes","Create a file in /pages/api — its default export is a handler(req, res) function","Use getServerSideProps","Use the middleware.ts file"],ans:1,sol:"Any file inside /pages/api exports a Node.js-style handler. For example, /pages/api/users.ts handles GET /api/users. These run exclusively server-side and are never included in the client bundle."},
  {tag:"Next.js Fundamentals",q:"What is a Route Handler in the Next.js App Router?",opts:["A middleware file","A file named route.ts inside /app that exports named HTTP method functions (GET, POST, etc.)","A React Server Component","A layout file"],ans:1,sol:"Route Handlers replace API routes in the App Router. Create app/api/users/route.ts and export async functions named after HTTP methods: export async function GET(request) { ... }."},
  {tag:"Next.js Fundamentals",q:"What is the <code>next/image</code> component used for?",opts:["Displaying any HTML","Optimizing images: automatic resizing, modern formats (WebP/AVIF), lazy loading, and CLS prevention","Importing SVGs","Managing image state"],ans:1,sol:"next/image automatically optimizes images: serves them in modern formats, resizes to the correct dimensions per device, lazy loads them by default, and reserves space to prevent cumulative layout shift."},
  {tag:"Next.js Fundamentals",q:"What is <code>next/link</code> used for?",opts:["Importing stylesheets","Client-side navigation between routes with prefetching","Creating anchor tags with external links","Managing deep links"],ans:1,sol:"<Link href='/about'> provides client-side navigation. In the viewport, Next.js automatically prefetches the linked page's bundle in the background, making navigation feel instant."},
  {tag:"Next.js Fundamentals",q:"What does <code>next/head</code> do in the Pages Router?",opts:["Loads CSS into the head","Manages the <head> element of the page (title, meta tags, canonical URLs)","Adds scripts to the body","Controls server headers"],ans:1,sol:"<Head> from next/head lets you modify the document <head> from any component in the Pages Router. Each page can define its own title, description, og:tags, etc. Use the Metadata API in the App Router instead."},
  {tag:"Next.js Fundamentals",q:"What is the Metadata API in the App Router?",opts:["An API route for meta data","Exporting a metadata object or generateMetadata function from layout/page files to set head tags declaratively","A JSON file","A React hook"],ans:1,sol:"In the App Router, export const metadata = { title: '...', description: '...' } or export async function generateMetadata({ params }) from any layout.tsx or page.tsx to set SEO metadata declaratively."},
  {tag:"Next.js Fundamentals",q:"What is the <code>_app.js</code> file used for in the Pages Router?",opts:["API initialization","Wrapping all pages with shared providers, global styles, and persistent layout","Server configuration","Database connection"],ans:1,sol:"_app.js (or _app.tsx) is a custom App component. It wraps every page, making it the ideal place for global providers (Redux, Theme, Auth), global CSS imports, and page-level layouts."},
  {tag:"Next.js Fundamentals",q:"What is the <code>_document.js</code> file in Next.js?",opts:["A Markdown file","A custom Document that lets you augment the <html>, <head>, and <body> tags rendered on the server","A Webpack config","A TypeScript definition"],ans:1,sol:"_document.js lets you customize the HTML shell (html/head/body tags). It only renders on the server and is used for things like adding lang attributes, Google Fonts <link>, or CSS-in-JS style tags."},

  // ── NEXT.JS RENDERING ────────────────────────────────────────────────
  {tag:"Next.js Rendering",q:"What is SSR (Server-Side Rendering)?",opts:["Rendering in the browser","Generating the full HTML on the server for each request, sending it to the client for fast FCP","Rendering at build time","Running React on Node.js permanently"],ans:1,sol:"SSR generates page HTML on the server per request. The client receives fully-rendered HTML for instant First Contentful Paint, then React hydrates it. Good for personalized or frequently-changing data."},
  {tag:"Next.js Rendering",q:"What is SSG (Static Site Generation)?",opts:["Rendering with JavaScript only","Pre-rendering pages at build time as static HTML files served from a CDN","Runtime rendering","A React pattern"],ans:1,sol:"SSG generates static HTML at build time. The resulting files are served from a CDN with no server computation per request, offering the best performance and scalability for content that doesn't change per user."},
  {tag:"Next.js Rendering",q:"What is CSR (Client-Side Rendering)?",opts:["Rendering on a CDN","Sending a minimal HTML shell; JavaScript fetches data and renders the UI in the browser","Pre-rendering at build","Server rendering"],ans:1,sol:"CSR sends a near-empty HTML file; React runs in the browser, fetches data, and renders the UI. This leads to slower FCP but faster subsequent navigation. Traditional SPAs use CSR."},
  {tag:"Next.js Rendering",q:"What are React Server Components (RSC)?",opts:["Components that run on both client and server","Components that render exclusively on the server, with zero JavaScript sent to the client, enabling direct database/file access","Server-side HOCs","SSR components"],ans:1,sol:"RSCs render on the server and stream their output as serialized React elements. They have zero impact on client bundle size, can access server resources directly, but cannot use hooks or browser APIs."},
  {tag:"Next.js Rendering",q:"How do you mark a Next.js App Router component as a Client Component?",opts:["Add 'use client' at the top of the file","Export default with 'client' option","Add client: true to the route config","Wrap with <ClientProvider>"],ans:0,sol:"Adding 'use client' as the first line of a file marks it (and all its imports) as a Client Component. It can use hooks, browser APIs, and event listeners but is sent to and executed in the browser."},
  {tag:"Next.js Rendering",q:"What is hydration in Next.js?",opts:["Adding water to a server","The process where React attaches event listeners and makes server-rendered static HTML interactive on the client","Loading CSS","A caching mechanism"],ans:1,sol:"After SSR or SSG sends HTML to the browser, React hydrates it: it walks the HTML, reconstructs the React tree, and attaches event listeners — making the static page interactive without re-rendering."},
  {tag:"Next.js Rendering",q:"What is a hydration mismatch?",opts:["A server crash","An error when the server-rendered HTML doesn't match what React expects to render on the client","A network error","A TypeScript error"],ans:1,sol:"Hydration mismatches occur when server-rendered HTML differs from the client's initial render (e.g., due to Date.now(), random IDs, or browser-only APIs). React 18 recovers from most mismatches but logs a warning."},
  {tag:"Next.js Rendering",q:"What does the <code>revalidate</code> option do in the App Router fetch?",opts:["Validates props","Tells Next.js how many seconds to cache a fetch response before revalidating (ISR equivalent for App Router)","Refreshes the page","Reloads the component"],ans:1,sol:"fetch('/api', { next: { revalidate: 60 } }) caches the response and re-validates it in the background after 60 seconds, implementing ISR at the fetch level in the App Router."},
  {tag:"Next.js Rendering",q:"What does <code>cache: 'no-store'</code> in a fetch call do in the App Router?",opts:["Disables localStorage","Opts out of caching entirely — data is fetched fresh on every request (dynamic rendering)","Stores data in a CDN","Enables Redis caching"],ans:1,sol:"fetch('/api', { cache: 'no-store' }) disables Next.js's extended fetch caching, making the route dynamic (equivalent to getServerSideProps in Pages Router). The data is never cached."},
  {tag:"Next.js Rendering",q:"What is Partial Prerendering (PPR) in Next.js?",opts:["Partial static generation","A rendering mode that statically prerenenders the shell of a page and streams dynamic content into it, combining SSG speed with SSR freshness","A way to partially hydrate","A caching strategy"],ans:1,sol:"PPR (Next.js 14+, experimental) generates a fast static shell at build time and streams dynamic content into it at request time using Suspense boundaries — offering the best of both SSG and SSR."},

  // ── NEXT.JS APP ROUTER ───────────────────────────────────────────────
  {tag:"App Router",q:"What is a layout in the App Router?",opts:["A CSS file","A layout.tsx component that wraps its segment's pages and persists across navigation without re-mounting","A HOC","A page template"],ans:1,sol:"layout.tsx defines shared UI for a route segment and all its children. Unlike pages, layouts don't re-mount on navigation within their segment — preserving state in sidebars or headers."},
  {tag:"App Router",q:"What is a loading.tsx file used for in the App Router?",opts:["Displaying loading bars globally","Automatically wrapping the page in a Suspense boundary with the loading.tsx content as the fallback","A loading animation library","Pre-fetching data"],ans:1,sol:"Creating loading.tsx in a route segment automatically wraps page.tsx in Suspense. The loading.tsx content is shown as the fallback while the page's async data fetches, enabling streaming SSR."},
  {tag:"App Router",q:"What is error.tsx in the App Router?",opts:["A global error handler","An error boundary for the route segment; it catches errors from page.tsx and shows a fallback UI with a reset() function","A 404 page","A TypeScript error file"],ans:1,sol:"error.tsx is a client-side error boundary for its route segment. It receives error and reset props. Calling reset() attempts to re-render the segment, recovering from transient errors."},
  {tag:"App Router",q:"What is a Server Action?",opts:["A Node.js API route","An async function marked with 'use server' that runs on the server and can be called directly from Client Components or forms","A Redux action","A middleware function"],ans:1,sol:"Server Actions are async functions with 'use server' that execute on the server. They can be called from Client Components or bound to <form action>. Next.js generates an encrypted endpoint for each one."},
  {tag:"App Router",q:"How do you create a dynamic route in the App Router?",opts:["Using [param] in the folder name inside /app","Using :param in the route path","Using query strings","Using a config file"],ans:0,sol:"In the App Router, create a folder named [slug] (or [id], etc.) inside /app. The folder name's bracket content becomes a params key accessible in page.tsx via the params prop or generateStaticParams."},
  {tag:"App Router",q:"What is a parallel route in Next.js App Router?",opts:["Two routes with the same path","A way to render multiple pages simultaneously in the same layout using @folder convention","A cached route","An A/B tested route"],ans:1,sol:"Parallel Routes (@folder convention) let you render multiple page segments in the same layout simultaneously. Each @slot can have its own loading/error states and independent navigation, ideal for dashboards."},
  {tag:"App Router",q:"What is an intercepting route?",opts:["A route that blocks navigation","A route that intercepts a link click to show content in a modal (e.g., a photo) while keeping the current page, with the full page available on direct URL","A middleware route","An error route"],ans:1,sol:"Intercepting routes (using (.) (..) (...) conventions) let you show a route in a different context (e.g., a modal) when navigating from within the app, while the full page loads on direct URL access."},
  {tag:"App Router",q:"What does <code>generateStaticParams</code> do?",opts:["Validates route params","Returns an array of param objects at build time, enabling static generation of dynamic routes in the App Router (replaces getStaticPaths)","Generates query params","Creates API routes"],ans:1,sol:"Exporting generateStaticParams from a dynamic route page tells Next.js which param combinations to statically generate at build time. It replaces getStaticPaths from the Pages Router."},
  {tag:"App Router",q:"What is a template.tsx vs layout.tsx in the App Router?",opts:["Same thing","template.tsx creates a new instance on every navigation (re-mounts, resets state), while layout.tsx persists across navigation","template is for CSS; layout is for structure","template is deprecated"],ans:1,sol:"layout.tsx persists across navigation — its state, effects, and DOM are kept. template.tsx mounts fresh on every navigation, useful when you want entry animations or need side effects to re-run."},
  {tag:"App Router",q:"What is Next.js Middleware?",opts:["A Redux middleware","Code in middleware.ts that runs before a request completes, enabling redirects, rewrites, auth checks, and header manipulation at the edge","A server action","A React context"],ans:1,sol:"middleware.ts runs on the Edge Runtime before requests are processed. It can inspect/modify req and res, redirect, rewrite, or set headers — ideal for auth, A/B testing, and geo-redirects with low latency."},

  // ── NEXT.JS ADVANCED ─────────────────────────────────────────────────
  {tag:"Next.js Advanced",q:"What is the Edge Runtime in Next.js?",opts:["A Node.js extension","A lightweight V8-based runtime (no Node.js APIs) that runs code at CDN edge locations for ultra-low latency responses","A browser runtime","A Docker container"],ans:1,sol:"The Edge Runtime uses the V8 engine without Node.js APIs. Middleware and Edge API Routes run here. They start instantly (no cold start), run globally close to users, but have a limited API surface."},
  {tag:"Next.js Advanced",q:"What is <code>next.config.js</code> used for?",opts:["TypeScript config","Configuring Next.js: custom webpack, redirects, rewrites, environment variables, experimental features, image domains, etc.","Defining routes","Managing CSS"],ans:1,sol:"next.config.js exports a configuration object for the Next.js build. You can customize webpack, define redirects/rewrites, set environment variables, enable experimental features, and configure image/content sources."},
  {tag:"Next.js Advanced",q:"How do you define environment variables accessible only on the server in Next.js?",opts:["Prefix with NEXT_PUBLIC_","Store in .env without the NEXT_PUBLIC_ prefix","Use process.env.SERVER_ONLY in JSX","Use next.config.js serverEnv"],ans:1,sol:"Variables without the NEXT_PUBLIC_ prefix are only available server-side (getServerSideProps, API routes, Server Components). NEXT_PUBLIC_ variables are inlined into the client bundle at build time."},
  {tag:"Next.js Advanced",q:"What is <code>unstable_cache</code> in Next.js App Router?",opts:["A broken caching function","A function that caches the result of any async function (like a DB query) with ISR-like revalidation semantics","A Redis wrapper","A built-in query cache"],ans:1,sol:"unstable_cache wraps an async function and caches its result. You can set tags and revalidation periods. Calling revalidateTag() or revalidatePath() from a Server Action purges the cache on demand."},
  {tag:"Next.js Advanced",q:"What is the purpose of <code>revalidatePath</code>?",opts:["Validates the route config","Purges the Next.js cache for a specific URL path on demand (useful in Server Actions after mutations)","Redirects to a new path","Re-renders a component"],ans:1,sol:"revalidatePath('/blog/[slug]') invalidates the cached data for a route so the next visitor gets fresh content. Typically called inside Server Actions after updating data, implementing on-demand ISR."},
  {tag:"Next.js Advanced",q:"What is <code>revalidateTag</code>?",opts:["A cache decorator","Purges all cached fetch responses tagged with a specific string, enabling fine-grained on-demand cache invalidation","A route metadata tag","An image tag revalidator"],ans:1,sol:"Tag fetches with fetch('/api', { next: { tags: ['posts'] } }) then call revalidateTag('posts') from a Server Action to purge all cached responses with that tag — more granular than revalidatePath."},
  {tag:"Next.js Advanced",q:"What is the Next.js Image component's <code>priority</code> prop for?",opts:["Setting z-index","Marking an image as high priority — disabling lazy loading and adding a preload link tag for LCP images","Caching the image","Setting image quality"],ans:1,sol:"priority={true} on <Image> disables lazy loading and injects a <link rel='preload'> in the head. Use it for Largest Contentful Paint (LCP) images (hero images) to improve Core Web Vitals."},
  {tag:"Next.js Advanced",q:"How does Next.js handle font optimization with <code>next/font</code>?",opts:["It links to Google Fonts CDN","It downloads fonts at build time, self-hosts them, generates optimal CSS with font-display:swap, and zero layout shift using CSS size-adjust","It inlines fonts as base64","It uses system fonts only"],ans:1,sol:"next/font downloads Google Fonts or local fonts at build time and self-hosts them. No external requests, automatic font-display:swap, and CSS variables for zero layout shift — all with zero runtime overhead."},
  {tag:"Next.js Advanced",q:"What is Turbopack?",opts:["A CSS bundler","An incremental, Rust-based bundler by Vercel intended to replace webpack in Next.js development, with significantly faster HMR","A database","A deployment platform"],ans:1,sol:"Turbopack is a Rust-based incremental bundler that computes only what changed. It powers next dev --turbo in Next.js 13+ for dramatically faster Hot Module Replacement than webpack, especially in large projects."},
  {tag:"Next.js Advanced",q:"What is Next.js's Script component used for?",opts:["Running server scripts","Loading third-party scripts with loading strategy control (beforeInteractive, afterInteractive, lazyOnload) to improve performance","CSS animation scripts","Internal JavaScript files"],ans:1,sol:"<Script src='...' strategy='lazyOnload'> controls when third-party scripts load. afterInteractive loads after hydration; lazyOnload loads during browser idle time — preventing scripts from blocking page load."},

  // ── TYPESCRIPT WITH REACT ─────────────────────────────────────────────
  {tag:"TypeScript & React",q:"How do you type component props in React with TypeScript?",opts:["Using PropTypes","Defining an interface or type alias and passing it as the generic to React.FC or destructuring directly","Using any","Using class decorators"],ans:1,sol:"Define interface Props { name: string } and type the component as const MyComp: React.FC<Props> or function MyComp({ name }: Props). React.FC is less preferred due to implicit children; explicit prop typing is idiomatic."},
  {tag:"TypeScript & React",q:"How do you type the <code>useState</code> hook?",opts:["useState is always inferred","useState<Type>(initialValue) explicitly sets the state type when inference is insufficient (e.g., useState<User | null>(null))","Using as keyword","Using PropTypes"],ans:1,sol:"TypeScript infers the type from the initial value (useState(0) → number). Use the generic useState<User | null>(null) when the initial value doesn't capture all possible types."},
  {tag:"TypeScript & React",q:"What is <code>React.ReactNode</code>?",opts:["A DOM node type","A union type representing anything React can render: JSX, strings, numbers, arrays, null, booleans, portals","A hook return type","A context type"],ans:1,sol:"ReactNode is the broadest renderable type in React's type definitions. It includes ReactElement, string, number, ReactFragment, ReactPortal, boolean, null, and undefined — used for children props."},
  {tag:"TypeScript & React",q:"What is the difference between <code>React.FC</code> and typing the function directly?",opts:["No difference","React.FC adds implicit children (pre-React 18) and return type annotation; direct typing gives more control and is now preferred by many style guides","React.FC is faster","React.FC enables hooks"],ans:1,sol:"React.FC<Props> historically added implicit children to Props (removed in React 18 types). Most teams now prefer direct function typing: function Comp({ name }: Props): JSX.Element for clarity and flexibility."},
  {tag:"TypeScript & React",q:"How do you type event handlers in React TypeScript?",opts:["Using Event","Using React.ChangeEvent<HTMLInputElement> or React.MouseEvent<HTMLButtonElement>, etc.","Using any","Using EventTarget"],ans:1,sol:"React provides typed event generics: React.ChangeEvent<HTMLInputElement> for input changes, React.MouseEvent<HTMLButtonElement> for clicks. The generic specifies the DOM element the event originated from."},

  // ── TESTING ───────────────────────────────────────────────────────────
  {tag:"Testing",q:"What is React Testing Library (RTL)?",opts:["A UI component library","A testing utility that renders components into a DOM and provides queries that reflect how users interact with the UI","A unit testing framework","A snapshot testing tool"],ans:1,sol:"RTL renders components into a jsdom environment and exposes queries like getByRole, getByText, and getByLabelText — encouraging tests that focus on behavior rather than implementation details."},
  {tag:"Testing",q:"What is the guiding philosophy of React Testing Library?",opts:["Test implementation details","Test components the way users use them — avoid testing internal state or implementation; query by accessible attributes","Only test class components","Use snapshots for everything"],ans:1,sol:"RTL's motto: 'The more your tests resemble the way your software is used, the more confidence they can give you.' This means querying by role, label, or text rather than class names or component internals."},
  {tag:"Testing",q:"What is snapshot testing?",opts:["Testing screenshots","Serializing a component's rendered output to a file and comparing it on subsequent runs to detect unintended changes","Testing database state","A performance test"],ans:1,sol:"Snapshot tests (Jest + react-test-renderer) serialize the rendered component tree. On subsequent runs, if the output changed, the test fails. They catch unintended UI regressions but can generate false positives."},
  {tag:"Testing",q:"What is the purpose of <code>userEvent</code> in RTL?",opts:["Mocking API calls","Simulating realistic user interactions (typing, clicking, tabbing) more accurately than fireEvent","Testing context","Async testing"],ans:1,sol:"userEvent (from @testing-library/user-event) simulates real browser events including focus, keyboard events, and pointer events. It's more realistic than fireEvent, which only dispatches a single event."},
  {tag:"Testing",q:"How do you test async operations in RTL?",opts:["Using setTimeout","Using waitFor, findBy* queries, or findAllBy* queries that retry until the assertion passes or times out","Using useEffect","Using act()"],ans:1,sol:"waitFor(async () => expect(...).toBeTruthy()) retries the assertion until it passes. findByText('data') is a shorthand for waitFor + queryBy. These handle state updates from async data fetching."},

  // ── ACCESSIBILITY ─────────────────────────────────────────────────────
  {tag:"Accessibility",q:"What is ARIA and why is it important in React?",opts:["A CSS standard","Accessible Rich Internet Applications — attributes that define roles, states, and properties to make dynamic React UIs accessible to assistive technologies","A routing library","A testing tool"],ans:1,sol:"ARIA attributes (aria-label, aria-expanded, role, etc.) communicate the purpose and state of interactive elements to screen readers when semantic HTML alone is insufficient for dynamic React components."},
  {tag:"Accessibility",q:"What is the first rule of ARIA?",opts:["Always use ARIA","Don't use ARIA if you can use semantic HTML instead","Always add role attributes","Never use ARIA"],ans:1,sol:"The first rule of ARIA is: don't use it if a native HTML element with the correct semantics and behavior already exists. A <button> is better than <div role='button'> because it's keyboard-accessible by default."},
  {tag:"Accessibility",q:"How do you manage focus in React after a navigation event?",opts:["It's automatic","Programmatically move focus using useRef + element.focus() after state/route changes, especially for SPA navigation","Using CSS :focus","Using document.title"],ans:1,sol:"In SPAs, route changes don't move focus like real page loads. Use useRef to reference a heading or the main content area and call ref.current.focus() after navigation to orient screen reader users."},

  // ── CSS & STYLING ─────────────────────────────────────────────────────
  {tag:"Styling",q:"What are CSS Modules?",opts:["A npm package","Files (*.module.css) where class names are locally scoped by default — imported as objects, preventing global name collisions","Global CSS styles","CSS-in-JS"],ans:1,sol:"CSS Modules scope class names to the component file. Import styles from './Button.module.css' and use styles.button — the build tool generates a unique class like 'Button_button__xyz', preventing clashes."},
  {tag:"Styling",q:"What is Tailwind CSS?",opts:["A component library","A utility-first CSS framework using low-level utility classes composed directly in markup to build custom designs","A CSS preprocessor","A design system"],ans:1,sol:"Tailwind provides atomic utility classes (flex, p-4, text-blue-500) applied directly in JSX. Rather than writing custom CSS, you compose utilities. It purges unused styles in production for small bundles."},
  {tag:"Styling",q:"What is CSS-in-JS?",opts:["Inline style attributes","A pattern where CSS styles are defined within JavaScript files, enabling component-level scoping, dynamic styles, and theming","A webpack plugin","Importing CSS files"],ans:1,sol:"CSS-in-JS libraries (styled-components, Emotion) let you write CSS in JS. Styles are scoped to components, can use props for dynamic styling, and are injected as stylesheets at runtime or build time."},
  {tag:"Styling",q:"What is the styled-components library?",opts:["A CSS linter","A CSS-in-JS library that uses tagged template literals to create React components with styles baked in","A utility CSS framework","A PostCSS plugin"],ans:1,sol:"styled-components uses tagged template literals: const Button = styled.button`background: blue;`. The result is a React component with the styles applied. Supports theming, global styles, and dynamic props."},

  // ── FORMS ─────────────────────────────────────────────────────────────
  {tag:"Forms",q:"What is React Hook Form?",opts:["A form UI library","A performant form library that uses uncontrolled inputs and refs to minimize re-renders, providing validation and form state management","A CSS form library","A server-side form handler"],ans:1,sol:"React Hook Form uses refs (register) instead of controlled state, so inputs don't re-render the parent on every keystroke. It integrates with Zod/Yup for schema validation and has excellent TypeScript support."},
  {tag:"Forms",q:"What does the <code>register</code> function do in React Hook Form?",opts:["Registers a component","Returns ref and event handlers to connect an input element to the form, enabling validation and value tracking","Creates a controlled input","Submits the form"],ans:1,sol:"register('fieldName', validationRules) returns { ref, name, onChange, onBlur } which you spread onto an <input>. This connects the field to RHF's form state without making it a controlled component."},
  {tag:"Forms",q:"What is Zod used for in React applications?",opts:["State management","TypeScript-first schema declaration and runtime validation — commonly used with forms (React Hook Form) and API input parsing","Routing","Testing"],ans:1,sol:"Zod defines schemas (z.object({ email: z.string().email() })) and parses/validates data at runtime. It infers TypeScript types from schemas, eliminating duplicate type definitions. The zodResolver bridges Zod with RHF."},
  {tag:"Forms",q:"What is the difference between <code>watch</code> and <code>getValues</code> in React Hook Form?",opts:["No difference","watch subscribes to field changes and causes re-renders; getValues reads current values without subscribing (no re-render)","watch is async","getValues is deprecated"],ans:1,sol:"watch('field') returns the current value and causes a re-render on every change (for reactive UI). getValues('field') reads the current value without subscribing — useful in callbacks where re-rendering isn't needed."},

  // ── ADVANCED REACT ────────────────────────────────────────────────────
  {tag:"Advanced React",q:"What is the React Fiber architecture?",opts:["A network protocol","The internal reconciliation engine rewritten in React 16 that enables incremental rendering, prioritization of updates, and concurrent features","A CSS layout algorithm","A state management approach"],ans:1,sol:"React Fiber is the complete rewrite of React's reconciliation algorithm. It represents work as a linked list of 'fiber' units that can be paused, resumed, or aborted — enabling Concurrent Mode features like Suspense, transitions, and streaming."},
  {tag:"Advanced React",q:"What is Concurrent Mode / Concurrent React?",opts:["Running React in multiple threads","React's ability to prepare multiple UI versions simultaneously, interrupt rendering for urgent updates, and resume later — enabled by the new root API in React 18","A multi-page app feature","A testing mode"],ans:1,sol:"Concurrent React (React 18+) allows rendering to be interruptible. React can start rendering, pause for higher-priority updates, then finish. This enables useTransition, useDeferredValue, Suspense streaming, and automatic batching."},
  {tag:"Advanced React",q:"What is automatic batching in React 18?",opts:["Batching API requests","React 18 batches all state updates — even inside setTimeout, Promises, and native events — into a single re-render, reducing unnecessary renders","A form validation feature","A webpack optimization"],ans:1,sol:"Before React 18, only React event handlers were batched. React 18 batches state updates everywhere (async callbacks, setTimeout, Promises) automatically, reducing renders. Use flushSync() to opt out."},
  {tag:"Advanced React",q:"What does <code>flushSync</code> do?",opts:["Flushes the cache","Forces React to flush all pending state updates synchronously inside the callback before returning, bypassing automatic batching","Syncs Redux state","Clears refs"],ans:1,sol:"flushSync(() => setState(x)) forces React to process the update immediately and synchronously, before the next line runs. Useful for reading DOM measurements after a state update before the next browser paint."},
  {tag:"Advanced React",q:"What is the purpose of <code>startTransition</code>?",opts:["Starting a CSS transition","Marking state updates as non-urgent transitions so React can keep the UI responsive during expensive re-renders","Starting a network request","Initiating a route change"],ans:1,sol:"startTransition wraps state updates that can be deferred: React will render urgent updates (keystrokes) first, then process the transition. isPending from useTransition signals when it's in progress."},
  {tag:"Advanced React",q:"What is a React Suspense boundary and what does it enable?",opts:["An error boundary","A component that defers rendering of its children until they're ready (lazy loading or async data), showing a fallback UI meanwhile; enables streaming SSR in Next.js","A loading spinner component","A Webpack code split point"],ans:1,sol:"Suspense catches components that 'suspend' (throw a Promise). It renders the fallback until the promise resolves. In React 18 + Next.js App Router, Suspense boundaries enable HTML streaming — sending content to the browser progressively."},
  {tag:"Advanced React",q:"What is the <code>use</code> hook (React 19)?",opts:["Like useState","A hook that reads the value of a Resource (Promise or Context) — it can be called inside conditionals and integrates with Suspense for async data","Replaces useEffect","A fetching wrapper"],ans:1,sol:"use(resource) reads a Context or unwraps a Promise. Unlike other hooks, it can be called inside if/for blocks. When passed a Promise, the component suspends until it resolves, integrating natively with Suspense boundaries."},
  {tag:"Advanced React",q:"What is <code>useOptimistic</code>?",opts:["Optimizes component rendering","A React 19 hook that lets you show an optimistic (assumed-success) state immediately while an async operation is in progress, rolling back on failure","A memoization hook","An error recovery hook"],ans:1,sol:"useOptimistic(state, updateFn) returns an optimistic state. While a Server Action or mutation is pending, you show the optimistic result immediately. React automatically reverts to the real state on completion or failure."},
  {tag:"Advanced React",q:"What is the <code>useFormStatus</code> hook?",opts:["Tracks form validation state","A React DOM hook that reads the submission status (pending, data, method, action) of the parent <form>, useful in submit button components","Tracks form input values","A React Hook Form hook"],ans:1,sol:"useFormStatus() (from react-dom) is called inside a child of a <form> element. It returns { pending, data, method, action } — letting you disable a submit button or show a spinner without lifting state."},

  // ── SECURITY ─────────────────────────────────────────────────────────
  {tag:"Security",q:"What is Cross-Site Scripting (XSS) and how does React protect against it?",opts:["A CSS attack","An injection attack where malicious scripts are executed in the browser; React escapes all string values in JSX by default, preventing HTML injection","A network protocol","A routing vulnerability"],ans:1,sol:"React escapes dynamic values in JSX before inserting them into the DOM, converting characters like < and & to entities. This prevents injected strings from being interpreted as HTML/JS — XSS protection by default."},
  {tag:"Security",q:"When is <code>dangerouslySetInnerHTML</code> a security risk?",opts:["Always","When the HTML content comes from an untrusted source (user input, external APIs) without sanitization — it bypasses React's XSS protection","Never","Only in class components"],ans:1,sol:"dangerouslySetInnerHTML bypasses React's escaping. If you inject unsanitized user content, attackers can inject <script> tags or event handlers. Always sanitize with DOMPurify before using it with untrusted content."},
  {tag:"Security",q:"What is CSRF and how does Next.js help prevent it?",opts:["A caching technique","Cross-Site Request Forgery — Server Actions in Next.js include a hidden origin check using SameSite cookies and a unique action ID to verify requests come from the same origin","A rendering mode","A testing vulnerability"],ans:1,sol:"CSRF attacks trick users into making authenticated requests to another site. Next.js Server Actions automatically include origin checking. Pair with SameSite=Strict/Lax cookies and avoid exposing sensitive mutations via GET requests."},

  // ── DATA FETCHING ─────────────────────────────────────────────────────
  {tag:"Data Fetching",q:"What is SWR?",opts:["A rendering strategy","A data-fetching React hook library by Vercel using stale-while-revalidate: returns cached data immediately, revalidates in background, updates with fresh data","A state manager","A caching server"],ans:1,sol:"SWR (stale-while-revalidate) from Vercel returns stale data instantly from cache, then fetches fresh data in the background and updates the UI. It handles caching, deduplication, focus/network revalidation automatically."},
  {tag:"Data Fetching",q:"In Next.js App Router, how do you fetch data in a Server Component?",opts:["Using useEffect","Directly using fetch, an ORM, or SDK inside the async Server Component function — no useEffect needed","Using getServerSideProps","Using SWR"],ans:1,sol:"Server Components are async functions. You can call fetch, access databases, or use any server-side SDK directly: async function Page() { const data = await fetch('/api').then(r => r.json()); return <div>{data.title}</div>; }"},
  {tag:"Data Fetching",q:"What is the Request Memoization feature in Next.js App Router?",opts:["A Redux feature","Next.js automatically deduplicates fetch requests with the same URL+options within a single render pass — safe to call the same fetch in multiple components","A browser API","A CDN feature"],ans:1,sol:"Within a single server render, Next.js memoizes fetch() results per unique URL + options. Calling the same fetch in layout.tsx and page.tsx only makes one network request — enabling data colocation without waterfalls."},
  {tag:"Data Fetching",q:"What is an optimistic update?",opts:["A positive mindset update","Updating the UI immediately before the server confirms the change, then rolling back if the server returns an error — provides instant responsiveness","A cached update","A deferred update"],ans:1,sol:"Optimistic updates improve perceived performance by reflecting changes in the UI immediately (e.g., adding a like) before the server responds. On error, the UI reverts to the previous state."},
  {tag:"Data Fetching",q:"What is GraphQL and how does it differ from REST?",opts:["A query language for CSS","A query language and runtime for APIs where the client specifies exactly what data it needs in a single request, eliminating over/under-fetching unlike REST's fixed endpoints","A database","A state manager"],ans:1,sol:"GraphQL lets clients request exactly the fields they need from a single /graphql endpoint. REST has multiple endpoints returning fixed shapes. GraphQL reduces over-fetching (extra fields) and under-fetching (multiple requests)."},

  // ── DEPLOYMENT & BUILD ────────────────────────────────────────────────
  {tag:"Deployment",q:"What is Vercel and how does it relate to Next.js?",opts:["A React competitor","A cloud platform by the creators of Next.js; it offers zero-config deployment for Next.js apps with edge network, serverless functions, and ISR support","A database service","A CDN only"],ans:1,sol:"Vercel created and maintains Next.js. Its platform provides native support for all Next.js features (ISR, Edge Middleware, Server Actions, streaming) via a global edge network with automatic deployments from Git."},
  {tag:"Deployment",q:"What is the output of <code>next build</code>?",opts:["A Docker image","An optimized production build in .next: pre-rendered HTML, static assets, server bundles, route manifests, and chunk files","A Node.js server only","A zip file"],ans:1,sol:"next build generates the .next directory containing: static HTML for SSG pages, JavaScript bundles per route, server-side code for SSR/API routes, fonts, images, and all build artifacts needed to serve the app."},
  {tag:"Deployment",q:"What is <code>next export</code> (or output: 'export')?",opts:["Exporting React components","Generating a fully static HTML/CSS/JS export of the Next.js app that can be hosted on any static file server without a Node.js server","A TypeScript export","An API export"],ans:1,sol:"output: 'export' in next.config.js generates a static out/ folder. All pages must be statically renderable (no SSR, Server Actions, or ISR). Ideal for hosting on GitHub Pages, S3, or Netlify static."},
  {tag:"Deployment",q:"What is a CDN and why is it important for Next.js static assets?",opts:["A database network","A Content Delivery Network that caches files at edge locations worldwide, serving static assets (JS, CSS, images) from the server nearest to the user for low latency","A React feature","A container network"],ans:1,sol:"CDNs cache static assets at global PoPs (Points of Presence). When Next.js generates static pages, they're served from CDN edges — eliminating round-trips to the origin server and dramatically reducing TTFB."},

  // ── MISCELLANEOUS / MODERN ────────────────────────────────────────────
  {tag:"Modern React",q:"What new features did React 18 introduce?",opts:["Hooks","Concurrent rendering, automatic batching, Suspense improvements, useTransition, useDeferredValue, useId, and the new createRoot API","TypeScript support","CSS variables"],ans:1,sol:"React 18 introduced: createRoot (enabling concurrent mode), automatic batching, streaming SSR with Suspense, useTransition, useDeferredValue, useId, useSyncExternalStore, and useInsertionEffect."},
  {tag:"Modern React",q:"What is the new root API in React 18?",opts:["ReactDOM.render()","ReactDOM.createRoot(element).render(<App/>) — the new API that enables concurrent features; ReactDOM.render() is deprecated","React.createRoot()","ReactDOM.hydrate()"],ans:1,sol:"React 18 introduces createRoot from 'react-dom/client'. createRoot(container).render(<App />) opts into concurrent features. The legacy ReactDOM.render() still works but doesn't enable concurrent mode."},
  {tag:"Modern React",q:"What is React Server Components' key advantage over SSR?",opts:["Faster hydration","RSCs produce zero client-side JavaScript — they render to a wire format on the server and never hydrate. SSR still sends HTML + the full component JS for hydration","Easier to write","Better SEO"],ans:1,sol:"Traditional SSR reduces FCP but still ships all component JavaScript for hydration. RSCs have zero bundle footprint — their code never reaches the browser. This dramatically reduces JavaScript payload for content-heavy pages."},
