    <style>
        :root {

            --bg-raised: #11151d;
            --bg-card: #141925;

        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background:
                radial-gradient(900px 500px at 15% -5%, rgba(229, 53, 171, .08), transparent 60%),
                radial-gradient(900px 500px at 85% 0%, rgba(63, 167, 255, .08), transparent 60%),
                var(--bg);
            color: var(--text);
            font-family: var(--sans);

        a {
            color: inherit;
            text-decoration: none;
        }

        /* ---------- topbar ---------- */
        header.topbar {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(11, 14, 20, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--line);
        }

        .topbar-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand {
            font-family: var(--mono);
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 0.02em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand .dot {
            color: var(--accent-alt);
        }

        .topbar nav {
            display: flex;
            gap: 26px;
            font-size: 13px;
            color: var(--text-dim);
            font-family: var(--mono);
        }

        .topbar nav a:hover {
            color: var(--accent);
        }

        /* ---------- hero ---------- */
        .hero {
            max-width: 1200px;
            margin: 0 auto;
            padding: 64px 28px 40px;
        }

        .eyebrow {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .eyebrow::before {
            content: "//";
            color: var(--text-faint);
        }

        h1 {
            font-size: clamp(30px, 4.2vw, 50px);
            font-weight: 800;
            letter-spacing: -0.02em;
            max-width: 16ch;
            margin-bottom: 16px;
            background: linear-gradient(120deg, #fff 30%, var(--accent-alt) 65%, var(--accent) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;

        h1 em {
            font-style: normal;
        }

        .hero p {
            color: var(--text-dim);
            max-width: 56ch;
            font-size: 15.5px;
        }

        .hero-meta {
            display: flex;
            gap: 22px;
            margin-top: 28px;

            font-size: 12.5px;
            color: var(--text-faint);
        }

        .hero-meta b {
            color: var(--text);

        /* ---------- layout ---------- */
        .shell {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 28px 100px;

            grid-template-columns: 300px 1fr;

        /* ---------- sidebar list ---------- */
        .picker {
            position: sticky;
            top: 76px;
            align-self: start;
            background: var(--bg-raised);
            border: 1px solid var(--line);

        .picker-label {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-faint);
            text-transform: uppercase;

            font-size: 10px;

        .panel-head .like {

            gap: 8px;
            font-family: var(--mono);
            font-size: 12px;

            border: 1px solid rgba(63, 167, 255, 0.25);

        .goals {

        .goal-chip {

        .diagram-wrap {

        .brief-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;

        @media (max-width:640px) {
            .brief-grid {
                grid-template-columns: 1fr;

        .brief-card {
            background: var(--bg-card);
            border: 1px solid var(--line);

        .brief-card h3 {

        .brief-card p,

        .brief-card ul {

        .brief-card.flow-card {

        .flow-steps {

            flex-wrap: wrap;
            align-items: center;

        }

        .flow-step {
            font-family: var(--mono);

            color: var(--text);
            background: var(--bg-raised);
            border: 1px solid var(--line);

        footer {

            padding: 40px 20px 60px;

        }

        footer a {
            color: var(--accent);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--line);
            border-radius: 8px;
        }

        @media (max-width: 640px) {
            .shell {
                padding: 0 16px 80px;
                gap: 20px;
            }

            .panel {
                padding: 20px;
            }

            .panel-head h2 {
                font-size: 20px;
            }

            .topbar-inner {
                padding: 16px;
                flex-direction: column;
                gap: 12px;
            }

            .hero {
                padding: 40px 16px 20px;
            }

            .picker {
                position: relative;
                top: 0;
                max-height: 250px;
            }
        }
    </style>

    <script>
        const categories = [
  {
    "id": 1,
    "name": "Distributed Systems",
    "terms": [
      {
        "name": "Distributed System",
        "desc": "A system where components run on multiple networked machines, communicating and coordinating their actions by passing messages to appear as a single coherent system. This architecture prevents single points of failure, allows horizontal scaling, and handles large workloads. However, it introduces significant challenges like network partitions, latency, clock skew, and the complexity of maintaining consensus across nodes."
      },
      {
        "name": "Node",
        "desc": "An individual machine, virtual machine, or software process that runs on a physical server and participates in a distributed network. Each node operates with its own CPU, memory, and storage, processing requests and communicating via networking protocols. Nodes coordinate with one another to execute tasks, maintain state, or replicate data under specific roles such as leaders or followers."
      },
      {
        "name": "Cluster",
        "desc": "A group of interconnected nodes working together as a single, unified computing resource to handle high volumes of traffic or data. Clusters provide redundancy and high availability; if one node in the cluster fails, other nodes take over its load without causing downtime. Clustering requires complex management tools for load balancing, cluster membership, and failover orchestration."
      },
      {
        "name": "Consensus",
        "desc": "The process by which distributed nodes agree on a single data value or state of the system, even when some nodes are faulty or offline. Achieving consensus is critical for maintaining consistency in actions like leader election, transaction commits, and distributed lock management. Algorithms like Paxos and Raft are used to guarantee consensus under different assumptions about network reliability."
      },
      {
        "name": "Leader Election",
        "desc": "The mechanism by which nodes in a cluster dynamically designate one node as the central coordinator (leader) to manage state updates and replicate logs. If the active leader fails or becomes unreachable, the remaining nodes start a new election round to appoint a new leader. This process ensures the cluster continues to function correctly without human intervention."
      },
      {
        "name": "Raft",
        "desc": "A consensus algorithm designed to be easier to understand and implement than classical Paxos, decomposing consensus into leader election, log replication, and safety. Raft operates by electing a single leader node that takes sole responsibility for managing the replicated log and coordinating state machines. It guarantees that as long as a majority of nodes are running, the system will remain operational."
      },
      {
        "name": "Paxos",
        "desc": "A family of foundational consensus protocols designed to solve the problem of agreement among a group of unreliable or noisy nodes. Paxos ensures that only a single value is chosen among proposed values, guaranteeing safety even in the presence of network partitions and message losses. Despite its mathematical elegance, Paxos is notoriously difficult to implement and understand in practical engineering."
      },
      {
        "name": "Quorum",
        "desc": "The minimum number of active nodes in a distributed system that must participate in and agree on an operation (like read or write) for it to be considered valid. Utilizing quorums prevents conflicting updates in the event of network partitions by requiring a strict majority of nodes (e.g., `(N/2) + 1`). This mathematical threshold ensures overlap between the read set and the write set."
      },
      {
        "name": "Split Brain",
        "desc": "A failure state in a cluster where a network partition splits the nodes into two or more isolated segments, and each segment mistakenly believes the other has failed. If both segments elect a leader and begin accepting writes independently, the system's data will diverge, leading to severe corruption. Mitigations include requiring a strict quorum majority to elect leaders."
      },
      {
        "name": "Gossip Protocol",
        "desc": "A peer-to-peer communication method inspired by the spread of social rumors, where nodes periodically transmit state updates to a set of randomly selected peers. Through successive rounds of local sharing, information eventually propagates across the entire network in logarithmic time. This protocol is highly decentralized, resilient to node failures, and ideal for cluster membership tracking."
      },
      {
        "name": "Heartbeat",
        "desc": "A periodic message or signal sent from one node to another (usually from followers to a leader, or between peers) to announce that it is still active. If a node fails to receive a heartbeat within a predefined timeout window, it assumes the sender has crashed or is unreachable. This mechanism triggers fallback procedures like initiating a new leader election."
      },
      {
        "name": "Failure Detection",
        "desc": "The subsystem in a distributed network responsible for determining whether a remote node has crashed, hung, or become disconnected. Because network delays are indistinguishable from crashed nodes, failure detectors must balance speed (detecting crashes quickly) with accuracy (avoiding false alarms). They typically rely on heartbeat intervals and adaptive timeouts."
      },
      {
        "name": "Clock Skew",
        "desc": "The difference in time readings between physical clocks on different physical servers in a distributed system. Due to hardware variations, temperature fluctuations, and network jitters, clocks naturally drift away from each other and from true time. Clock skew makes ordering events by physical timestamps highly unreliable, necessitating logical or vector clocks."
      },
      {
        "name": "Vector Clock",
        "desc": "A logical clock mechanism used to track causal relationships between events in a distributed system without relying on physical time. A vector clock is represented as an array of logical counters, with each entry corresponding to a specific node in the system. By comparing vector clock states, developers can determine if one event causally preceded another or if they occurred concurrently."
      },
      {
        "name": "Lamport Clock",
        "desc": "A simple logical clock algorithm that establishes a partial ordering of events in a distributed system by incrementing a local counter. When a node performs a local event, it increments its counter, and when it sends a message, it includes its current clock value. The receiver updates its own clock to be greater than the received value, ensuring causality is preserved."
      },
      {
        "name": "Distributed Lock",
        "desc": "A synchronization primitive used to coordinate access to a shared resource among multiple processes or threads running on different machines. It guarantees mutual exclusion, ensuring that only one worker can execute a critical section at any given time. Systems like Redis (Redlock) or ZooKeeper are commonly used to implement distributed locking."
      },
      {
        "name": "Lease",
        "desc": "A time-bound contract granting a client exclusive access to a resource for a specified duration, after which it automatically expires. Leases solve the problem of a lock holder crashing and holding the lock indefinitely, which would block the entire system. The client must periodically renew the lease to maintain access, otherwise it falls back to others."
      },
      {
        "name": "Fencing Token",
        "desc": "A monotonically increasing number associated with a lock that is passed along with every write request to a shared storage system. When a client acquires a lock, it receives a new fencing token, and the storage system rejects any incoming writes with older tokens. This prevents stale clients (delayed by GC pauses or network lags) from corrupting state."
      },
      {
        "name": "Distributed Transaction",
        "desc": "A set of database operations that span multiple physical nodes or separate services but must execute atomically as a single unit of work. It adheres to the ACID properties, meaning that either all database nodes commit their changes, or they all roll back. Implementing these transactions is highly complex and negatively impacts system performance."
      },
      {
        "name": "Two-Phase Commit (2PC)",
        "desc": "A classic distributed protocol that ensures atomicity by splitting a transaction into a voting phase and a commit phase. A central coordinator asks all participating databases if they are ready to commit; if all vote yes, the coordinator instructs them to execute the write. If any node votes no or fails to respond, the transaction is aborted globally."
      },
      {
        "name": "Three-Phase Commit (3PC)",
        "desc": "An improvement over the Two-Phase Commit protocol that removes the blocking behavior of 2PC when the coordinator fails. It introduces an intermediate \"pre-commit\" phase and uses timeout transitions to allow participants to safely progress even if the coordinator crashes. Despite solving 2PC's blocking issue, it is rarely used due to network partition vulnerability."
      },
      {
        "name": "CAP Theorem",
        "desc": "A fundamental theorem stating that a distributed data store can simultaneously provide at most two of three guarantees: Consistency, Availability, and Partition Tolerance. Since network partitions are inevitable in real-world hardware, systems must choose between consistency (returning errors or waiting) and availability (returning stale data)."
      },
      {
        "name": "PACELC",
        "desc": "An extension of the CAP theorem stating that even when a system is running normally without network partitions (P), there is still a trade-off. The system must choose between latency (L) and consistency (C) when responding to reads and writes. It provides a more comprehensive framework for classifying modern distributed databases."
      },
      {
        "name": "Availability",
        "desc": "A metric indicating the percentage of time a distributed system is operational and able to successfully process incoming requests. High availability is achieved through redundancy, load balancing, automatic failover mechanisms, and eliminating single points of failure. It is typically expressed in \"nines,\" such as 99.99% availability (about 52 minutes of downtime yearly)."
      },
      {
        "name": "Consistency",
        "desc": "In distributed systems, this refers to the guarantee that all nodes see the same data at the same time. When a write operation completes, any subsequent read operation across the entire cluster must return that updated value or a newer one. Achieving strong consistency requires synchronous coordination, which increases request latency."
      },
      {
        "name": "Partition Tolerance",
        "desc": "The capacity of a distributed system to continue operating and serving requests even when communication links between nodes fail. A partition-tolerant system gracefully handles message drops, delays, or splits without crashing or losing data integrity. This is a non-negotiable requirement for systems running on multi-datacenter clouds."
      },
      {
        "name": "Strong Consistency",
        "desc": "A consistency model where any read operation is guaranteed to return the absolute latest written value, regardless of which replica is queried. This model requires immediate replication and synchronization across all nodes before a write is confirmed to the client. While it simplifies application logic, it severely limits write performance and availability."
      },
      {
        "name": "Weak Consistency",
        "desc": "A relaxed consistency model where the system does not guarantee that subsequent reads will return the most recently written data. Replicas are updated asynchronously in the background, and clients may read stale data for an indefinite period. This model is chosen to maximize write throughput and minimize response latency."
      },
      {
        "name": "Eventual Consistency",
        "desc": "A popular weak consistency model where, if no new updates are made to a data item, all replicas will eventually converge to the same value. Eventual consistency is highly scalable and is used in systems like DNS, Amazon DynamoDB, and Apache Cassandra. It allows fast local writes while syncing updates asynchronously."
      },
      {
        "name": "Causal Consistency",
        "desc": "A consistency model that guarantees operations that are causally related are seen in the same order by every node in the system. For instance, if a user replies to a post, the reply should never be visible before the original post is displayed. Operations that are concurrent and unrelated have no ordering guarantees."
      },
      {
        "name": "Linearizability",
        "desc": "A strong safety property ensuring that all operations appear to execute atomically at a specific point in time between their invocation and completion. It provides the illusion that there is only a single copy of the data, and all reads and writes are perfectly ordered. Achieving linearizability requires expensive consensus protocols."
      },
      {
        "name": "Sequential Consistency",
        "desc": "A consistency model where all nodes see all operations in the same sequence, but that sequence might not match their exact real-time ordering. It ensures that the execution sequence of each individual process is preserved in the global order. It is slightly weaker than linearizability but easier to implement in hardware."
      },
      {
        "name": "Read Repair",
        "desc": "A background synchronization mechanism where stale data detected during a client read operation is corrected on the fly. When a client reads from multiple replicas and detects a mismatch, the database updates the lagging replicas with the newest version. This reduces the performance overhead of proactive consistency checks."
      },
      {
        "name": "Anti Entropy",
        "desc": "A continuous, background synchronization process that compares replica states to find and resolve discrepancies. Replicas exchange data summaries, such as Merkle trees, to quickly identify differing records without scanning the entire dataset. It ensures that even cold data (rarely read) eventually becomes consistent."
      }
    ],
    "img": "images/systemdesignterminology/DistributedSystems.png"
  },
  {
    "id": 2,
    "name": "Scalability",
    "terms": [
      {
        "name": "Horizontal Scaling",
        "desc": "The practice of scaling a system by adding more machines or nodes to the existing pool, distributing the load across them. It is highly scalable and cost-effective using commodity hardware, avoiding the limits of a single machine. However, it introduces complex networking, data partitioning, and consistency issues."
      },
      {
        "name": "Vertical Scaling",
        "desc": "The process of adding more power (such as CPU, RAM, or storage) to an existing single server. It is simple to implement since it requires no architectural changes to code or databases. The primary drawback is the hard physical ceiling of hardware limits and the risk of a single point of failure."
      },
      {
        "name": "Auto Scaling",
        "desc": "A cloud computing feature that dynamically adjusts the number of active server instances in response to real-time traffic demand. It monitors key metrics like CPU utilization or request queue length to spin up or terminate instances. This ensures application availability while minimizing operational costs during low-traffic periods."
      },
      {
        "name": "Elasticity",
        "desc": "The ability of a system to automatically commission and decommission resources in real time to match fluctuating workloads. Unlike simple scalability, elasticity focuses on the speed and efficiency with which resource allocation adjusts to demand. It prevents both resource starvation during traffic spikes and waste during idle hours."
      },
      {
        "name": "Throughput",
        "desc": "The rate at which a system processes requests, transactions, or data transfer over a specific time window. Typically measured in QPS (queries per second), RPS, or bits per second, it represents the system's processing capacity. Maximizing throughput often requires optimizing locks, bottlenecks, and parallel processing capabilities."
      },
      {
        "name": "Latency",
        "desc": "The duration of time it takes for a single request to travel from the client, get processed by the server, and return the response. It is a critical user experience metric, distinct from throughput (a system can have high throughput but poor latency). Reducing latency involves caching, network optimization, and database indexing."
      },
      {
        "name": "P99 Latency",
        "desc": "A performance metric representing the latency threshold under which 99% of all processed requests fall. It isolates the worst 1% of response times, helping engineers detect performance degradation that affects tail users. Optimizing P99 latency usually involves resolving garbage collection pauses or resource contention."
      },
      {
        "name": "P95 Latency",
        "desc": "The response time threshold within which 95% of a system's requests are successfully completed. It provides a more representative view of normal system performance than P99 while filtering out extreme outliers. It is widely used in Service Level Objectives (SLOs) to define acceptable user experiences."
      },
      {
        "name": "Tail Latency",
        "desc": "The high-percentile latencies (such as P99, P99.9, or P99.99) that characterize the slowest requests in a system. Tail latency is critical in large-scale architectures because a single web page may make hundreds of internal service calls, amplifying tail delays. Mitigating tail latency requires request hedging or speculative retries."
      },
      {
        "name": "Bottleneck",
        "desc": "The component or resource in a system that has the lowest capacity and limits the overall performance and throughput. Bottlenecks can occur in CPU, RAM, disk I/O, network bandwidth, or database lock contention. Identifying bottlenecks involves profiling the application and monitoring resource utilization under load."
      },
      {
        "name": "Resource Saturation",

      },
      {

      },
      {
        "name": "Wide Column Database",

      },
      {
        "name": "Graph Database",

      },
      {
        "name": "Partition Key",

      },
      {

      },
      {

      },
      {

      },
      {
        "name": "TTL",

      },
      {

  {
    "id": 10,
    "name": "Caching",
    "terms": [
      {
        "name": "Cache",
        "desc": "A high-speed, temporary storage layer that stores copies of frequently requested data to reduce latency and database load. It resides between the application and the persistent database, leveraging fast memory (like RAM) to serve requests in sub-milliseconds."
      },
      {
        "name": "Cache Hit",
        "desc": "An event where requested data is successfully found and retrieved from the cache layer without querying the slower backend database. A high cache hit ratio (e.g., >90%) indicates an effective caching strategy that optimizes application performance."
      },
      {
        "name": "Cache Miss",
        "desc": "An event where requested data is not found in the cache, forcing the application to query the slower persistent database. The retrieved data is typically written to the cache on the way back so subsequent requests result in cache hits."
      },
      {
        "name": "Cache Aside",
        "desc": "A caching pattern where the application code directly manages the cache. The application reads from the cache first; on a shift/miss, it queries the database, writes the result to the cache, and returns it. It is simple but can lead to stale data."
      },
      {
        "name": "Read Through",
        "desc": "A caching pattern where the cache sits in front of the database and automatically handles misses. The application queries the cache directly; on a miss, the cache fetches the data from the database, stores it, and returns it to the client."
      },
      {
        "name": "Write Through",
        "desc": "A caching strategy where the application writes updates to the cache and the persistent database simultaneously. It ensures the cache is never stale and reads are fast, but introduces higher write latency because both storage layers must confirm the write."
      },
      {
        "name": "Write Around",
        "desc": "A caching strategy where the application writes updates directly to the database, bypassing the cache. The cache is only populated on subsequent cache misses. It prevents the cache from being cluttered with data that is rarely read."
      },
      {
        "name": "Write Back",
        "desc": "A high-performance caching strategy where the application writes updates directly to the cache, which confirms the write immediately. The cache then writes the updates to the database asynchronously in the background. It risks data loss on cache failure."
      },
      {
        "name": "Cache Stampede",
        "desc": "A performance failure occurring when a hot cache key expires, and multiple concurrent requests miss the cache simultaneously, flooding the backend database. Also called thundering herd, it is mitigated by locking or early key pre-computation."
      },
      {
        "name": "Cache Avalanche",
        "desc": "A scenario where a large number of cached items expire at the same time, or the cache server crashes, causing a massive surge of requests to hit the database. It is mitigated by adding random jitter to cache TTLs and clustering cache nodes."
      },
      {
        "name": "Cache Penetration",
        "desc": "A vulnerability where requests are continuously made for data that does not exist in either the cache or the database. Because every request results in a database lookup, it can degrade database performance. It is solved by caching empty results or Bloom filters."
      },
      {
        "name": "Hot Key",
        "desc": "A single cache key that receives a disproportionately high volume of read or write requests, causing resource saturation on the specific cache node hosting it. It is mitigated by replicating hot keys across multiple cache nodes or local in-memory caches."
      },
      {
        "name": "Cold Key",
        "desc": "A cache key that is rarely accessed by users, taking up valuable memory in the cache cluster. Caches use eviction policies (like LRU) to discard cold keys when memory runs low, ensuring that only active, high-value data remains cached."
      },
      {
        "name": "Eviction Policy",
        "desc": "The algorithm used by a cache engine to determine which items to delete when the cache memory limits are reached. Selecting the right eviction policy prevents memory exhaustion while maximizing the cache hit ratio for active workloads."
      },
      {
        "name": "LRU",
        "desc": "Least Recently Used; an eviction policy that discards the cached item that has not been accessed for the longest time. It operates on the assumption that recently accessed items are highly likely to be accessed again soon. It is the default policy for Redis."
      },
      {
        "name": "LFU",
        "desc": "Least Frequently Used; an eviction policy that counts how many times each cached item is accessed and deletes the items with the lowest access count. It is ideal for systems where access frequency remains stable over long periods."
      }
    ],

        "name": "Broker",
        "desc": "A middleware server (such as RabbitMQ or Kafka) that acts as the coordinator between message producers and consumers. It is responsible for receiving messages, storing them securely, routing them to the correct destinations, and managing consumer states."
      },
      {
        "name": "Producer",
        "desc": "An application or service that generates messages, events, or jobs and publishes them to a message broker, queue, or topic. Producers run independently of consumers, enabling asynchronous decoupled processing where the sender doesn't wait for a response."
      },
      {
        "name": "Consumer",
        "desc": "A service or process that subscribes to a message broker and pulls or receives messages for processing. Consumers execute business logic in the background, scaling independently to handle message backlogs without slowing down user-facing web applications."
      },
      {
        "name": "Pub/Sub",
        "desc": "Publish/Subscribe; a messaging pattern where message senders (publishers) categorize messages into channels (topics) without knowing who the receivers (subscribers) are. Each subscriber receives a copy of the message, enabling loose coupling and event-driven architectures."
      },
      {
        "name": "Offset",

      {

        "desc": "A collection of consumers that work together to process messages from a set of topic partitions. The broker divides the partitions among the active members of the group, ensuring that each message is processed by only one consumer in the group."
      },
      {
        "name": "Acknowledgement",
        "desc": "A confirmation signal sent from a message consumer back to the broker indicating that a message has been successfully processed. Once received, the broker safely deletes the message from the queue or advances the consumer's offset, preventing redelivery."
      },
      {
        "name": "NACK",
        "desc": "Negative Acknowledgement; a signal sent by a consumer to a broker indicating that a message could not be processed successfully. This triggers the broker to requeue the message, route it to another consumer, or place it in a dead letter queue."
      },

        "name": "Rebalance",
        "desc": "The process where a message broker redistributes partition assignments among consumers in a consumer group. This occurs when a consumer joins, leaves, or crashes, ensuring that all partitions continue to be read by active group members."

      {
        "name": "Event Replay",

      },

      },
      {

      },
      {
        "name": "At Least Once",
        "desc": "A delivery guarantee where messages are never lost but may be delivered or processed more than once. It requires consumers to acknowledge receipt and forces developers to write idempotent consumers that can handle duplicate messages without side effects."
      },

        "desc": "The strongest delivery guarantee where each message is delivered and processed exactly once, with zero loss and zero duplicates. It is highly complex, requiring transactional coordination between the producer, broker, and consumer to maintain consistency."
      },
      {

      },

        const picker = document.getElementById('picker');
        const panel = document.getElementById('panel');
        
        function init() {
            let pickerHtml = '<div class="picker-label">Categories</div>';
            categories.forEach(c => {
                pickerHtml += `
                    <div class="item" data-id="${c.id}">
                        <div class="num">${c.id < 10 ? '0' + c.id : c.id}</div>
                        <div>
                            <span class="name">${c.name}</span>
                            <span class="tag">${c.terms.length} terms</span>
                        </div>
                    </div>`;
            });
            picker.innerHTML = pickerHtml;
            
            picker.querySelectorAll('.item').forEach(el => {
                el.addEventListener('click', () => loadCategory(parseInt(el.dataset.id, 10)));
            });
            
            if(categories.length > 0) {
                loadCategory(categories[0].id);
            }
        }
        
        function loadCategory(id) {
            document.querySelectorAll('.item').forEach(el => el.classList.remove('active'));
            document.querySelector(`.item[data-id="${id}"]`)?.classList.add('active');
            
            const cat = categories.find(c => c.id === id);
            if(!cat) return;
            
            let html = `
                <div class="panel-head">
                    <h2>${cat.name}</h2>
                    <span class="like">${cat.terms.length} Definitions</span>
                </div>
            `;
            
            if (cat.img) {
                html += `
                    <div class="diagram-wrap" style="position: relative; min-height: 250px; display: flex; align-items: center; justify-content: center;">
                        <div class="img-loader"></div>
                        <img src="${cat.img}" alt="${cat.name} concepts" loading="lazy" onload="this.previousElementSibling.style.display='none'" style="position: relative; z-index: 1; min-height: 250px;">
                    </div>
                `;
            }
            
            html += `<div>`;
            cat.terms.forEach(term => {
                html += `
                    <div class="term-card">
                        <div class="term-name">${term.name}</div>
                        <div class="term-desc">${term.desc}</div>
                    </div>
                `;
            });
            html += `</div>`;
            
            panel.innerHTML = html;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        document.addEventListener('DOMContentLoaded', init);
    </script>
